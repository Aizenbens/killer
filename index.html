<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KRUNK-WAR 3D - Ultimate Realistic Edition</title>
    <style>
        * { box-sizing: border-box; touch-action: none; -webkit-touch-callout: none; user-select: none; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        #mainMenu {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; color: #fff;
        }
        .menu-card {
            background: rgba(30, 41, 59, 0.95); padding: 22px; border-radius: 14px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.85); width: 90%; max-width: 400px; text-align: center; border: 2px solid #64748b;
        }
        h1 { margin: 0 0 10px 0; font-size: 28px; color: #cbd5e1; font-weight: 900; text-shadow: 2px 2px 4px #000; }
        label { font-size: 11px; color: #94a3b8; display: block; text-align: right; margin-top: 8px; font-weight: bold; }
        input, button, select { width: 100%; padding: 10px; margin: 4px 0; border-radius: 6px; border: none; font-size: 13px; font-weight: bold; }
        input, select { background: #0f172a; color: #fff; text-align: center; border: 2px solid #334155; }
        
        .btn-main { background: #475569; color: #fff; cursor: pointer; border-bottom: 4px solid #1e293b; margin-top: 10px; }
        .btn-sec { background: #3b82f6; color: #fff; cursor: pointer; border-bottom: 4px solid #1d4ed8; }
        .btn-join { background: #10b981; color: #000; cursor: pointer; border-bottom: 4px solid #047857; }
        button:active { border-bottom: 0px; transform: translateY(4px); }

        #gameWrapper { display: none; position: relative; width: 100vw; height: 100vh; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; transform: translate(-50%, -50%); pointer-events: none; z-index: 6; background: #10b981; border-radius: 50%; border: 1px solid #000; }
        
        #timerUI {
            position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.85); border: 2px solid #f59e0b; padding: 6px 16px;
            border-radius: 20px; color: #f59e0b; font-size: 18px; font-weight: 900; z-index: 5;
            letter-spacing: 1px; box-shadow: 0 0 10px rgba(245, 158, 11, 0.3);
        }

        #scopeOverlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9; display: none;
            background: radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.95) 25%, #000 100%);
        }
        #scopeOverlay::before, #scopeOverlay::after { content: ''; position: absolute; background: rgba(220, 38, 38, 0.7); }
        #scopeOverlay::before { top: 50%; left: 0; right: 0; height: 1px; }
        #scopeOverlay::after { left: 50%; top: 0; bottom: 0; width: 1px; }

        #healthUI { position: absolute; top: 12px; left: 12px; background: rgba(15, 23, 42, 0.85); padding: 8px 12px; border-radius: 8px; border: 2px solid #475569; color: #fff; font-size: 11px; z-index: 4; width: 160px; }
        .hp-bar-container { width: 100%; background: #334155; height: 10px; border-radius: 5px; margin-top: 4px; overflow: hidden; }
        #hpBarFill { width: 100%; background: #10b981; height: 100%; transition: width 0.2s; }
        #ammoDisplay { margin-top: 4px; font-size: 11px; color: #cbd5e1; display: flex; justify-content: space-between; }

        #weapon3DAmmoUI {
            position: absolute; bottom: 120px; right: 28%; background: rgba(15, 23, 42, 0.75);
            padding: 4px 10px; border-radius: 6px; border: 1px solid #64748b; color: #38bdf8;
            font-size: 14px; font-weight: 900; pointer-events: none; z-index: 5;
        }

        #weaponUI { position: absolute; bottom: 12px; right: 12px; background: rgba(15, 23, 42, 0.85); padding: 6px 10px; border-radius: 8px; border: 2px solid #475569; color: #fff; font-size: 11px; z-index: 4; text-align: center; }
        .weapon-slots { display: flex; gap: 4px; margin-top: 4px; }
        .slot { padding: 4px 8px; background: #1e293b; border: 2px solid #334155; border-radius: 4px; font-size: 10px; color: #fff; cursor: pointer; font-weight: bold; }
        .slot.active { border-color: #38bdf8; background: #0284c7; color: #fff; }

        .touch-controls { position: absolute; bottom: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; align-items: flex-end; pointer-events: none; z-index: 5; }
        .joystick-zone { width: 90px; height: 90px; border: 2px dashed rgba(255, 255, 255, 0.3); border-radius: 50%; display: flex; justify-content: center; align-items: center; pointer-events: auto; background: rgba(0,0,0,0.3); position: relative; }
        .joystick-stick { width: 35px; height: 35px; background: #64748b; border-radius: 50%; position: absolute; }
        .touch-action-btns { display: flex; gap: 6px; pointer-events: auto; flex-wrap: wrap; max-width: 220px; justify-content: flex-end; }
        .action-btn { width: 42px; height: 42px; border-radius: 8px; display: flex; justify-content: center; align-items: center; color: white; font-weight: 900; font-size: 10px; border: 2px solid #000; }
        .fire-btn { background: #ef4444; width: 48px; height: 48px; font-size: 11px; }
        .ads-btn { background: #8b5cf6; }
        .jump-btn { background: #10b981; }
        .sprint-btn { background: #f59e0b; }
        .prone-btn { background: #64748b; }
        .reload-btn { background: #3b82f6; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

<div id="mainMenu">
    <div class="menu-card">
        <h1>KRUNK-WAR 3D</h1>
        
        <label>اسم اللاعب:</label>
        <input type="text" id="playerName" placeholder="ادخل اسمك" maxlength="10" value="مقاتل">

        <label>الجهاز:</label>
        <select id="deviceSelect">
            <option value="pc">💻 كمبيوتر (ماوس + كيبورد)</option>
            <option value="phone">📱 هاتف (أزرار لمس)</option>
        </select>

        <button class="btn-main" onclick="start3DGame()">دخول اللعبة 🚀</button>
    </div>
</div>

<div id="gameWrapper">
    <div id="crosshair"></div>
    <div id="scopeOverlay"></div>
    <div id="timerUI">04:00</div>

    <div id="healthUI">
        <div>الصحة (HP): <span id="hpValue">100</span></div>
        <div class="hp-bar-container"><div id="hpBarFill"></div></div>
        <div id="ammoDisplay">
            <span>الذخيرة:</span>
            <span id="ammoCount">10 / 50</span>
        </div>
    </div>

    <div id="weapon3DAmmoUI">AMMO: 10</div>

    <div id="weaponUI">
        <div id="currentWeaponText">بندقية قنص 🎯</div>
        <div class="weapon-slots">
            <div class="slot" id="slot1" onclick="selectWeapon(1)">1: سكين</div>
            <div class="slot" id="slot2" onclick="selectWeapon(2)">2: مسدس</div>
            <div class="slot active" id="slot3" onclick="selectWeapon(3)">3: قناصة</div>
        </div>
    </div>
</div>

<div class="touch-controls" id="touchUI" style="display: none;">
    <div class="joystick-zone" id="joyZone"><div class="joystick-stick" id="joyStick"></div></div>
    <div class="touch-action-btns">
        <div class="action-btn ads-btn" id="adsBtn">🔍 سكوب</div>
        <div class="action-btn reload-btn" id="reloadBtn">🔄 تعبئة</div>
        <div class="action-btn sprint-btn" id="sprintBtn">⚡ جري</div>
        <div class="action-btn prone-btn" id="proneBtn">⬇️ C</div>
        <div class="action-btn jump-btn" id="jumpBtn">🦘 قفز</div>
        <div class="action-btn fire-btn" id="fireBtn">إطلاق</div>
    </div>
</div>

<script>
    let scene, camera, renderer;
    let myPos = { x: 2500, y: 35, z: 2500 };
    let playerYaw = 0, playerPitch = 0;
    let selectedDevice = "pc";
    
    const keys = { w: false, a: false, s: false, d: false, shift: false, c: false };
    let touchMove = { x: 0, y: 0 };
    let isSprinting = false;

    // حالة الضغط على زر الزحلقة/الانبطاح C
    let isHoldingC = false;
    let isAiming = false;

    let baseEyeHeight = 35;
    let currentEyeHeight = 35;
    let velocityY = 0, isGrounded = true;
    
    const gravity = -0.4;
    const jumpPower = 6.5; 
    let baseMoveSpeed = 3.2;

    let roundTimeSeconds = 240;
    let timerInterval;

    let fpWeaponGroup, currentKnifeMesh, currentPistolMesh, currentRifleMesh;
    let knifeAnimTime = 0, isKnifeSwinging = false;
    let recoilOffset = 0;
    let walkBobble = 0;

    let colliders = [];
    let houseFloors = [];
    let houseStairs = [];

    const WEAPONS = {
        1: { name: "سكين تكتيكي 🗡️", cd: 200, damage: 100, maxAmmo: Infinity, currentAmmo: Infinity, isMelee: true },
        2: { name: "مسدس فاخر 🔫", cd: 180, damage: 40, maxAmmo: 12, currentAmmo: 12, reserveAmmo: 60 },
        3: { name: "بندقية قنص 🎯", cd: 400, damage: 90, maxAmmo: 10, currentAmmo: 10, reserveAmmo: 50 }
    };
    let currentWeaponId = 3;

    function start3DGame() {
        selectedDevice = document.getElementById('deviceSelect').value;
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('gameWrapper').style.display = 'block';

        init3D();
        startRoundTimer();
    }

    function startRoundTimer() {
        timerInterval = setInterval(() => {
            roundTimeSeconds--;
            let mins = Math.floor(roundTimeSeconds / 60);
            let secs = roundTimeSeconds % 60;
            document.getElementById('timerUI').innerText = 
                `${mins < 10 ? '0' : ''}${mins}:${secs < 10 ? '0' : ''}${secs}`;

            if (roundTimeSeconds <= 0) {
                clearInterval(timerInterval);
                alert("انتهت الجولة!");
                location.reload();
            }
        }, 1000);
    }

    function init3D() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color('#78c8f6');
        scene.fog = new THREE.FogExp2('#78c8f6', 0.00012);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 4000);
        camera.rotation.order = 'YXZ';

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('gameWrapper').appendChild(renderer.domElement);

        const ambLight = new THREE.AmbientLight(0xffffff, 0.75);
        scene.add(ambLight);

        const dirLight = new THREE.DirectionalLight(0xfff5ea, 1.0);
        dirLight.position.set(1200, 2200, 1000);
        scene.add(dirLight);

        // 1. أرضية معشبة بارزة (واقعية مثل الصور)
        buildRealisticGrassField();

        // 2. منازل زاهية مع شوارع وسلالم خارجية (مطابقة لصورة المنزل الأحمر)
        buildRedStyleHouses();

        fpWeaponGroup = new THREE.Group();
        camera.add(fpWeaponGroup);
        scene.add(camera);

        buildAccurateWeapons();

        // إدخالات لوحة التحكم
        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyW') keys.w = true;
            if (e.code === 'KeyS') keys.s = true;
            if (e.code === 'KeyA') keys.a = true;
            if (e.code === 'KeyD') keys.d = true;
            if (e.code === 'ShiftLeft') keys.shift = true;
            
            // عند الضغط والاستمرار على C للزحلقة / الانبطاح
            if (e.code === 'KeyC') isHoldingC = true;

            if (e.code === 'Space' && isGrounded) { 
                velocityY = jumpPower; 
                isGrounded = false; 
            }
            if (e.code === 'KeyR') reloadWeapon();

            if (e.code === 'Digit1') selectWeapon(1);
            if (e.code === 'Digit2') selectWeapon(2);
            if (e.code === 'Digit3') selectWeapon(3);
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW') keys.w = false;
            if (e.code === 'KeyS') keys.s = false;
            if (e.code === 'KeyA') keys.a = false;
            if (e.code === 'KeyD') keys.d = false;
            if (e.code === 'ShiftLeft') keys.shift = false;

            // توقف الزحلقة فور رفع الإصبع عن C
            if (e.code === 'KeyC') isHoldingC = false;
        });

        if (selectedDevice === 'phone') {
            document.getElementById('touchUI').style.display = 'flex';
            setupTouch();
        } else {
            window.addEventListener('click', () => document.body.requestPointerLock());
            window.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === document.body) {
                    playerYaw -= e.movementX * 0.0022;
                    playerPitch -= e.movementY * 0.0022;
                    playerPitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, playerPitch));
                }
            });
            window.addEventListener('mousedown', (e) => {
                if (document.pointerLockElement === document.body) {
                    if (e.button === 0) performAttack();
                    if (e.button === 2) toggleADS(true);
                }
            });
            window.addEventListener('mouseup', (e) => {
                if (e.button === 2) toggleADS(false);
            });
            window.addEventListener('contextmenu', e => e.preventDefault());
        }

        selectWeapon(3);
        animate();
    }

    // إنشاء عشب بارز ومفصل ثلاثي الأبعاد
    function buildRealisticGrassField() {
        const floorMat = new THREE.MeshLambertMaterial({ color: 0x48bb78 });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(5000, 5000), floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.set(2500, 0, 2500);
        scene.add(floor);

        // إضافة شجيرات وعشب بارز ذو تضاريس
        const grassBladeGeo = new THREE.BoxGeometry(4, 14, 4);
        const grassBladeMat = new THREE.MeshLambertMaterial({ color: 0x2f855a });
        const grassInstanced = new THREE.InstancedMesh(grassBladeGeo, grassBladeMat, 800);

        const dummy = new THREE.Object3D();
        for (let i = 0; i < 800; i++) {
            dummy.position.set(200 + Math.random() * 4600, 7, 200 + Math.random() * 4600);
            dummy.rotation.y = Math.random() * Math.PI;
            dummy.scale.set(1, 0.8 + Math.random() * 0.6, 1);
            dummy.updateMatrix();
            grassInstanced.setMatrixAt(i, dummy.matrix);
        }
        scene.add(grassInstanced);
    }

    // بناء منازل زاهية التصميم مع شرفات وسلالم صلبة (تمنع الاختراق عند القفز)
    function buildRedStyleHouses() {
        const redMat = new THREE.MeshLambertMaterial({ color: 0xe53e3e }); // أحمر زاهي
        const woodMat = new THREE.MeshLambertMaterial({ color: 0xa0522d });
        const carMat = new THREE.MeshLambertMaterial({ color: 0xedf2f7 });

        for (let i = 0; i < 8; i++) {
            let hx = 700 + (i % 3) * 1300;
            let hz = 700 + Math.floor(i / 3) * 1300;

            let houseWidth = 320, houseDepth = 300, floorH = 65;

            // الدور الأول
            let baseHouse = new THREE.Mesh(new THREE.BoxGeometry(houseWidth, floorH, houseDepth), redMat);
            baseHouse.position.set(hx, floorH / 2, hz);
            scene.add(baseHouse);
            colliders.push({ x: hx, z: hz, w: houseWidth, d: houseDepth });

            // الدور الثاني (يتم الصعود له حصراً بالسلالم)
            let secondFloorMesh = new THREE.Mesh(new THREE.BoxGeometry(houseWidth - 20, floorH, houseDepth - 20), redMat);
            secondFloorMesh.position.set(hx, floorH + floorH / 2, hz);
            scene.add(secondFloorMesh);

            // سجّل أرضية الدور الثاني للفيزياء الدقيقة
            houseFloors.push({
                x: hx, z: hz, 
                w: houseWidth - 20, d: houseDepth - 20, 
                yFloor: floorH, 
                yCeil: floorH * 2
            });

            // سلم خارجي خشبي صلب
            for (let s = 0; s < 12; s++) {
                let step = new THREE.Mesh(new THREE.BoxGeometry(40, 5, 20), woodMat);
                let sx = hx + houseWidth / 2 + 20;
                let sy = s * 5.2 + 3;
                let sz = (hz - houseDepth / 3) + s * 16;
                step.position.set(sx, sy, sz);
                scene.add(step);

                houseStairs.push({ x: sx, z: sz, yStep: sy + baseEyeHeight, radius: 25 });
            }

            // سيارة ديكورية بيضاء بجانب المنزل
            let car = new THREE.Mesh(new THREE.BoxGeometry(70, 35, 130), carMat);
            car.position.set(hx - houseWidth / 2 - 60, 17.5, hz);
            scene.add(car);
            colliders.push({ x: hx - houseWidth / 2 - 60, z: hz, w: 70, d: 130 });
        }
    }

    function buildAccurateWeapons() {
        const darkMetalMat = new THREE.MeshLambertMaterial({ color: 0x1a202c });
        const oliveMat = new THREE.MeshLambertMaterial({ color: 0x556b2f });
        const goldMat = new THREE.MeshLambertMaterial({ color: 0xd4af37 });
        const woodGripMat = new THREE.MeshLambertMaterial({ color: 0x5c2c16 });
        const steelBladeMat = new THREE.MeshLambertMaterial({ color: 0xe2e8f0 });
        const greenKnifeGripMat = new THREE.MeshLambertMaterial({ color: 0x10b981 });

        // 1. السكين التكتيكي (مطابق للصورة)
        currentKnifeMesh = new THREE.Group();
        let blade = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.25, 1.2), steelBladeMat);
        blade.position.set(0, 0, -0.6);
        let grip = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.6, 12), greenKnifeGripMat);
        grip.rotation.x = Math.PI / 2;
        grip.position.set(0, -0.02, 0.3);
        currentKnifeMesh.add(blade, grip);
        currentKnifeMesh.position.set(0.35, -0.35, -0.8);
        fpWeaponGroup.add(currentKnifeMesh);

        // 2. المسدس الذهبي النقشي (مطابق للصورة)
        currentPistolMesh = new THREE.Group();
        let pSlide = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.22, 1.0), goldMat);
        pSlide.position.set(0, 0.1, -0.3);
        let pGrip = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.55, 0.3), woodGripMat);
        pGrip.rotation.x = -0.2;
        pGrip.position.set(0, -0.22, 0.05);
        currentPistolMesh.add(pSlide, pGrip);
        currentPistolMesh.position.set(0.3, -0.35, -0.7);
        currentPistolMesh.visible = false;
        fpWeaponGroup.add(currentPistolMesh);

        // 3. القناصة (مطابقة للصورة)
        currentRifleMesh = new THREE.Group();
        let rBody = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.32, 2.2), oliveMat);
        rBody.position.set(0, 0, -0.6);
        let rBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1.8, 12), darkMetalMat);
        rBarrel.rotation.x = Math.PI / 2;
        rBarrel.position.set(0, 0.02, -2.0);
        let rScope = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, 0.9, 16), darkMetalMat);
        rScope.rotation.x = Math.PI / 2;
        rScope.position.set(0, 0.28, -0.6);

        currentRifleMesh.add(rBody, rBarrel, rScope);
        currentRifleMesh.position.set(0.2, -0.3, -0.8);
        currentRifleMesh.visible = false;
        fpWeaponGroup.add(currentRifleMesh);
    }

    function toggleADS(state) {
        if (currentWeaponId === 1) return;
        isAiming = state;

        document.getElementById('crosshair').style.opacity = isAiming ? '0' : '1';
        document.getElementById('scopeOverlay').style.display = isAiming ? 'block' : 'none';

        fpWeaponGroup.visible = !isAiming;
        camera.fov = isAiming ? 25 : (isSprinting ? 85 : 75);
        camera.updateProjectionMatrix();
    }

    function selectWeapon(id) {
        currentWeaponId = id;
        toggleADS(false);

        document.querySelectorAll('.slot').forEach((s, idx) => s.classList.toggle('active', idx + 1 === id));
        document.getElementById('currentWeaponText').innerText = WEAPONS[id].name;

        currentKnifeMesh.visible = (id === 1);
        currentPistolMesh.visible = (id === 2);
        currentRifleMesh.visible = (id === 3);

        updateAmmoUI();
    }

    function reloadWeapon() {
        const w = WEAPONS[currentWeaponId];
        if (w.isMelee || w.currentAmmo === w.maxAmmo || w.reserveAmmo <= 0) return;

        let needed = w.maxAmmo - w.currentAmmo;
        let reloadAmount = Math.min(needed, w.reserveAmmo);
        w.currentAmmo += reloadAmount;
        w.reserveAmmo -= reloadAmount;

        updateAmmoUI();
    }

    function updateAmmoUI() {
        const w = WEAPONS[currentWeaponId];
        document.getElementById('ammoCount').innerText = w.isMelee ? "∞ / ∞" : `${w.currentAmmo} / ${w.reserveAmmo}`;
        document.getElementById('weapon3DAmmoUI').innerText = w.isMelee ? "KNIFE" : `AMMO: ${w.currentAmmo}`;
    }

    function checkWallCollision(nextX, nextZ) {
        const playerRadius = 14;
        for (let c of colliders) {
            if (nextX + playerRadius > c.x - c.w/2 && nextX - playerRadius < c.x + c.w/2 &&
                nextZ + playerRadius > c.z - c.d/2 && nextZ - playerRadius < c.z + c.d/2) {
                return true;
            }
        }
        return false;
    }

    function animate() {
        requestAnimationFrame(animate);

        let inputX = 0, inputZ = 0;
        if (keys.w) inputZ += 1;
        if (keys.s) inputZ -= 1;
        if (keys.a) inputX -= 1;
        if (keys.d) inputX += 1;

        if (touchMove.x !== 0 || touchMove.y !== 0) {
            inputX = touchMove.x;
            inputZ = -touchMove.y;
        }

        // الزحلقة / الانبطاح مرتبطان حصراً بالاستمرار بالضغط على C
        let isSlidingOrProne = isHoldingC;
        isSprinting = (keys.shift || touchMove.isSprint) && keys.w && !isAiming && !isSlidingOrProne;

        let speed = baseMoveSpeed;
        if (isSprinting) speed *= 1.6;

        // عند الاستمرار بالضغط على زر C (انزلاق سريع أثناء الجري / انبطاح عند الوقوف)
        if (isSlidingOrProne) {
            currentEyeHeight = 12; // انخفاض الرؤية للأرض
            speed = isSprinting ? baseMoveSpeed * 2.2 : baseMoveSpeed * 0.4;
        } else {
            currentEyeHeight = baseEyeHeight;
        }

        let isMoving = (inputX !== 0 || inputZ !== 0);

        if (isMoving) {
            let sin = Math.sin(playerYaw);
            let cos = Math.cos(playerYaw);
            let nextX = myPos.x + (inputX * cos - inputZ * sin) * speed;
            let nextZ = myPos.z + (-inputX * sin - inputZ * cos) * speed;

            if (!checkWallCollision(nextX, myPos.z)) myPos.x = nextX;
            if (!checkWallCollision(myPos.x, nextZ)) myPos.z = nextZ;
        }

        // --- نظام فيزياء الأدوار القوي (يمنع الاختراق بالقفز) ---
        let targetGroundY = currentEyeHeight; // الأرضية الأساسية

        // التحقق من السلالم
        for (let st of houseStairs) {
            let dx = myPos.x - st.x;
            let dz = myPos.z - st.z;
            if (Math.sqrt(dx * dx + dz * dz) < st.radius) {
                targetGroundY = st.yStep;
            }
        }

        // التحقق من الأدوار العلوية (فقط إذا كان اللاعب أعلى من مستوى سقف الدور الأول)
        for (let fl of houseFloors) {
            if (myPos.x > fl.x - fl.w/2 && myPos.x < fl.x + fl.w/2 &&
                myPos.z > fl.z - fl.d/2 && myPos.z < fl.z + fl.d/2) {
                
                // إذا كان اللاعب فوق الدور الثاني بالفعل ينزل عليه
                if (myPos.y >= fl.yFloor + currentEyeHeight - 5) {
                    targetGroundY = fl.yFloor + currentEyeHeight;
                } else {
                    // إذا كان بالأسفل وقفز، يتصادم مع السقف ولن يعبره
                    if (myPos.y + velocityY > fl.yFloor) {
                        velocityY = -0.1; // التصادم بالسقف
                    }
                }
            }
        }

        // تطبيق الجاذبية والحركة الرأسية
        velocityY += gravity;
        myPos.y += velocityY;

        if (myPos.y <= targetGroundY) {
            myPos.y = targetGroundY;
            velocityY = 0;
            isGrounded = true;
        }

        if (isMoving && isGrounded && !isAiming) {
            walkBobble += isSprinting ? 0.22 : 0.12;
            fpWeaponGroup.position.y = Math.sin(walkBobble) * (isSprinting ? 0.06 : 0.03);
        } else {
            fpWeaponGroup.position.set(0, 0, 0);
        }

        if (recoilOffset > 0) {
            recoilOffset -= 0.05;
            fpWeaponGroup.position.z = recoilOffset;
        }

        if (isKnifeSwinging) {
            knifeAnimTime += 0.22;
            currentKnifeMesh.position.z = -0.8 - Math.sin(knifeAnimTime) * 0.4;
            if (knifeAnimTime >= Math.PI) {
                isKnifeSwinging = false;
                knifeAnimTime = 0;
                currentKnifeMesh.position.set(0.35, -0.35, -0.8);
            }
        }

        if (camera) {
            camera.position.set(myPos.x, myPos.y, myPos.z);
            camera.rotation.y = playerYaw;
            camera.rotation.x = playerPitch;
        }

        renderer.render(scene, camera);
    }

    function setupTouch() {
        const joyZone = document.getElementById('joyZone');
        const joyStick = document.getElementById('joyStick');

        joyZone.addEventListener('touchmove', (e) => {
            const rect = joyZone.getBoundingClientRect();
            const touch = e.touches[0];
            let x = touch.clientX - (rect.left + rect.width / 2);
            let y = touch.clientY - (rect.top + rect.height / 2);
            let dist = Math.sqrt(x * x + y * y);
            let maxDist = 35;

            if (dist > maxDist) {
                x = (x / dist) * maxDist;
                y = (y / dist) * maxDist;
            }

            joyStick.style.transform = `translate(${x}px, ${y}px)`;
            touchMove.x = x / maxDist;
            touchMove.y = y / maxDist;
        });

        joyZone.addEventListener('touchend', () => {
            joyStick.style.transform = `translate(0px, 0px)`;
            touchMove.x = 0;
            touchMove.y = 0;
        });

        document.getElementById('fireBtn').addEventListener('touchstart', performAttack);
        document.getElementById('adsBtn').addEventListener('touchstart', () => toggleADS(!isAiming));
        document.getElementById('reloadBtn').addEventListener('touchstart', reloadWeapon);
        
        // زر C باللمس للزحلقة مع رفع الأصبع
        const proneBtn = document.getElementById('proneBtn');
        proneBtn.addEventListener('touchstart', (e) => { e.preventDefault(); isHoldingC = true; });
        proneBtn.addEventListener('touchend', (e) => { e.preventDefault(); isHoldingC = false; });

        document.getElementById('sprintBtn').addEventListener('touchstart', () => {
            touchMove.isSprint = !touchMove.isSprint;
            document.getElementById('sprintBtn').style.backgroundColor = touchMove.isSprint ? '#10b981' : '#f59e0b';
        });
        document.getElementById('jumpBtn').addEventListener('touchstart', () => {
            if (isGrounded) { velocityY = jumpPower; isGrounded = false; }
        });
    }

    function performAttack() {
        const weapon = WEAPONS[currentWeaponId];

        if (weapon.isMelee) {
            if (!isKnifeSwinging) {
                isKnifeSwinging = true;
                knifeAnimTime = 0;
            }
            return;
        }

        if (weapon.currentAmmo <= 0) {
            reloadWeapon();
            return;
        }

        weapon.currentAmmo--;
        updateAmmoUI();

        recoilOffset = 0.2;
        playerPitch += 0.01;
    }
</script>
