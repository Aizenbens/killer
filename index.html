<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE WAR</title>
    <style>
        body { margin: 0; background: #010a07; overflow: hidden; touch-action: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        #mainMenu {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, #153e2d 0%, #05140e 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; color: #fff;
        }
        .menu-card {
            background: rgba(4, 18, 13, 0.9); padding: 40px 30px; border-radius: 20px;
            box-shadow: 0 0 35px rgba(46, 204, 113, 0.2); width: 340px; text-align: center; border: 2px solid #2ecc71;
        }
        h1 { margin-top: 0; font-size: 36px; color: #2ecc71; letter-spacing: 2px; text-shadow: 0 0 10px rgba(46,204,113,0.5); }
        input, button { width: 100%; padding: 14px; margin: 12px 0; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box; }
        input { background: rgba(255,255,255,0.9); color: #111; font-weight: bold; text-align: center; border: 2px solid transparent; }
        input:focus { border-color: #2ecc71; outline: none; }
        button { background: #2ecc71; color: #05140e; font-weight: bold; cursor: pointer; transition: 0.3s; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(46,204,113,0.4); }
        button:hover { background: #27ae60; transform: scale(1.03); color: #fff; }

        #gameWrapper { display: none; position: relative; width: 100vw; height: 100vh; }
        
        #scoreboard {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(5,20,14,0.85); padding: 10px 30px; border-radius: 30px;
            color: #fff; font-weight: bold; font-size: 16px; display: flex; gap: 20px;
            border: 2px solid #2ecc71; pointer-events: none; z-index: 4; box-shadow: 0 0 15px rgba(46,204,113,0.3);
        }
        
        #healthUI {
            position: absolute; top: 15px; left: 15px; background: rgba(5,20,14,0.85);
            padding: 10px 18px; border-radius: 12px; border: 1px solid #fff;
            color: #fff; font-weight: bold; font-size: 13px; z-index: 4; width: 150px;
        }
        .hp-bar-container { width: 100%; background: #222; height: 12px; border-radius: 6px; margin-top: 6px; overflow: hidden; border: 1px solid #444; }
        #hpBarFill { width: 100%; background: #2ecc71; height: 100%; transition: width 0.2s; box-shadow: 0 0 8px #2ecc71; }

        #logBox { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.75); color: #2ecc71; padding: 8px; border-radius: 5px; font-size: 11px; max-width: 180px; pointer-events: none; direction: rtl; z-index: 4; border-right: 3px solid #2ecc71; }
        
        #chatContainer {
            position: absolute; bottom: 130px; left: 15px; width: 220px;
            background: rgba(5,20,14,0.7); border-radius: 8px; padding: 8px; display: flex; flex-direction: column; z-index: 4; border: 1px solid rgba(255,255,255,0.1);
        }
        #chatArea { height: 80px; overflow-y: auto; color: #fff; font-size: 11px; margin-bottom: 5px; text-align: right; direction: rtl; }
        #chatInput { padding: 6px; margin: 0; font-size: 11px; width: 100%; background: rgba(255,255,255,0.15); color: #fff; border: 1px solid #444; border-radius: 4px; }

        .nametag { position: absolute; color: #fff; font-weight: bold; font-size: 11px; background: rgba(5,20,14,0.85); padding: 3px 7px; border-radius: 6px; pointer-events: none; z-index: 3; text-align: center; transform: translate(-50%, -100%); border: 1px solid rgba(255,255,255,0.25); box-shadow: 0 2px 6px rgba(0,0,0,0.5); }

        .touch-controls { position: absolute; bottom: 25px; left: 20px; right: 20px; display: flex; justify-content: space-between; pointer-events: none; width: calc(100% - 40px); z-index: 5; }
        .joystick-zone { width: 110px; height: 110px; background: rgba(46, 204, 113, 0.05); border: 2px dashed rgba(46, 204, 113, 0.4); border-radius: 50%; display: flex; justify-content: center; align-items: center; pointer-events: auto; }
        .joystick-stick { width: 45px; height: 45px; background: rgba(46, 204, 113, 0.6); border-radius: 50%; box-shadow: 0 0 15px rgba(46,204,113,0.5); }
        .fire-btn { width: 85px; height: 85px; background: rgba(231, 76, 60, 0.7); border: 3px solid #ff7675; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 16px; user-select: none; pointer-events: auto; box-shadow: 0 0 15px rgba(231,76,60,0.5); align-self: center; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div id="mainMenu">
    <div class="menu-card">
        <h1>THE WAR</h1>
        <input type="text" id="playerName" placeholder="أدخل اسم المقاتل..." maxlength="12">
        <button id="startBtn">START</button>
    </div>
</div>

<div id="gameWrapper">
    <div id="healthUI">
        <div>صحة المقاتل (HP)</div>
        <div class="hp-bar-container"><div id="hpBarFill"></div></div>
    </div>

    <div id="scoreboard">
        <span style="color: #3498db;">الفريق الأزرق: <span id="blueScore">0</span></span>
        <span>🆚</span>
        <span style="color: #e74c3c;"><span id="redScore">0</span> :الفريق الأحمر</span>
    </div>
    
    <div id="logBox"></div>
    <div id="labelsContainer"></div>
    
    <div id="chatContainer">
        <div id="chatArea"></div>
        <input type="text" id="chatInput" placeholder="اكتب للجروب..." maxlength="40">
    </div>
</div>

<div class="touch-controls" id="touchUI" style="display: none;">
    <div class="joystick-zone" id="joyZone">
        <div class="joystick-stick" id="joyStick"></div>
    </div>
    <div class="fire-btn" id="fireBtn">FIRE</div>
</div>

<script>
    const socket = io();
    let scene, camera, renderer;
    let playerGroups = {}; 
    let bulletMeshes = [];
    let obstacleMeshes = [];
    let myTeam = "blue";
    const movement = { up: false, down: false, left: false, right: false };
    let myPlayerPos = { x: 400, y: 300 };

    function init3D() {
        try {
            const container = document.getElementById('gameWrapper');
            scene = new THREE.Scene();
            scene.background = new THREE.Color('#020f0b'); 
            scene.fog = new THREE.FogExp2('#020f0b', 0.0015);

            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 3000);
            camera.position.set(400, 520, 750);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(200, 600, 400);
            scene.add(dirLight);

            // إنشاء خريطة تكتيكية رقمية (Cyber Grid Floor)
            const floorGeo = new THREE.PlaneGeometry(1000, 800);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x0a1c15, roughness: 0.7, metalness: 0.2 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.set(400, 0, 300);
            scene.add(floor);

            const gridHelper = new THREE.GridHelper(1200, 60, 0x2ecc71, 0x0d3826);
            gridHelper.position.set(400, 0.5, 300);
            scene.add(gridHelper);

            window.addEventListener('resize', onWindowResize);
            animate();
        } catch (error) {}
    }

    function onWindowResize() {
        if (!camera || !renderer) return;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // تصميم شخصيات مطور ومحسن بالكامل
    function createStickMan(teamColor) {
        const group = new THREE.Group();
        
        group.userData = {
            baseColor: teamColor,
            normalMaterial: new THREE.MeshStandardMaterial({ color: teamColor, roughness: 0.3, metalness: 0.3 }),
            damageMaterial: new THREE.MeshBasicMaterial({ color: 0xffffff }),
            armorMaterial: new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.5, metalness: 0.7 }),
            visorMaterial: new THREE.MeshBasicMaterial({ color: teamColor === 0x3498db ? 0x00ffff : 0xff3333 })
        };

        const mat = group.userData.normalMaterial;
        const armorMat = group.userData.armorMaterial;

        // الرأس والخوذة الحربية
        const headGeo = new THREE.SphereGeometry(6, 24, 24);
        const head = new THREE.Mesh(headGeo, mat);
        head.position.y = 34;
        group.add(head);

        const helmetGeo = new THREE.SphereGeometry(6.3, 16, 16, 0, Math.PI*2, 0, Math.PI/2);
        const helmet = new THREE.Mesh(helmetGeo, armorMat);
        helmet.position.y = 34.5;
        group.add(helmet);

        // النظارة القتالية المضيئة (Visor)
        const visorGeo = new THREE.CylinderGeometry(2, 2, 6, 12);
        const visor = new THREE.Mesh(visorGeo, group.userData.visorMaterial);
        visor.position.set(0, 34.5, 4.5);
        visor.rotation.z = Math.PI / 2;
        group.add(visor);

        // الجسد ودرع الحماية التكتيكي
        const bodyGeo = new THREE.CylinderGeometry(2, 2, 16, 12);
        const body = new THREE.Mesh(bodyGeo, mat);
        body.position.y = 22;
        group.add(body);

        const armorVestGeo = new THREE.CylinderGeometry(2.5, 2.5, 10, 12);
        const armorVest = new THREE.Mesh(armorVestGeo, armorMat);
        armorVest.position.y = 24;
        group.add(armorVest);

        // الأرجل
        const legGeo = new THREE.CylinderGeometry(1.2, 0.9, 14, 12);
        
        const leftLeg = new THREE.Mesh(legGeo, mat);
        leftLeg.geometry.translate(0, -7, 0); 
        leftLeg.position.set(-3.5, 14, 0);
        group.add(leftLeg);
        group.userData.leftLeg = leftLeg;

        const rightLeg = new THREE.Mesh(legGeo, mat);
        rightLeg.geometry.translate(0, -7, 0); 
        rightLeg.position.set(3.5, 14, 0);
        group.add(rightLeg);
        group.userData.rightLeg = rightLeg;

        // الأيدي وبندقية ليزر متطورة
        const armGeo = new THREE.CylinderGeometry(0.9, 0.8, 12, 12);
        const leftArm = new THREE.Mesh(armGeo, mat);
        leftArm.position.set(-5.5, 24, 2);
        leftArm.rotation.x = Math.PI / 3;
        group.add(leftArm);

        // تصميم السلاح (بندقية آلية مع منظار)
        const gunGroup = new THREE.Group();
        const mainBarrel = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 20, 12), armorMat);
        mainBarrel.rotation.z = Math.PI / 2;
        gunGroup.add(mainBarrel);

        const scope = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 6, 8), armorMat);
        scope.position.set(0, 2, 0);
        scope.rotation.z = Math.PI / 2;
        gunGroup.add(scope);

        const laserSight = new THREE.Mesh(new THREE.SphereGeometry(0.6, 8, 8), group.userData.visorMaterial);
        laserSight.position.set(10, 0, 0);
        gunGroup.add(laserSight);

        gunGroup.position.set(10, 24, 5);
        group.add(gunGroup);

        return group;
    }

    document.getElementById('startBtn').addEventListener('click', function() {
        const nameInput = document.getElementById('playerName');
        const name = nameInput.value.trim() || "مقاتل_" + Math.floor(Math.random()*100);
        
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('gameWrapper').style.display = 'block';
        
        if(window.innerWidth < 1024 || 'ontouchstart' in window) {
            document.getElementById('touchUI').style.display = 'flex';
        }

        init3D();
        socket.emit('initGame', { name: name });
    });

    socket.on('teamAssignment', (team) => { myTeam = team; });

    socket.on('state', (state) => {
        if (!scene) return;

        if(state.score) {
            document.getElementById('blueScore').innerText = state.score.blue;
            document.getElementById('redScore').innerText = state.score.red;
        }

        // بناء العوائق بشكل حواجز عسكرية تكتيكية متطورة
        if (obstacleMeshes.length === 0 && state.obstacles) {
            state.obstacles.forEach(obs => {
                const obsGroup = new THREE.Group();
                
                // المجسم الأساسي للحاجز
                const geo = new THREE.BoxGeometry(obs.w, 35, obs.h);
                const mat = new THREE.MeshStandardMaterial({ color: 0x1a2e26, roughness: 0.5, metalness: 0.6 }); 
                const box = new THREE.Mesh(geo, mat);
                box.position.y = 17.5;
                obsGroup.add(box);

                // خطوط نيون مضيئة فوق الحاجز للتجميل البصري
                const neonGeo = new THREE.BoxGeometry(obs.w + 1, 2, obs.h + 1);
                const neonMat = new THREE.MeshBasicMaterial({ color: 0x2ecc71 });
                const neon = new THREE.Mesh(neonGeo, neonMat);
                neon.position.y = 35;
                obsGroup.add(neon);

                obsGroup.position.set(obs.x, 0, obs.y);
                scene.add(obsGroup);
                obstacleMeshes.push(obsGroup);
            });
        }

        const labelsContainer = document.getElementById('labelsContainer');
        
        for (let id in playerGroups) {
            if (!state.players[id] || state.players[id].hp <= 0) {
                scene.remove(playerGroups[id]);
                delete playerGroups[id];
                const existingLabel = document.getElementById('label_' + id);
                if (existingLabel) existingLabel.remove();
            }
        }

        for (let id in state.players) {
            let p = state.players[id];
            if (p.hp <= 0) continue;

            if (id === socket.id) {
                myPlayerPos.x = p.x;
                myPlayerPos.y = p.y;
                const fill = document.getElementById('hpBarFill');
                if(fill) {
                    fill.style.width = p.hp + '%';
                    if (p.hp < 40) fill.style.background = '#e74c3c';
                    else fill.style.background = '#2ecc71';
                }
            }

            if (!playerGroups[id]) {
                if (!p.name) continue;

                const tColor = p.team === "blue" ? 0x3498db : 0xe74c3c;
                playerGroups[id] = createStickMan(tColor);
                scene.add(playerGroups[id]);

                const label = document.createElement('div');
                label.id = 'label_' + id;
                label.className = 'nametag';
                label.innerText = p.name;
                if(labelsContainer) labelsContainer.appendChild(label);
            } else {
                const label = document.getElementById('label_' + id);
                if (label && label.innerText !== p.name && p.name) {
                    label.innerText = p.name;
                }
            }

            let pg = playerGroups[id];
            pg.position.set(p.x, 0, p.y);
            pg.rotation.y = -p.angle;

            if (p.damaged) {
                pg.traverse((child) => {
                    if (child instanceof THREE.Mesh && child.material !== pg.userData.damageMaterial) {
                        child.material = pg.userData.damageMaterial;
                    }
                });
            } else {
                pg.traverse((child) => {
                    if (child instanceof THREE.Mesh && child.material !== pg.userData.normalMaterial && child.material !== pg.userData.armorMaterial && child.material !== pg.userData.visorMaterial) {
                        child.material = pg.userData.normalMaterial;
                    }
                });
            }

            if (p.isMoving) {
                let time = Date.now() * 0.012;
                pg.userData.leftLeg.rotation.x = Math.sin(time) * 0.65;
                pg.userData.rightLeg.rotation.x = -Math.sin(time) * 0.65;
            } else {
                pg.userData.leftLeg.rotation.x = 0;
                pg.userData.rightLeg.rotation.x = 0;
            }

            const label = document.getElementById('label_' + id);
            if (label && camera) {
                const wp = new THREE.Vector3(p.x, 46, p.y);
                wp.project(camera);
                const screenX = (wp.x * .5 + .5) * window.innerWidth;
                const screenY = (-(wp.y * .5) + .5) * window.innerHeight;
                label.style.left = screenX + 'px';
                label.style.top = screenY + 'px';
            }

            if (id === socket.id && camera) {
                camera.position.set(p.x, 520, p.y + 390);
                camera.lookAt(p.x, 0, p.y);
            }
        }

        bulletMeshes.forEach(mesh => scene.remove(mesh));
        bulletMeshes = [];

        // طلقات الليزر المضيئة والمطورة بصرياً
        state.bullets.forEach(b => {
            const geometry = new THREE.SphereGeometry(3.5, 16, 16);
            const color = b.team === "blue" ? 0x00ffff : 0xff3300;
            const material = new THREE.MeshBasicMaterial({ color: color });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(b.x, 24, b.y); 
            scene.add(mesh);
            bulletMeshes.push(mesh);
        });

        const logBox = document.getElementById('logBox');
        if(logBox) {
            logBox.innerHTML = '';
            state.logs.forEach(log => {
                const div = document.createElement('div');
                div.innerText = log.text;
                logBox.appendChild(div);
            });
        }
    });

    const chatInput = document.getElementById('chatInput');
    const chatArea = document.getElementById('chatArea');

    if(chatInput) {
        chatInput.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && chatInput.value.trim() !== "") {
                socket.emit('chatMessage', chatInput.value.trim());
                chatInput.value = '';
            }
        });
    }

    socket.on('chatUpdate', (data) => {
        if(!chatArea) return;
        const div = document.createElement('div');
        let tColor = data.team === "blue" ? "#3498db" : "#e74c3c";
        div.innerHTML = `<strong style="color: ${tColor}">${data.name}:</strong> ${data.text}`;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    });

    const joyZone = document.getElementById('joyZone');
    const joyStick = document.getElementById('joyStick');
    let joyActive = false;

    joyZone.addEventListener('touchstart', (e) => { joyActive = true; }, false);
    window.addEventListener('touchmove', handleJoyMove, { passive: false });
    window.addEventListener('touchend', (e) => {
        joyActive = false;
        joyStick.style.transform = 'translate(0px, 0px)';
        movement.up = false; movement.down = false; movement.left = false; movement.right = false;
        socket.emit('movement', movement);
    }, false);

    function handleJoyMove(e) {
        if (!joyActive) return;
        e.preventDefault();
        let touch = e.touches[0];
        let rect = joyZone.getBoundingClientRect();
        let centerX = rect.left + rect.width / 2;
        let centerY = rect.top + rect.height / 2;
        let deltaX = touch.clientX - centerX;
        let deltaY = touch.clientY - centerY;
        let distance = Math.min(Math.sqrt(deltaX*deltaX + deltaY*deltaY), 35);
        let angle = Math.atan2(deltaY, deltaX);

        joyStick.style.transform = `translate(${
