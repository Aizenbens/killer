<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>the war of زنادقة</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        #mainMenu {
            position: absolute; width: 100%; height: 100%;
            background: #0d231a url('image_dc0ddb.jpg') no-repeat center center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        .menu-card {
            background: rgba(0, 0, 0, 0.75); padding: 30px; border-radius: 15px;
            box-shadow: 0 0 25px rgba(255,255,255,0.1); width: 320px; text-align: center; border: 1px solid rgba(255,255,255,0.2);
        }
        h1 { margin-top: 0; font-size: 28px; letter-spacing: 2px; color: #f3f3f3; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box; }
        input { background: rgba(255,255,255,0.9); color: #222; font-weight: bold; }
        button { background: #1b4d3e; color: #fff; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #277459; transform: scale(1.02); }

        #gameWrapper { display: none; position: relative; width: 100vw; height: 100vh; }
        
        #scoreboard {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); padding: 10px 25px; border-radius: 30px;
            color: #fff; font-weight: bold; font-size: 18px; display: flex; gap: 20px;
            border: 2px solid #fff; pointer-events: none; z-index: 4;
        }
        
        #healthUI {
            position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.75);
            padding: 12px 20px; border-radius: 10px; border: 1px solid #fff;
            color: #fff; font-weight: bold; font-size: 16px; z-index: 4; width: 200px;
        }
        .hp-bar-container { width: 100%; background: #444; height: 15px; border-radius: 5px; margin-top: 5px; overflow: hidden; }
        #hpBarFill { width: 100%; background: #2ecc71; height: 100%; transition: width 0.2s; }

        #logBox { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: #fff; padding: 10px; border-radius: 5px; font-size: 13px; max-width: 220px; pointer-events: none; direction: rtl; z-index: 4; }
        
        #chatContainer {
            position: absolute; bottom: 15px; left: 15px; width: 260px;
            background: rgba(0,0,0,0.6); border-radius: 8px; padding: 10px; display: flex; flex-direction: column; z-index: 4;
        }
        #chatArea { height: 120px; overflow-y: auto; color: #fff; font-size: 13px; margin-bottom: 5px; text-align: right; direction: rtl; }
        #chatInput { padding: 6px; margin: 0; font-size: 13px; width: 100%; background: rgba(255,255,255,0.2); color: #fff; border: 1px solid #777; }

        .nametag { position: absolute; color: #fff; font-weight: bold; font-size: 12px; background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 4px; pointer-events: none; z-index: 3; text-align: center; transform: translate(-50%, -100%); }

        .touch-controls { position: absolute; bottom: 30px; left: 30px; right: 30px; display: flex; justify-content: space-between; pointer-events: none; width: calc(100% - 60px); z-index: 5; }
        .joystick, .fire-btn { width: 90px; height: 90px; background: rgba(255, 255, 255, 0.25); border: 3px solid #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; user-select: none; pointer-events: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .fire-btn { background: rgba(255, 0, 0, 0.5); border-color: #ff5555; }
        @media (min-width: 768px) { .touch-controls { display: none; } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div id="mainMenu">
    <div class="menu-card">
        <h1>the war of زنادقة</h1>
        <input type="text" id="playerName" placeholder="أدخل اسم المقاتل..." maxlength="12">
        <button onclick="startGame()">ابدأ الزندقة 🔥</button>
    </div>
</div>

<div id="gameWrapper">
    <div id="healthUI">
        <div>صحة المقاتل (HP)</div>
        <div class="hp-bar-container"><div id="hpBarFill"></div></div>
    </div>

    <div id="scoreboard">
        <span style="color: #3498db;">الزنادقة الزرق: <span id="blueScore">0</span></span>
        <span>🆚</span>
        <span style="color: #e74c3c;"><span id="redScore">0</span> :الزنادقة الحمر</span>
    </div>
    
    <div id="logBox"></div>
    <div id="labelsContainer"></div>
    
    <div id="chatContainer">
        <div id="chatArea"></div>
        <input type="text" id="chatInput" placeholder="اكتب للجروب..." maxlength="40">
    </div>
</div>

<div class="touch-controls" id="touchUI" style="display: none;">
    <div class="joystick" id="movePad">حرك</div>
    <div class="fire-btn" id="fireBtn">إطلاق</div>
</div>

<script>
    const socket = io();
    let scene, camera, renderer;
    let playerGroups = {}; 
    let bulletMeshes = [];
    let obstacleMeshes = [];
    let myTeam = "blue";
    const movement = { up: false, down: false, left: false, right: false };
    
    let bgMusic = null;
    let hitSound = null;

    function init3D() {
        try {
            const container = document.getElementById('gameWrapper');
            scene = new THREE.Scene();
            scene.background = new THREE.Color('#05140e'); 

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(400, 480, 700);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.75);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.65);
            dirLight.position.set(400, 500, 300);
            scene.add(dirLight);

            const floorGeo = new THREE.PlaneGeometry(800, 600);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x143d30, roughness: 0.9 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.set(400, 0, 300);
            scene.add(floor);

            window.addEventListener('resize', onWindowResize);
            animate();
        } catch (error) {
            console.error("Three.js Init Error: ", error);
        }
    }

    function onWindowResize() {
        if (!camera || !renderer) return;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function createStickMan(teamColor) {
        const group = new THREE.Group();
        group.userData = {
            baseColor: teamColor,
            normalMaterial: new THREE.MeshStandardMaterial({ color: teamColor, roughness: 0.4 }),
            damageMaterial: new THREE.MeshBasicMaterial({ color: 0xffffff }) 
        };

        const mat = group.userData.normalMaterial;

        const headGeo = new THREE.SphereGeometry(6, 24, 24);
        const head = new THREE.Mesh(headGeo, mat);
        head.position.y = 34;
        group.add(head);

        const bodyGeo = new THREE.CylinderGeometry(1.5, 1.5, 16, 12);
        const body = new THREE.Mesh(bodyGeo, mat);
        body.position.y = 22;
        group.add(body);

        const legGeo = new THREE.CylinderGeometry(1, 0.8, 14, 12);
        
        const leftLeg = new THREE.Mesh(legGeo, mat);
        leftLeg.geometry.translate(0, -7, 0); 
        leftLeg.position.set(-3, 14, 0);
        group.add(leftLeg);
        group.userData.leftLeg = leftLeg;

        const rightLeg = new THREE.Mesh(legGeo, mat);
        rightLeg.geometry.translate(0, -7, 0); 
        rightLeg.position.set(3, 14, 0);
        group.add(rightLeg);
        group.userData.rightLeg = rightLeg;

        const armGeo = new THREE.CylinderGeometry(0.8, 0.7, 12, 12);
        const leftArm = new THREE.Mesh(armGeo, mat);
        leftArm.position.set(-5, 24, 2);
        leftArm.rotation.x = Math.PI / 4;
        group.add(leftArm);

        const gunGeo = new THREE.CylinderGeometry(1.2, 1.2, 18, 12);
        const gunMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.2 });
        const gun = new THREE.Mesh(gunGeo, gunMat);
        gun.position.set(10, 24, 4);
        gun.rotation.z = Math.PI / 2;
        group.add(gun);

        return group;
    }

    function startGame() {
        const nameInput = document.getElementById('playerName');
        const name = nameInput.value.trim() || "مقاتل_" + Math.floor(Math.random()*100);
        
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('gameWrapper').style.display = 'block';
        if(window.innerWidth < 768) document.getElementById('touchUI').style.display = 'flex';

        try {
            bgMusic = new Audio('Mario Star Power - QuickSounds.com.mp3');
            bgMusic.loop = true;
            bgMusic.volume = 0.25;
            bgMusic.play().catch(e => console.log("Audio play blocked/missing"));

            hitSound = new Audio('Mario Death _( - QuickSounds.com.mp3');
        } catch(e) {
            console.log("Audio error skipped");
        }

        init3D();
        // إرسال الاسم بدقة فور الضغط على زر الدخول
        socket.emit('initGame', { name: name });
    }

    socket.on('teamAssignment', (team) => { myTeam = team; });
    socket.on('playerDied', () => { 
        if (hitSound) hitSound.play().catch(e => {}); 
    });

    socket.on('state', (state) => {
        if (!scene) return;

        if(state.score) {
            document.getElementById('blueScore').innerText = state.score.blue;
            document.getElementById('redScore').innerText = state.score.red;
        }

        if (obstacleMeshes.length === 0 && state.obstacles) {
            state.obstacles.forEach(obs => {
                const geo = new THREE.BoxGeometry(obs.w, 40, obs.h);
                const mat = new THREE.MeshStandardMaterial({ color: 0x4a3321, roughness: 0.9 }); 
                const box = new THREE.Mesh(geo, mat);
                box.position.set(obs.x, 20, obs.y);
                scene.add(box);
                obstacleMeshes.push(box);
            });
        }

        const labelsContainer = document.getElementById('labelsContainer');
        
        for (let id in playerGroups) {
            if (!state.players[id] || state.players[id].hp <= 0) {
                scene.remove(playerGroups[id]);
                delete playerGroups[id];
                const existingLabel = document.getElementById('label_' + id);
                if (existingLabel) existingLabel.remove();
            }
        }

        for (let id in state.players) {
            let p = state.players[id];
            if (p.hp <= 0) continue;

            if (id === socket.id) {
                const fill = document.getElementById('hpBarFill');
                if(fill) {
                    fill.style.width = p.hp + '%';
                    if (p.hp < 40) fill.style.background = '#e74c3c';
                    else fill.style.background = '#2ecc71';
                }
            }

            if (!playerGroups[id]) {
                if (!p.name) continue; // تخطي بناء اللوحة إذا لم يستلم الاسم بعد

                const tColor = p.team === "blue" ? 0x3498db : 0xe74c3c;
                playerGroups[id] = createStickMan(tColor);
                scene.add(playerGroups[id]);
