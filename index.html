<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KRUNK-WAR 3D - Krunker Style Edition</title>
    <style>
        * { box-sizing: border-box; touch-action: none; -webkit-touch-callout: none; user-select: none; }
        body { margin: 0; background: #111; overflow: hidden; font-family: 'Trebuchet MS', 'Segoe UI', sans-serif; }
        
        #mainMenu {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1e1e24 0%, #0d0d11 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; color: #fff;
        }
        .menu-card {
            background: rgba(30, 30, 40, 0.95); padding: 25px 20px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8); width: 90%; max-width: 360px; text-align: center; border: 3px solid #f39c12;
        }
        h1 { margin: 0 0 10px 0; font-size: 36px; color: #f1c40f; font-weight: 900; text-shadow: 3px 3px 0px #d35400; font-family: monospace; }
        label { font-size: 11px; color: #f39c12; display: block; text-align: right; margin-top: 6px; font-weight: bold; }
        input, button, select { width: 100%; padding: 10px; margin: 4px 0 10px 0; border-radius: 6px; border: none; font-size: 13px; font-weight: bold; }
        input, select { background: #2c3e50; color: #fff; text-align: center; border: 2px solid #34495e; }
        button { background: #f39c12; color: #000; font-weight: 900; cursor: pointer; padding: 12px; margin-top: 10px; border-bottom: 4px solid #d35400; font-size: 15px; }
        button:active { border-bottom: 0px; transform: translateY(4px); }

        .insta-link { display: inline-block; margin-top: 8px; color: #e1306c; text-decoration: none; font-weight: bold; font-size: 12px; }

        #gameWrapper { display: none; position: relative; width: 100vw; height: 100vh; }
        
        #healthUI {
            position: absolute; top: 10px; left: 10px; background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px; border-radius: 8px; border: 2px solid #f1c40f;
            color: #fff; font-weight: bold; font-size: 11px; z-index: 4; width: 130px;
        }
        .hp-bar-container { width: 100%; background: #333; height: 10px; border-radius: 4px; margin-top: 4px; overflow: hidden; border: 1px solid #000; }
        #hpBarFill { width: 100%; background: #2ecc71; height: 100%; transition: width 0.1s; }
        #ammoDisplay { margin-top: 4px; font-size: 11px; color: #f1c40f; display: flex; justify-content: space-between; }

        #roundBanner {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8); padding: 6px 16px; border-radius: 8px;
            border: 2px solid #f39c12; color: #fff; font-weight: 900; font-size: 13px; z-index: 5;
        }

        #roundWinnerModal {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9); border: 3px solid #f1c40f; border-radius: 12px;
            padding: 20px; color: #fff; text-align: center; z-index: 10; width: 80%; max-width: 300px;
        }
        #roundWinnerModal h2 { margin: 0 0 6px 0; color: #f1c40f; font-size: 22px; }

        #weaponUI {
            position: absolute; bottom: 10px; right: 10px;
            background: rgba(0, 0, 0, 0.8); padding: 6px 10px; border-radius: 8px;
            border: 2px solid #f39c12; color: #fff; font-size: 11px; z-index: 4; text-align: center;
        }
        .weapon-slots { display: flex; gap: 4px; margin-top: 4px; }
        .slot { padding: 4px 8px; background: #34495e; border: 2px solid #2c3e50; border-radius: 4px; font-size: 10px; color: #fff; cursor: pointer; font-weight: bold; }
        .slot.active { border-color: #f1c40f; background: #f39c12; color: #000; }

        #tabBtn {
            position: absolute; top: 10px; left: 150px; z-index: 5;
            background: rgba(0, 0, 0, 0.8); border: 2px solid #f1c40f; color: #fff;
            width: 30px; height: 30px; border-radius: 6px; font-weight: bold; font-size: 12px;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }

        #leaderboardModal {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 320px; background: rgba(0, 0, 0, 0.9); border: 2px solid #f1c40f;
            border-radius: 10px; padding: 12px; z-index: 9; color: #fff;
        }
        #leaderboardModal h3 { margin-top: 0; text-align: center; color: #f1c40f; font-size: 16px; }
        .stats-table { width: 100%; border-collapse: collapse; margin-top: 6px; }
        .stats-table th, .stats-table td { padding: 4px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 11px; }

        #chatContainer {
            position: absolute; bottom: 10px; left: 10px; width: 160px;
            background: rgba(0, 0, 0, 0.7); border-radius: 6px; padding: 6px;
            display: flex; flex-direction: column; z-index: 5; border: 1px solid #555;
        }
        #chatArea { height: 50px; overflow-y: auto; color: #fff; font-size: 9px; text-align: right; direction: rtl; }
        .chat-msg { margin: 2px 0; }
        .chat-sys { color: #f1c40f; font-weight: bold; }
        #chatInput { padding: 4px; font-size: 10px; width: 100%; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; }

        #minimapCanvas {
            position: absolute; top: 10px; right: 10px;
            width: 80px; height: 80px; border-radius: 8px;
            border: 2px solid #f39c12; background: rgba(0, 0, 0, 0.8); z-index: 4;
        }

        /* Crosshair Krunker Style */
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 8px; height: 8px;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 6;
            background: #2ecc71; border-radius: 50%; border: 1px solid #000;
        }

        #hitmarker {
            position: absolute; top: 50%; left: 50%; width: 18px; height: 18px;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 7; opacity: 0;
            transition: opacity 0.05s ease-out;
        }
        #hitmarker::before, #hitmarker::after { content: ''; position: absolute; background: #e74c3c; }
        #hitmarker::before { top: 8px; left: 0; width: 18px; height: 2px; transform: rotate(45deg); }
        #hitmarker::after { top: 8px; left: 0; width: 18px; height: 2px; transform: rotate(-45deg); }

        .nameplate {
            position: absolute; transform: translate(-50%, -100%);
            display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 3;
        }
        .nameplate-title { color: #fff; font-size: 10px; font-weight: bold; text-shadow: 1px 1px 2px #000; }
        .nameplate-bar-bg { width: 40px; height: 4px; background: rgba(0,0,0,0.8); border-radius: 2px; overflow: hidden; border: 1px solid #000; }
        .nameplate-bar-fill { height: 100%; background: #2ecc71; width: 100%; }

        /* Touch Controls */
        .touch-controls { position: absolute; bottom: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; align-items: flex-end; pointer-events: none; z-index: 5; }
        .joystick-zone { width: 90px; height: 90px; border: 2px dashed rgba(241, 196, 15, 0.6); border-radius: 50%; display: flex; justify-content: center; align-items: center; pointer-events: auto; background: rgba(0,0,0,0.3); }
        .joystick-stick { width: 35px; height: 35px; background: #f39c12; border-radius: 50%; border: 2px solid #fff; }
        .touch-action-btns { display: flex; gap: 6px; pointer-events: auto; flex-wrap: wrap; max-width: 150px; justify-content: flex-end; }
        .action-btn { width: 46px; height: 46px; border-radius: 8px; display: flex; justify-content: center; align-items: center; color: white; font-weight: 900; font-size: 10px; border: 2px solid #000; box-shadow: 0 4px 0 #000; }
        .action-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }
        .fire-btn { background: #e74c3c; width: 56px; height: 56px; font-size: 11px; }
        .reload-btn { background: #e67e22; }
        .jump-btn { background: #2ecc71; }
        .crouch-btn { background: #3498db; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div id="mainMenu">
    <div class="menu-card">
        <h1>KRUNK-WAR</h1>
        <label>اسمك في اللعبة:</label>
        <input type="text" id="playerName" placeholder="اسم المقاتل..." maxlength="12">
        
        <label>الجهاز المستخدم:</label>
        <select id="deviceSelect">
            <option value="phone">📱 هاتف (أزرار لمس)</option>
            <option value="pc">💻 كمبيوتر (ماوس + كيبورد)</option>
        </select>

        <label>نمط اللعب:</label>
        <select id="gameModeSelect">
            <option value="bots">🤖 ضد البوتات (أوفلاين)</option>
            <option value="online">🌐 لعب أونلاين</option>
        </select>

        <button id="startBtn">دخول المباراة 🔥</button>
        <a href="https://www.instagram.com/algerian_aizen/" target="_blank" class="insta-link">
            📸 @algerian_aizen
        </a>
    </div>
</div>

<div id="gameWrapper">
    <div id="crosshair"></div>
    <div id="hitmarker"></div>
    <canvas id="minimapCanvas" width="80" height="80"></canvas>

    <div id="roundBanner">الجولة: <span id="roundNumber">1</span> 🏆</div>

    <div id="healthUI">
        <div>الصحة (HP)</div>
        <div class="hp-bar-container"><div id="hpBarFill"></div></div>
        <div id="ammoDisplay">
            <span>الذخيرة:</span>
            <span id="ammoCount">∞ / ∞</span>
        </div>
    </div>

    <button id="tabBtn" onclick="toggleLeaderboard()">📊</button>

    <div id="chatContainer">
        <div id="chatArea"></div>
        <input type="text" id="chatInput" placeholder="رسالة..." maxlength="40">
    </div>

    <div id="weaponUI">
        <div id="currentWeaponText">سلاح مكعب 🗡️</div>
        <div class="weapon-slots">
            <div class="slot active" id="slot1" onclick="selectWeapon(1)">1: خنجر</div>
            <div class="slot" id="slot2" onclick="selectWeapon(2)">2: مسدس</div>
            <div class="slot" id="slot3" onclick="selectWeapon(3)">3: بندقية</div>
        </div>
    </div>

    <div id="leaderboardModal">
        <h3>🏆 قائمة الإحصائيات</h3>
        <table class="stats-table">
            <thead>
                <tr><th>المقاتل</th><th>الجهاز</th><th>القتلات</th><th>الوفيات</th></tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
    </div>

    <div id="roundWinnerModal">
        <h2 id="winnerTitle">🏆 انتهت الجولة!</h2>
        <p id="winnerSub">الفائز: المقاتل</p>
    </div>

    <div id="nameplatesContainer"></div>
</div>

<div class="touch-controls" id="touchUI" style="display: none;">
    <div class="joystick-zone" id="joyZone">
        <div class="joystick-stick" id="joyStick"></div>
    </div>
    <div class="touch-action-btns">
        <div class="action-btn crouch-btn" id="crouchBtn">🧎 انحناء</div>
        <div class="action-btn reload-btn" id="reloadBtn">🔄 تعبئة</div>
        <div class="action-btn jump-btn" id="jumpBtn">🦘 قفز</div>
        <div class="action-btn fire-btn" id="fireBtn">إطلاق</div>
    </div>
</div>

<script>
    let socket;
    try { socket = io(); } catch(e) { socket = null; }

    let scene, camera, renderer;
    let mapObstacleMeshes = [];
    let obstacleBoxes = [];
    let otherPlayers = {};
    let bots = [];
    let fpWeaponGroup;
    let currentKnifeMesh, currentPistolMesh, currentRifleMesh;

    let selectedDevice = "phone"; 
    let gameMode = "bots";
    let myPlayerName = "مقاتل";
    let myHealth = 100;
    const movement = { up: false, down: false, left: false, right: false };
    let myPlayerPos = { x: 1250, y: 1250 };
    
    let playerYaw = 0;
    let playerPitch = 0;
    let isCrouching = false;

    let myKills = 0, myDeaths = 0;
    let currentRound = 1;
    let roundEnded = false;

    let targetCamY = 34;
    let currentCamY = 34;
    let velocityY = 0;
    let isGrounded = true;
    const gravity = -0.6;
    const jumpPower = 11.0; // حركة قفز أسرع بأسلوب كرونكر
    let movementSpeed = 6.0;

    let audioCtx;

    const WEAPONS = {
        1: { name: "سكين بكسل 🗡️", cd: 250, range: 70, damage: 50, maxAmmo: Infinity, currentAmmo: Infinity, isMelee: true },
        2: { name: "مسدس بكسل 🔫", cd: 180, range: 800, damage: 24, maxAmmo: 12, currentAmmo: 12, reserveAmmo: 60, reloadTime: 900 },
        3: { name: "بندقية بكسل 🎯", cd: 100, range: 1300, damage: 20, maxAmmo: 30, currentAmmo: 30, reserveAmmo: 150, reloadTime: 1200 }
    };
    let currentWeaponId = 1;
    let lastAttackTime = 0;
    let isReloading = false;

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playSound(type) {
        if (!audioCtx) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'shoot') {
                osc.type = 'square'; // صوت الكارتون/البكسل
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } else if (type === 'hit') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(900, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.04);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
                osc.start(); osc.stop(audioCtx.currentTime + 0.04);
            } else if (type === 'reload') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(250, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(450, audioCtx.currentTime + 0.12);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
                osc.start(); osc.stop(audioCtx.currentTime + 0.12);
            } else if (type === 'jump') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            }
        } catch(e){}
    }

    function getRandomSpawnPos() {
        let x, z, collision;
        let attempts = 0;
        do {
            x = 300 + Math.random() * 1900;
            z = 300 + Math.random() * 1900;
            collision = checkCollision(x, z);
            attempts++;
        } while (collision && attempts < 50);
        return { x, z };
    }

    function init3D() {
        const container = document.getElementById('gameWrapper');
        scene = new THREE.Scene();
        scene.background = new THREE.Color('#70a1ff'); // السماء الزرقاء الفاتحة بأسلوب Krunker
        scene.fog = new THREE.FogExp2('#70a1ff', 0.0003);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 3000);
        camera.rotation.order = 'YXZ';

        const isPC = (selectedDevice === 'pc');
        renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(isPC ? Math.min(window.devicePixelRatio, 1.5) : 1.0);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.BasicShadowMap;
        container.appendChild(renderer.domElement);

        // إضاءة كارتونية مشعة
        const ambLight = new THREE.AmbientLight(0xffffff, 0.9);
        scene.add(ambLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(500, 1000, 500);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 512;
        dirLight.shadow.mapSize.height = 512;
        scene.add(dirLight);

        // أرضية خضراء بكسل (مثل خريطة Burg في Krunker)
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(3500, 3500),
            new THREE.MeshLambertMaterial({ color: 0x2ed573 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.set(1250, 0, 1250);
        floor.receiveShadow = true;
        scene.add(floor);

        fpWeaponGroup = new THREE.Group();
        camera.add(fpWeaponGroup);
        scene.add(camera);

        buildKrunkerWeapons();
        generateKrunkerStyleMap();

        let startPos = getRandomSpawnPos();
        myPlayerPos = { x: startPos.x, y: startPos.z };

        if (gameMode === "online" && socket) {
            setupSocketListeners();
            socket.emit('initGame', { name: myPlayerName, x: myPlayerPos.x, y: myPlayerPos.y, device: selectedDevice });
        } else {
            spawnBots(4);
        }

        if (selectedDevice === 'phone') {
            document.getElementById('touchUI').style.display = 'flex';
            setupTouchEvents();
        } else {
            document.getElementById('touchUI').style.display = 'none';
            document.body.requestPointerLock();
            window.addEventListener('click', () => {
                if (document.pointerLockElement !== document.body && document.getElementById('mainMenu').style.display === 'none') {
                    document.body.requestPointerLock();
                }
            });
        }

        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body || (selectedDevice === 'phone' && e.buttons === 1)) {
                let sensitivity = selectedDevice === 'pc' ? 0.0022 : 0.0038;
                playerYaw -= e.movementX * sensitivity;
                playerPitch -= e.movementY * sensitivity;
                playerPitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, playerPitch));
            }
        });

        window.addEventListener('resize', onWindowResize);
        setupChatInput();
        updateAmmoUI();

        animate();
    }

    // بناء شخصية كرونكر المكونة من مكعبات (Krunker Blocky Character)
    function createKrunkerPlayerMesh(colorHex = 0xe74c3c) {
        const group = new THREE.Group();
        const skinMat = new THREE.MeshLambertMaterial({ color: 0xffdbac }); // لون البشرة
        const clothesMat = new THREE.MeshLambertMaterial({ color: colorHex }); // لون الملابس
        const blackMat = new THREE.MeshBasicMaterial({ color: 0x111111 });

        // الجذع (Body Block)
        const torso = new THREE.Mesh(new THREE.BoxGeometry(10, 16, 6), clothesMat);
        torso.position.y = 16;
        torso.castShadow = true;
        group.add(torso);

        // الرأس المكعب (Cube Head)
        const head = new THREE.Mesh(new THREE.BoxGeometry(8, 8, 8), skinMat);
        head.position.y = 28;
        head.castShadow = true;
        group.add(head);

        // الأعين المربعة
        const eye1 = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 0.5), blackMat);
        eye1.position.set(-2, 29, 4.1);
        const eye2 = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 0.5), blackMat);
        eye2.position.set(2, 29, 4.1);
        group.add(eye1); group.add(eye2);

        // الذراعان المربعتان
        const armL = new THREE.Mesh(new THREE.BoxGeometry(3.5, 14, 3.5), skinMat);
        armL.position.set(-7, 16, 0);
        const armR = new THREE.Mesh(new THREE.BoxGeometry(3.5, 14, 3.5), skinMat);
        armR.position.set(7, 16, 0);
        group.add(armL); group.add(armR);

        // الساقان
        const legL = new THREE.Mesh(new THREE.BoxGeometry(4, 14, 4), clothesMat);
        legL.position.set(-2.5, 7, 0);
        const legR = new THREE.Mesh(new THREE.BoxGeometry(4, 14, 4), clothesMat);
        legR.position.set(2.5, 7, 0);
        group.add(legL); group.add(legR);

        return group;
    }

    // بناء أسلحة بكسل مسبقة الصنع كتلية
    function buildKrunkerWeapons() {
        const darkMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
        const metalMat = new THREE.MeshLambertMaterial({ color: 0x7f8c8d });
        const woodMat = new THREE.MeshLambertMaterial({ color: 0xd35400 });

        // سكين مكعب
        currentKnifeMesh = new THREE.Group();
        const kBlade = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.5, 5), metalMat);
        kBlade.position.set(0, 0, -2.5);
        currentKnifeMesh.add(kBlade);
        currentKnifeMesh.position.set(1.2, -1.2, -2.5);
        fpWeaponGroup.add(currentKnifeMesh);

        // مسدس بكسل
        currentPistolMesh = new THREE.Group();
        const pBody = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 4), darkMat);
        pBody.position.set(0, 0, -2);
        currentPistolMesh.add(pBody);
        currentPistolMesh.position.set(1.2, -1.2, -2.5);
        currentPistolMesh.visible = false;
        fpWeaponGroup.add(currentPistolMesh);

        // بندقية كلاسيكية (Block Rifle)
        currentRifleMesh = new THREE.Group();
        const rBody = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.4, 7), darkMat);
        const rStock = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.2, 3), woodMat);
        rStock.position.set(0, -0.2, 3.5);
        currentRifleMesh.add(rBody);
        currentRifleMesh.add(rStock);
        currentRifleMesh.position.set(1.3, -1.3, -3.0);
        currentRifleMesh.visible = false;
        fpWeaponGroup.add(currentRifleMesh);
    }

    function selectWeapon(id) {
        if (isReloading) return;
        currentWeaponId = id;
        document.querySelectorAll('.slot').forEach((s, idx) => {
            s.classList.toggle('active', idx + 1 === id);
        });
        document.getElementById('currentWeaponText').innerText = WEAPONS[id].name;

        currentKnifeMesh.visible = (id === 1);
        currentPistolMesh.visible = (id === 2);
        currentRifleMesh.visible = (id === 3);

        updateAmmoUI();
    }

    function reloadWeapon() {
        const w = WEAPONS[currentWeaponId];
        if (w.isMelee || isReloading || w.currentAmmo === w.maxAmmo || w.reserveAmmo <= 0) return;

        isReloading = true;
        playSound('reload');

        setTimeout(() => {
            let needed = w.maxAmmo - w.currentAmmo;
            let amountToReload = Math.min(needed, w.reserveAmmo);
            w.currentAmmo += amountToReload;
            w.reserveAmmo -= amountToReload;
            isReloading = false;
            updateAmmoUI();
        }, w.reloadTime);
    }

    function updateAmmoUI() {
        const w = WEAPONS[currentWeaponId];
        const ammoEl = document.getElementById('ammoCount');
        ammoEl.innerText = w.isMelee ? "∞ / ∞" : `${w.currentAmmo} / ${w.reserveAmmo}`;
    }

    // خريطة كتل بأسلوب Krunker / Minecraft (جدران وحاويات زاهية)
    function generateKrunkerStyleMap() {
        mapObstacleMeshes.forEach(mesh => scene.remove(mesh));
        mapObstacleMeshes = [];
        obstacleBoxes = [];

        const wallMat = new THREE.MeshLambertMaterial({ color: 0xffa502 }); // أصفر/برتقالي زاهي
        const crateMat = new THREE.MeshLambertMaterial({ color: 0x70a1ff }); // أزرق كارتوني
        const brickMat = new THREE.MeshLambertMaterial({ color: 0xff6b81 }); // وردي/أحمر كتل

        // الحدود الخارجية للملعب
        const mapBounds = [
            { x: 1250, z: -50, w: 2600, h: 40 },
            { x: 1250, z: 2550, w: 2600, h: 40 },
            { x: -50, z: 1250, w: 40, h: 2600 },
            { x: 2550, z: 1250, w: 40, h: 2600 }
        ];
        mapBounds.forEach(b => {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(b.w, 80, b.h), wallMat);
            wall.position.set(b.x, 40, b.z);
            scene.add(wall);
            mapObstacleMeshes.push(wall);
            addObstacleBox(b.x, b.z, b.w, b.h);
        });

        // توزيع المكعبات والمباني بشكل منتظم وشبيه بلعبة كرونكر
        for (let x = 400; x < 2200; x += 300) {
            for (let z = 400; z < 2200; z += 300) {
                if (Math.hypot(x - 1250, z - 1250) < 250) continue;
                
                let size = 50;
                let height = (Math.random() > 0.5 ? 40 : 70);
                let mat = (height > 50 ? brickMat : crateMat);

                const block = new THREE.Mesh(new THREE.BoxGeometry(size, height, size), mat);
                block.position.set(x, height / 2, z);
                block.castShadow = true;
                block.receiveShadow = true;

                scene.add(block);
                mapObstacleMeshes.push(block);
                addObstacleBox(x, z, size, size);
            }
        }
    }

    function addObstacleBox(x, z, w, h) {
        obstacleBoxes.push({ minX: x - w/2 - 8, maxX: x + w/2 + 8, minZ: z - h/2 - 8, maxZ: z + h/2 + 8 });
    }

    function checkCollision(newX, newZ) {
        for (let b of obstacleBoxes) {
            if (newX > b.minX && newX < b.maxX && newZ > b.minZ && newZ < b.maxZ) return true;
        }
        return false;
    }

    function spawnBots(count) {
        bots.forEach(b => {
            if (b.nameplate) b.nameplate.remove();
            scene.remove(b.mesh);
        });
        bots = [];

        const botNames = ["KrunkBot_1 🤖", "PixelKing ⚡", "BlockShot 🎯", "VoxelMaster ⚔️"];
        const colors = [0xe74c3c, 0x9b59b6, 0xf1c40f, 0x1abc9c];

        for (let i = 0; i < count; i++) {
            let pos = getRandomSpawnPos();
            let pModel = createKrunkerPlayerMesh(colors[i % colors.length]);
            pModel.position.set(pos.x, 0, pos.z);
            scene.add(pModel);

            let nameplate = createNameplateUI(botNames[i]);

            bots.push({
                id: 'bot_' + i,
                name: botNames[i],
                device: 'phone',
                mesh: pModel,
                nameplate: nameplate,
                x: pos.x, z: pos.z,
                health: 100, kills: 0, deaths: 0, lastAttack: 0
            });
        }
        updateLeaderboardUI();
    }

    function createNameplateUI(name) {
        const div = document.createElement('div');
        div.className = 'nameplate';
        div.innerHTML = `<div class="nameplate-title">${name}</div><div class="nameplate-bar-bg"><div class="nameplate-bar-fill"></div></div>`;
        document.getElementById('nameplatesContainer').appendChild(div);
        return div;
    }

    function updateNameplatePosition(obj3D, nameplateEl, health) {
        if (!nameplateEl) return;
        if (health <= 0) { nameplateEl.style.display = 'none'; return; }

        let headPos = new THREE.Vector3(obj3D.position.x, 34, obj3D.position.z);
        headPos.project(camera);

        if (headPos.z > 1) { nameplateEl.style.display = 'none'; return; }

        let x = (headPos.x * .5 + .5) * window.innerWidth;
        let y = (-(headPos.y * .5) + .5) * window.innerHeight;

        nameplateEl.style.display = 'flex';
        nameplateEl.style.left = `${x}px`;
        nameplateEl.style.top = `${y}px`;

        const fill = nameplateEl.querySelector('.nameplate-bar-fill');
        if (fill) fill.style.width = `${health}%`;
    }

    function triggerHitmarker() {
        const hm = document.getElementById('hitmarker');
        hm.style.opacity = '1';
        playSound('hit');
        setTimeout(() => { hm.style.opacity = '0'; }, 80);
    }

    function checkKillVictory(killerName, killsCount) {
        if (killsCount >= 5 && !roundEnded) {
            roundEnded = true;
            document.getElementById('winnerTitle').innerText = "🏆 انتهت الجولة " + currentRound;
            document.getElementById('winnerSub').innerText = "🥇 الفائز: " + killerName;
            document.getElementById('roundWinnerModal').style.display = 'block';
            setTimeout(() => { startNextRound(); }, 3500);
        }
    }

    function startNextRound() {
        document.getElementById('roundWinnerModal').style.display = 'none';
        currentRound++;
        document.getElementById('roundNumber').innerText = currentRound;

        myKills = 0; myDeaths = 0; myHealth = 100;
        document.getElementById('hpBarFill').style.width = "100%";

        generateKrunkerStyleMap();
        let respawn = getRandomSpawnPos();
        myPlayerPos = { x: respawn.x, y: respawn.z };

        if (gameMode === "bots") spawnBots(4);
        roundEnded = false;
        updateLeaderboardUI();
    }

    function updateBotsAI() {
        if (roundEnded) return;
        const now = Date.now();

        bots.forEach(bot => {
            if (bot.health <= 0) return;
            updateNameplatePosition(bot.mesh, bot.nameplate, bot.health);

            let dist = Math.hypot(myPlayerPos.x - bot.x, myPlayerPos.y - bot.z);

            if (dist < 800) {
                let dx = myPlayerPos.x - bot.x;
                let dz = myPlayerPos.y - bot.z;
                let angle = Math.atan2(dx, dz);

                let nx = bot.x + Math.sin(angle) * 3.2;
                let nz = bot.z + Math.cos(angle) * 3.2;

                if (!checkCollision(nx, bot.z)) bot.x = nx;
                if (!checkCollision(bot.x, nz)) bot.z = nz;

                bot.mesh.position.set(bot.x, 0, bot.z);
                bot.mesh.rotation.y = angle;

                if (dist < 400 && now - bot.lastAttack > 450) {
                    bot.lastAttack = now;
                    playSound('shoot');
                    takeDamage(7, bot.name);
                }
            }
        });
    }

    function createBulletTracer(startPos, endPos) {
        const distance = startPos.distanceTo(endPos);
        const geo = new THREE.CylinderGeometry(0.15, 0.15, distance, 3);
        const mat = new THREE.MeshBasicMaterial({ color: 0xfffa65 }); // رصاصة بكسل صفراء مضيئة
        const tracer = new THREE.Mesh(geo, mat);

        tracer.position.copy(startPos).clone().lerp(endPos, 0.5);
        tracer.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), endPos.clone().sub(startPos).normalize());

        scene.add(tracer);
        setTimeout(() => scene.remove(tracer), 35);
    }

    function takeDamage(amount, attackerName) {
        if (roundEnded) return;
        myHealth = Math.max(0, myHealth - amount);
        document.getElementById('hpBarFill').style.width = myHealth + "%";

        if (myHealth <= 0) {
            myDeaths++;
            addChatMessage(`☠️ تم القضاء عليك بواسطة ${attackerName}!`, true);
            setTimeout(() => {
                if (roundEnded) return;
                myHealth = 100;
                document.getElementById('hpBarFill').style.width = "100%";
                let respawn = getRandomSpawnPos();
                myPlayerPos = { x: respawn.x, y: respawn.z };
            }, 2000);
            updateLeaderboardUI();
        }
    }

    function setupSocketListeners() {
        if (!socket) return;
        setInterval(() => {
            if (socket && gameMode === "online") {
                socket.emit('playerMove', { 
                    x: myPlayerPos.x, 
                    y: myPlayerPos.y, 
                    angle: playerYaw, 
                    name: myPlayerName, 
                    hp: myHealth, 
                    kills: myKills,
                    device: selectedDevice 
                });
            }
        }, 40);

        socket.on('state', (state) => {
            if (state.players) {
                for (let id in state.players) {
                    if (id !== socket.id) {
                        let pData = state.players[id];
                        if (!otherPlayers[id]) {
                            let pModel = createKrunkerPlayerMesh(pData.device === 'pc' ? 0x3498db : 0xe74c3c);
                            let deviceIcon = pData.device === 'pc' ? '💻' : '📱';
                            let np = createNameplateUI(`${deviceIcon} ${pData.name || 'لاعب'}`);
                            scene.add(pModel);
                            otherPlayers[id] = { mesh: pModel, nameplate: np, name: pData.name || 'لاعب', device: pData.device || 'phone', kills: 0, hp: 100 };
                        }
                        otherPlayers[id].mesh.position.set(pData.x, 0, pData.y);
                        otherPlayers[id].mesh.rotation.y = pData.angle || 0;
                        otherPlayers[id].hp = pData.hp || 100;
                        updateNameplatePosition(otherPlayers[id].mesh, otherPlayers[id].nameplate, otherPlayers[id].hp);
                    }
                }
            }
        });
    }

    function setupChatInput() {
        const input = document.getElementById('chatInput');
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && input.value.trim() !== '') {
                addChatMessage(`${myPlayerName}: ${input.value.trim()}`, false);
                input.value = ''; input.blur();
            }
        });
    }

    function addChatMessage(msg, isSys) {
        const area = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = 'chat-msg' + (isSys ? ' chat-sys' : '');
        div.innerText = msg;
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
    }

    function performJump() {
        if (isGrounded) { velocityY = jumpPower; isGrounded = false; playSound('jump'); }
    }

    function toggleCrouch() {
        isCrouching = !isCrouching;
        targetCamY = isCrouching ? 18 : 34;
        movementSpeed = isCrouching ? 3.0 : 6.0;
    }

    function toggleLeaderboard() {
        const modal = document.getElementById('leaderboardModal');
        modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        updateLeaderboardUI();
    }

    function updateLeaderboardUI() {
        const tbody = document.getElementById('leaderboardBody');
        let myIcon = selectedDevice === 'pc' ? '💻' : '📱';
        tbody.innerHTML = `<tr><td>${myPlayerName} (أنت)</td><td>${myIcon}</td><td>${myKills}</td><td>${myDeaths}</td></tr>`;
        bots.forEach(b => { 
            let bIcon = b.device === 'pc' ? '💻' : '📱';
            tbody.innerHTML += `<tr><td>${b.name}</td><td>${bIcon}</td><td>${b.kills}</td><td>${b.deaths}</td></tr>`; 
        });
    }

    function setupTouchEvents() {
        const joyZone = document.getElementById('joyZone');
        const joyStick = document.getElementById('joyStick');
        let touchId = null;

        joyZone.addEventListener('touchstart', (e) => { touchId = e.changedTouches[0].identifier; }, { passive: true });
        joyZone.addEventListener('touchmove', (e) => {
            for (let t of e.changedTouches) {
                if (t.identifier === touchId) {
                    let rect = joyZone.getBoundingClientRect();
                    let dx = t.clientX - (rect.left + rect.width / 2);
                    let dy = t.clientY - (rect.top + rect.height / 2);
                    
                    movement.up = dy < -5;
                    movement.down = dy > 5;
                    movement.left = dx < -5;
                    movement.right = dx > 5;

                    joyStick.style.transform = `translate(${dx*0.2}px, ${dy*0.2}px)`;
                }
            }
        }, { passive: true });

        const resetJoy = () => {
            movement.up = movement.down = movement.left = movement.right = false;
            joyStick.style.transform = `translate(0px, 0px)`;
        };

        joyZone.addEventListener('touchend', resetJoy);
        document.getElementById('fireBtn').addEventListener('touchstart', performAttack, { passive: true });
        document.getElementById('reloadBtn').addEventListener('touchstart', reloadWeapon, { passive: true });
        document.getElementById('jumpBtn').addEventListener('touchstart', performJump, { passive: true });
        document.getElementById('crouchBtn').addEventListener('touchstart', toggleCrouch, { passive: true });
    }

    function handleFPSMovement() {
        let moveX = 0, moveZ = 0;
        let forwardX = -Math.sin(playerYaw), forwardZ = -Math.cos(playerYaw);
        let rightX = Math.sin(playerYaw + Math.PI / 2), rightZ = Math.cos(playerYaw + Math.PI / 2);

        if (movement.up) { moveX += forwardX; moveZ += forwardZ; }
        if (movement.down) { moveX -= forwardX; moveZ -= forwardZ; }
        if (movement.left) { moveX -= rightX; moveZ -= rightZ; }
        if (movement.right) { moveX += rightX; moveZ += rightZ; }

        let nextX = myPlayerPos.x + moveX * movementSpeed;
        let nextZ = myPlayerPos.y + moveZ * movementSpeed;

        if (!checkCollision(nextX, myPlayerPos.y)) myPlayerPos.x = nextX;
        if (!checkCollision(myPlayerPos.x, nextZ)) myPlayerPos.y = nextZ;

        velocityY += gravity;
        currentCamY += velocityY;

        currentCamY += (targetCamY - currentCamY) * 0.25;

        if (currentCamY <= targetCamY) { 
            currentCamY = targetCamY; 
            velocityY = 0; 
            isGrounded = true; 
        }

        camera.position.set(myPlayerPos.x, currentCamY, myPlayerPos.y);
        camera.rotation.y = playerYaw;
        camera.rotation.x = playerPitch;
    }

    function performAttack() {
        if (isReloading || roundEnded) return;
        const now = Date.now();
        const weapon = WEAPONS[currentWeaponId];
        if (now - lastAttackTime < weapon.cd) return;

        if (!weapon.isMelee && weapon.currentAmmo <= 0) { reloadWeapon(); return; }

        lastAttackTime = now;
        if (!weapon.isMelee) { weapon.currentAmmo--; updateAmmoUI(); }

        playSound(currentWeaponId === 1 ? 'knife' : 'shoot');

        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
        raycaster.far = weapon.range;

        let startPos = camera.position.clone();
        let targetPoint = startPos.clone().add(raycaster.ray.direction.clone().multiplyScalar(weapon.range));

        createBulletTracer(startPos, targetPoint);

        if (gameMode === "bots") {
            bots.forEach(bot => {
                if (bot.health <= 0) return;
                let botMeshes = [];
                bot.mesh.traverse((c) => { if (c.isMesh) botMeshes.push(c); });

                if (raycaster.intersectObjects(botMeshes).length > 0) {
                    bot.health -= weapon.damage;
                    triggerHitmarker();
                    updateNameplatePosition(bot.mesh, bot.nameplate, bot.health);

                    if (bot.health <= 0) {
                        myKills++;
                        bot.deaths++;
                        addChatMessage(`🎯 أصبت ${bot.name} بمقتل!`, true);
                        checkKillVictory(myPlayerName, myKills);

                        setTimeout(() => {
                            if (roundEnded) return;
                            let pos = getRandomSpawnPos();
                            bot.health = 100; bot.x = pos.x; bot.z = pos.z;
                            bot.mesh.position.set(bot.x, 0, bot.z);
                        }, 2500);
                        updateLeaderboardUI();
                    }
                }
            });
        }
    }

    function drawMinimap() {
        const canvas = document.getElementById('minimapCanvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const cx = canvas.width / 2, cy = canvas.height / 2, scale = 0.02;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#e74c3c';
        bots.forEach(b => {
            if (b.health > 0) {
                let relX = (b.x - myPlayerPos.x) * scale;
                let relZ = (b.z - myPlayerPos.y) * scale;
                ctx.beginPath(); ctx.arc(cx + relX, cy + relZ, 3, 0, Math.PI * 2); ctx.fill();
            }
        });

        ctx.fillStyle = '#f1c40f';
        ctx.beginPath(); ctx.arc(cx, cy, 3.5, 0, Math.PI * 2); ctx.fill();
    }

    function onWindowResize() {
        if (!camera || !renderer) return;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    document.getElementById('startBtn').addEventListener('click', function() {
        initAudio();
        myPlayerName = document.getElementById('playerName').value.trim() || "مقاتل";
        selectedDevice = document.getElementById('deviceSelect').value;
        gameMode = document.getElementById('gameModeSelect').value;

        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('gameWrapper').style.display = 'block';

        init3D();
        let devText = selectedDevice === 'pc' ? '💻 كمبيوتر' : '📱 هاتف';
        addChatMessage(`🔥 مرحباً بك في KRUNK-WAR (${devText})!`, true);
    });

    document.addEventListener('keydown', (e) => {
        if (document.activeElement.id === 'chatInput') return;
        if (['KeyW', 'ArrowUp'].includes(e.code) || e.key === 'w' || e.key === 'W') movement.up = true;
        if (['KeyS', 'ArrowDown'].includes(e.code) || e.key === 's' || e.key === 'S') movement.down = true;
        if (['KeyA', 'ArrowLeft'].includes(e.code) || e.key === 'a' || e.key === 'A') movement.left = true;
        if (['KeyD', 'ArrowRight'].includes(e.code) || e.key === 'd' || e.key === 'D') movement.right = true;
        if (e.code === 'KeyR' || e.key === 'r' || e.key === 'R') reloadWeapon();
        if (e.code === 'KeyC' || e.key === 'c' || e.key === 'C') toggleCrouch();
        if (e.code === 'Space') performJump();
        if (e.code === 'Digit1') selectWeapon(1);
        if (e.code === 'Digit2') selectWeapon(2);
        if (e.code === 'Digit3') selectWeapon(3);
    });

    document.addEventListener('keyup', (e) => {
        if (['KeyW', 'ArrowUp'].includes(e.code) || e.key === 'w' || e.key === 'W') movement.up = false;
        if (['KeyS', 'ArrowDown'].includes(e.code) || e.key === 's' || e.key === 'S') movement.down = false;
        if (['KeyA', 'ArrowLeft'].includes(e.code) || e.key === 'a' || e.key === 'A') movement.left = false;
        if (['KeyD', 'ArrowRight'].includes(e.code) || e.key === 'd' || e.key === 'D') movement.right = false;
    });

    window.addEventListener('click', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.closest('#weaponUI') || e.target.closest('#tabBtn') || e.target.closest('#chatContainer') || e.target.classList.contains('insta-link')) return;
        performAttack();
    });

    function animate() {
        requestAnimationFrame(animate);
        handleFPSMovement();
        if (gameMode === "bots") updateBotsAI();
        drawMinimap();
        renderer.render(scene, camera);
    }
</script>
</body>
