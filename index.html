<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE WAR - Ultra Full Mechanics FPS</title>
    <style>
        body { margin: 0; background: #05020c; overflow: hidden; touch-action: none; font-family: 'Segoe UI', Roboto, sans-serif; user-select: none; }
        
        #mainMenu {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1b0933 0%, #06020f 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; color: #fff;
        }
        .menu-card {
            background: rgba(12, 5, 26, 0.85); padding: 45px 35px; border-radius: 24px;
            box-shadow: 0 0 40px rgba(155, 89, 182, 0.3), inset 0 0 20px rgba(52, 152, 219, 0.2); 
            width: 350px; text-align: center; border: 2px solid #8e44ad;
            backdrop-filter: blur(12px);
        }
        h1 { margin-top: 0; font-size: 46px; color: #3498db; letter-spacing: 3px; font-weight: 900; }
        
        input, button { width: 100%; padding: 15px; margin: 15px 0; border-radius: 12px; border: none; font-size: 16px; box-sizing: border-box; }
        input { background: rgba(15, 8, 30, 0.8); color: #fff; text-align: center; border: 2px solid #2c1a4d; }
        button { background: linear-gradient(90deg, #9b59b6, #3498db); color: #fff; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        #gameWrapper { display: none; position: relative; width: 100vw; height: 100vh; }
        
        #damageOverlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 7;
            box-shadow: inset 0 0 0px rgba(255, 0, 0, 0);
            transition: box-shadow 0.1s ease-out;
        }

        #scoreboard {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(6, 2, 15, 0.9); padding: 12px 35px; border-radius: 50px;
            color: #fff; font-weight: bold; font-size: 16px; display: flex; gap: 25px;
            border: 2px solid #9b59b6; pointer-events: none; z-index: 4;
        }
        
        #healthUI {
            position: absolute; top: 20px; left: 20px; background: rgba(6, 2, 15, 0.9);
            padding: 12px 20px; border-radius: 16px; border: 1px solid rgba(52, 152, 219, 0.4);
            color: #fff; font-weight: bold; font-size: 13px; z-index: 4; width: 160px;
        }
        .hp-bar-container { width: 100%; background: #111; height: 12px; border-radius: 6px; margin-top: 6px; overflow: hidden; }
        #hpBarFill { width: 100%; background: #3498db; height: 100%; transition: width 0.2s ease-out; }

        #weaponUI {
            position: absolute; bottom: 25px; right: 25px;
            background: rgba(6, 2, 15, 0.9); padding: 12px 22px; border-radius: 16px;
            border: 2px solid #00ffff; color: #fff; font-weight: 900; font-size: 16px;
            z-index: 4; text-align: center;
        }
        .weapon-slots { display: flex; gap: 8px; margin-top: 6px; }
        .slot { padding: 6px 12px; background: #1b0933; border: 1px solid #555; border-radius: 8px; font-size: 12px; cursor: pointer; }
        .slot.active { border-color: #00ffff; background: #3498db; color: #000; }

        #minimapCanvas {
            position: absolute; top: 20px; right: 20px;
            width: 140px; height: 140px; border-radius: 50%;
            border: 2px solid #00ffff; background: rgba(10, 5, 20, 0.85); z-index: 4;
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 6;
        }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #00ffff; }
        #crosshair::before { top: 4px; left: -8px; width: 26px; height: 2px; }
        #crosshair::after { top: -8px; left: 4px; width: 2px; height: 26px; }

        #chatContainer {
            position: absolute; bottom: 120px; left: 20px; width: 230px;
            background: rgba(6, 2, 15, 0.75); border-radius: 12px; padding: 10px; display: flex; flex-direction: column; z-index: 4; border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(5px);
        }
        #chatArea { height: 85px; overflow-y: auto; color: #fff; font-size: 11px; margin-bottom: 5px; text-align: right; direction: rtl; }
        #chatInput { padding: 8px; margin: 0; font-size: 11px; width: 100%; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #444; border-radius: 6px; box-sizing: border-box; }

        .nametag { position: absolute; color: #fff; font-weight: 800; font-size: 11px; background: rgba(6, 2, 15, 0.9); padding: 4px 9px; border-radius: 6px; pointer-events: none; z-index: 3; text-align: center; transform: translate(-50%, -100%); border: 1px solid rgba(255,255,255,0.2); }

        .touch-controls { position: absolute; bottom: 30px; left: 25px; right: 25px; display: flex; justify-content: space-between; pointer-events: none; width: calc(100% - 50px); z-index: 5; }
        .joystick-zone { width: 115px; height: 115px; border: 2px dashed rgba(52, 152, 219, 0.4); border-radius: 50%; display: flex; justify-content: center; align-items: center; pointer-events: auto; }
        .joystick-stick { width: 48px; height: 48px; background: linear-gradient(135deg, #3498db, #9b59b6); border-radius: 50%; }
        .fire-btn { width: 85px; height: 85px; background: linear-gradient(135deg, #e74c3c, #c0392b); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: 900; pointer-events: auto; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div id="mainMenu">
    <div class="menu-card">
        <h1>THE WAR</h1>
        <input type="text" id="playerName" placeholder="أدخل اسم المقاتل..." maxlength="12">
        <button id="startBtn">START</button>
    </div>
</div>

<div id="gameWrapper">
    <div id="damageOverlay"></div>
    <div id="crosshair"></div>

    <canvas id="minimapCanvas" width="140" height="140"></canvas>

    <div id="healthUI">
        <div>صحة المقاتل (HP)</div>
        <div class="hp-bar-container"><div id="hpBarFill"></div></div>
    </div>

    <div id="weaponUI">
        <div id="currentWeaponText">السلاح: سكين 🗡️</div>
        <div class="weapon-slots">
            <div class="slot active" id="slot1" onclick="selectWeapon(1)">1: سكين</div>
            <div class="slot" id="slot2" onclick="selectWeapon(2)">2: مسدس</div>
            <div class="slot" id="slot3" onclick="selectWeapon(3)">3: بندقية</div>
        </div>
    </div>

    <div id="scoreboard">
        <span style="color: #3498db;">الأزرق: <span id="blueScore">0</span></span>
        <span>🆚</span>
        <span style="color: #e74c3c;"><span id="redScore">0</span> :الأحمر</span>
    </div>

    <div id="labelsContainer"></div>
    
    <div id="chatContainer">
        <div id="chatArea"></div>
        <input type="text" id="chatInput" placeholder="اكتب للجروب..." maxlength="40">
    </div>
</div>

<div class="touch-controls" id="touchUI" style="display: none;">
    <div class="joystick-zone" id="joyZone">
        <div class="joystick-stick" id="joyStick"></div>
    </div>
    <div class="fire-btn" id="fireBtn">هجوم</div>
</div>

<script>
    let socket;
    try { socket = io(); } catch(e) { socket = { emit: function(){}, on: function(){} }; }

    let scene, camera, renderer;
    let playerGroups = {}; 
    let obstacleBoxes = [];
    let healthPacks = [];
    let activeParticles = [];
    let fpGunGroup;
    let myTeam = "blue";
    const movement = { up: false, down: false, left: false, right: false };
    let myPlayerPos = { x: 750, y: 750 };
    let playerYaw = 0;
    let currentHp = 100;
    let lastHp = 100;

    const WEAPONS = {
        1: { name: "سكين 🗡️", type: "knife", damage: 60, range: 45, cd: 400 },
        2: { name: "مسدس 🔫", type: "pistol", damage: 25, range: 800, cd: 300 },
        3: { name: "بندقية 🎯", type: "rifle", damage: 15, range: 1200, cd: 150 }
    };
    let currentWeaponId = 1;
    let lastAttackTime = 0;

    let audioListener, shootSoundBuffer;

    function init3D() {
        const container = document.getElementById('gameWrapper');
        scene = new THREE.Scene();
        scene.background = new THREE.Color('#070314'); 
        scene.fog = new THREE.FogExp2('#070314', 0.0005);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 4000);

        audioListener = new THREE.AudioListener();
        camera.add(audioListener);
        initAudioLoader();

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const dirLight = new THREE.DirectionalLight(0xa29bfe, 0.9);
        dirLight.position.set(1000, 1500, 1000);
        scene.add(dirLight);

        const floorGeo = new THREE.PlaneGeometry(3000, 3000);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x0a0518, roughness: 0.4 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.set(750, 0, 750);
        scene.add(floor);

        const gridHelper = new THREE.GridHelper(3000, 80, 0x00ffff, 0x8e44ad);
        gridHelper.position.set(750, 0.6, 750);
        scene.add(gridHelper);

        createFirstPersonGun();
        buildExpandedMap();
        spawnHealthPacks();

        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body || e.buttons === 1) {
                playerYaw -= e.movementX * 0.003;
            }
        });

        window.addEventListener('resize', onWindowResize);
        animate();
    }

    function initAudioLoader() {
        const audioLoader = new THREE.AudioLoader();
        audioLoader.load('https://assets.mixkit.co/active_storage/sfx/2153/2153-preview.mp3', function(buffer) {
            shootSoundBuffer = buffer;
        });
    }

    function playShootSound(posX, posY, posZ) {
        if (!audioListener || !shootSoundBuffer) return;
        const sound = new THREE.PositionalAudio(audioListener);
        sound.setBuffer(shootSoundBuffer);
        sound.setRefDistance(25);
        sound.setVolume(0.8);

        const soundHolder = new THREE.Object3D();
        soundHolder.position.set(posX, 30, posZ);
        scene.add(soundHolder);

        soundHolder.add(sound);
        sound.play();

        setTimeout(() => { scene.remove(soundHolder); }, 1000);
    }

    function selectWeapon(id) {
        currentWeaponId = id;
        document.querySelectorAll('.slot').forEach((s, idx) => {
            s.classList.toggle('active', idx + 1 === id);
        });
        document.getElementById('currentWeaponText').innerText = "السلاح: " + WEAPONS[id].name;
    }

    function createFirstPersonGun() {
        fpGunGroup = new THREE.Group();
        const matGun = new THREE.MeshStandardMaterial({ color: 0x222233, metalness: 0.8 });
        const knifeBlade = new THREE.Mesh(new THREE.BoxGeometry(0.5, 3, 10), new THREE.MeshBasicMaterial({ color: 0x00ffff }));
        knifeBlade.position.set(0, 0, -5);
        fpGunGroup.add(knifeBlade);

        fpGunGroup.position.set(2, -2, -4);
        camera.add(fpGunGroup);
        scene.add(camera);
    }

    function buildExpandedMap() {
        const towerGeo = new THREE.CylinderGeometry(40, 60, 300, 16);
        const towerMat = new THREE.MeshStandardMaterial({ color: 0x2c1a4d, metalness: 0.8 });
        const tower = new THREE.Mesh(towerGeo, towerMat);
        tower.position.set(750, 150, 750);
        scene.add(tower);
        addObstacleBox(750, 750, 100, 100);

        for(let i = 0; i < 4; i++) {
            let angle = (i * Math.PI) / 2;
            let ox = 750 + Math.cos(angle) * 350;
            let oz = 750 + Math.sin(angle) * 350;
            
            const pillar = new THREE.Mesh(new THREE.BoxGeometry(50, 180, 50), towerMat);
            pillar.position.set(ox, 90, oz);
            scene.add(pillar);
            addObstacleBox(ox, oz, 55, 55);
        }

        for (let i = 0; i < 35; i++) {
            let rx = Math.random() * 2400 - 450;
            let rz = Math.random() * 2400 - 450;
            let w = Math.random() * 120 + 60;
            let h = Math.random() * 120 + 60;

            const box = new THREE.Mesh(new THREE.BoxGeometry(w, 60, h), towerMat);
            box.position.set(rx, 30, rz);
            scene.add(box);
            addObstacleBox(rx, rz, w, h);
        }
    }

    function addObstacleBox(x, z, w, h) {
        obstacleBoxes.push({ minX: x - w/2 - 12, maxX: x + w/2 + 12, minZ: z - h/2 - 12, maxZ: z + h/2 + 12 });
    }

    function checkCollision(newX, newZ) {
        for (let b of obstacleBoxes) {
            if (newX > b.minX && newX < b.maxX && newZ > b.minZ && newZ < b.maxZ) {
                return true;
            }
        }
        return false;
    }

    function spawnHealthPacks() {
        const packCoords = [
            { x: 600, z: 600 },
            { x: 900, z: 900 },
            { x: 750, z: 500 }
        ];

        packCoords.forEach(pos => {
            const packGroup = new THREE.Group();
            const geo = new THREE.BoxGeometry(12, 12, 12);
            const mat = new THREE.MeshStandardMaterial({ color: 0x2ecc71, roughness: 0.2, metalness: 0.8 });
            const box = new THREE.Mesh(geo, mat);
            box.position.y = 8;
            packGroup.add(box);

            packGroup.position.set(pos.x, 0, pos.z);
            scene.add(packGroup);
            healthPacks.push({ group: packGroup, x: pos.x, z: pos.z, active: true });
        });
    }

    function checkHealthPackPickups() {
        healthPacks.forEach(pack => {
            if (!pack.active) return;
            let dist = Math.hypot(myPlayerPos.x - pack.x, myPlayerPos.y - pack.z);
            if (dist < 25) {
                pack.active = false;
                scene.remove(pack.group);
                currentHp = Math.min(100, currentHp + 35);
                document.getElementById('hpBarFill').style.width = currentHp + '%';

                setTimeout(() => {
                    scene.add(pack.group);
                    pack.active = true;
                }, 10000);
            }
        });
    }

    function onWindowResize() {
        if (!camera || !renderer) return;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    document.getElementById('startBtn').addEventListener('click', function() {
        const nameInput = document.getElementById('playerName');
        const name = nameInput.value.trim() || "مقاتل";
        
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('gameWrapper').style.display = 'block';
        
        if(window.innerWidth < 1024 || 'ontouchstart' in window) {
            document.getElementById('touchUI').style.display = 'flex';
        } else {
            document.body.requestPointerLock = document.body.requestPointerLock || document.body.mozRequestPointerLock;
            document.body.requestPointerLock();
        }

        init3D();
        socket.emit('initGame', { name: name });
    });

    function handleFPSMovement() {
        let speed = 4.0;
        let dx = 0, dz = 0;

        if (movement.up) { dx += Math.sin(playerYaw); dz -= Math.cos(playerYaw); }
        if (movement.down) { dx -= Math.sin(playerYaw); dz += Math.cos(playerYaw); }
        if (movement.left) { dx -= Math.cos(playerYaw); dz -= Math.sin(playerYaw); }
        if (movement.right) { dx += Math.cos(playerYaw); dz += Math.sin(playerYaw); }

        let nextX = myPlayerPos.x + dx * speed;
        let nextZ = myPlayerPos.y + dz * speed;

        if (!checkCollision(nextX, myPlayerPos.y)) myPlayerPos.x = nextX;
        if (!checkCollision(myPlayerPos.x, nextZ)) myPlayerPos.y = nextZ;

        camera.position.set(myPlayerPos.x, 34, myPlayerPos.y);
        camera.rotation.y = playerYaw;
    }

    function performAttack() {
        const now = Date.now();
        const weapon = WEAPONS[currentWeaponId];
        if (now - lastAttackTime < weapon.cd) return;
        lastAttackTime = now;

        if (currentWeaponId !== 1) {
            playShootSound(myPlayerPos.x, 30, myPlayerPos.y);
        }

        if (fpGunGroup) {
            fpGunGroup.position.z -= 1.5;
            setTimeout(() => { fpGunGroup.position.z = -4; }, 100);
        }

        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
        raycaster.far = weapon.range;

        const targetMeshes = [];
        for (let id in playerGroups) {
            if (playerGroups[id]) targetMeshes.push(...playerGroups[id].children);
        }

        const intersects = raycaster.intersectObjects(targetMeshes);

        if (intersects.length > 0) {
            const hitObj = intersects[0].object;
            let isHeadshot = hitObj.position.y >= 30;
            let finalDamage = isHeadshot ? weapon.damage * 2 : weapon.damage;

            socket.emit('playerHit', {
                targetId: hitObj.parent.userData.id,
                damage: finalDamage,
                isHeadshot: isHeadshot
            });
        }
    }

    function drawMinimap() {
        const canvas = document.getElementById('minimapCanvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const scale = 0.05;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#8e44ad';
        obstacleBoxes.forEach(b => {
            let relX = ((b.minX + b.maxX)/2 - myPlayerPos.x) * scale;
            let relZ = ((b.minZ + b.maxZ)/2 - myPlayerPos.y) * scale;
            ctx.fillRect(cx + relX - 3, cy + relZ - 3, 6, 6);
        });

        ctx.fillStyle = '#00ffff';
        ctx.beginPath();
        ctx.arc(cx, cy, 4, 0, Math.PI * 2);
        ctx.fill();
    }

    document.addEventListener('keydown', (e) => {
        if (['w', 'ArrowUp', 'KeyW'].includes(e.code)) movement.up = true;
        if (['s', 'ArrowDown', 'KeyS'].includes(e.code)) movement.down = true;
        if (['a', 'ArrowLeft', 'KeyA'].includes(e.code)) movement.left = true;
        if (['d', 'ArrowRight', 'KeyD'].includes(e.code)) movement.right = true;

        if (e.code === 'Digit1') selectWeapon(1);
        if (e.code === 'Digit2') selectWeapon(2);
        if (e.code === 'Digit3') selectWeapon(3);
    });

    document.addEventListener('keyup', (e) => {
        if (['w', 'ArrowUp', 'KeyW'].includes(e.code)) movement.up = false;
        if (['s', 'ArrowDown', 'KeyS'].includes(e.code)) movement.down = false;
        if (['a', 'ArrowLeft', 'KeyA'].includes(e.code)) movement.left = false;
        if (['d', 'ArrowRight', 'KeyD'].includes(e.code)) movement.right = false;
    });

    window.addEventListener('click', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.closest('#weaponUI')) return;
        performAttack();
    });

    function animate() {
        requestAnimationFrame(animate);
        handleFPSMovement();
        checkHealthPackPickups();
        drawMinimap();
        if (renderer && scene && camera) renderer.render(scene, camera);
    }
</script>
</body>
</html>
