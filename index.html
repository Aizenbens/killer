<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KRUNK-WAR 3D - Ultimate Edition</title>
    <style>
        * { box-sizing: border-box; touch-action: none; -webkit-touch-callout: none; user-select: none; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        #mainMenu {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; color: #fff;
        }
        .menu-card {
            background: rgba(30, 41, 59, 0.95); padding: 22px; border-radius: 14px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.85); width: 90%; max-width: 400px; text-align: center; border: 2px solid #64748b;
        }
        h1 { margin: 0 0 10px 0; font-size: 28px; color: #cbd5e1; font-weight: 900; text-shadow: 2px 2px 4px #000; }
        label { font-size: 11px; color: #94a3b8; display: block; text-align: right; margin-top: 8px; font-weight: bold; }
        input, button, select { width: 100%; padding: 10px; margin: 4px 0; border-radius: 6px; border: none; font-size: 13px; font-weight: bold; }
        input, select { background: #0f172a; color: #fff; text-align: center; border: 2px solid #334155; }
        
        .btn-main { background: #475569; color: #fff; cursor: pointer; border-bottom: 4px solid #1e293b; margin-top: 10px; }
        .btn-sec { background: #3b82f6; color: #fff; cursor: pointer; border-bottom: 4px solid #1d4ed8; }
        .btn-join { background: #10b981; color: #000; cursor: pointer; border-bottom: 4px solid #047857; }
        button:active { border-bottom: 0px; transform: translateY(4px); }

        #shareBox { display: none; margin-top: 10px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; border: 1px dashed #94a3b8; }
        #shareBox input { font-size: 11px; background: #111; color: #10b981; }

        #gameWrapper { display: none; position: relative; width: 100vw; height: 100vh; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; transform: translate(-50%, -50%); pointer-events: none; z-index: 6; background: #10b981; border-radius: 50%; border: 1px solid #000; }
        
        #damageOverlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 8; opacity: 0; transition: opacity 0.15s ease-out;
            box-shadow: inset 0 0 100px rgba(220, 38, 38, 0.85);
        }

        #scopeOverlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9; display: none;
            background: radial-gradient(circle at center, transparent 25%, rgba(0,0,0,0.95) 30%, #000 100%);
        }
        #scopeOverlay::before, #scopeOverlay::after { content: ''; position: absolute; background: rgba(220, 38, 38, 0.7); }
        #scopeOverlay::before { top: 50%; left: 0; right: 0; height: 1px; }
        #scopeOverlay::after { left: 50%; top: 0; bottom: 0; width: 1px; }

        #healthUI { position: absolute; top: 12px; left: 12px; background: rgba(15, 23, 42, 0.85); padding: 8px 12px; border-radius: 8px; border: 2px solid #475569; color: #fff; font-size: 11px; z-index: 4; width: 160px; }
        .hp-bar-container { width: 100%; background: #334155; height: 10px; border-radius: 5px; margin-top: 4px; overflow: hidden; }
        #hpBarFill { width: 100%; background: #10b981; height: 100%; transition: width 0.2s; }
        #ammoDisplay { margin-top: 4px; font-size: 11px; color: #cbd5e1; display: flex; justify-content: space-between; }

        #weapon3DAmmoUI {
            position: absolute; bottom: 120px; right: 28%; background: rgba(15, 23, 42, 0.75);
            padding: 4px 10px; border-radius: 6px; border: 1px solid #64748b; color: #38bdf8;
            font-size: 14px; font-weight: 900; pointer-events: none; z-index: 5;
        }

        #chatBox {
            position: absolute; top: 80px; left: 12px; width: 260px; height: 140px;
            background: rgba(15, 23, 42, 0.6); border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; justify-content: space-between; padding: 6px; z-index: 5;
        }
        #chatMessages { overflow-y: auto; font-size: 11px; color: #e2e8f0; display: flex; flex-direction: column; gap: 4px; }
        #chatInput { background: rgba(0,0,0,0.5); border: 1px solid #475569; color: #fff; padding: 4px 8px; font-size: 10px; border-radius: 4px; text-align: left; }

        #weaponUI { position: absolute; bottom: 12px; right: 12px; background: rgba(15, 23, 42, 0.85); padding: 6px 10px; border-radius: 8px; border: 2px solid #475569; color: #fff; font-size: 11px; z-index: 4; text-align: center; }
        .weapon-slots { display: flex; gap: 4px; margin-top: 4px; }
        .slot { padding: 4px 8px; background: #1e293b; border: 2px solid #334155; border-radius: 4px; font-size: 10px; color: #fff; cursor: pointer; font-weight: bold; }
        .slot.active { border-color: #38bdf8; background: #0284c7; color: #fff; }

        .touch-controls { position: absolute; bottom: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; align-items: flex-end; pointer-events: none; z-index: 5; }
        .joystick-zone { width: 90px; height: 90px; border: 2px dashed rgba(255, 255, 255, 0.3); border-radius: 50%; display: flex; justify-content: center; align-items: center; pointer-events: auto; background: rgba(0,0,0,0.3); position: relative; }
        .joystick-stick { width: 35px; height: 35px; background: #64748b; border-radius: 50%; position: absolute; }
        .touch-action-btns { display: flex; gap: 6px; pointer-events: auto; flex-wrap: wrap; max-width: 200px; justify-content: flex-end; }
        .action-btn { width: 44px; height: 44px; border-radius: 8px; display: flex; justify-content: center; align-items: center; color: white; font-weight: 900; font-size: 10px; border: 2px solid #000; }
        .fire-btn { background: #ef4444; width: 52px; height: 52px; font-size: 11px; }
        .ads-btn { background: #8b5cf6; }
        .jump-btn { background: #10b981; }
        .sprint-btn { background: #f59e0b; }
        .reload-btn { background: #3b82f6; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

<div id="mainMenu">
    <div class="menu-card">
        <h1>KRUNK-WAR 3D</h1>
        
        <label>اسم اللاعب:</label>
        <input type="text" id="playerName" placeholder="ادخل اسمك" maxlength="10" value="مقاتل">

        <label>الجهاز:</label>
        <select id="deviceSelect">
            <option value="pc">💻 كمبيوتر (ماوس + كيبورد)</option>
            <option value="phone">📱 هاتف (أزرار لمس)</option>
        </select>

        <button class="btn-main" onclick="joinPublicMatch()">دخول سيرفر عام 🌐</button>
        <button class="btn-sec" onclick="createPrivateRoom()">إنشاء غرفة خاصة 🔒</button>

        <div style="margin-top: 10px; border-top: 1px solid #334155; padding-top: 8px;">
            <label>الانضمام بكود الغرفة:</label>
            <input type="text" id="joinCodeInput" placeholder="مثال: A1B2C3" style="text-transform: uppercase;">
            <button class="btn-join" onclick="joinByCode()">انضمام 🚀</button>
        </div>

        <div id="shareBox">
            <label style="text-align:center;">كود غرفتك:</label>
            <input type="text" id="roomCodeDisplay" readonly>
            <button onclick="copyInviteLink()" style="font-size:10px; padding:5px; background:#64748b; color:#fff; font-weight:bold;">نسخ الرابط 📋</button>
        </div>
    </div>
</div>

<div id="gameWrapper">
    <div id="crosshair"></div>
    <div id="scopeOverlay"></div>
    <div id="damageOverlay"></div>

    <div id="healthUI">
        <div>الصحة (HP): <span id="hpValue">100</span></div>
        <div class="hp-bar-container"><div id="hpBarFill"></div></div>
        <div id="ammoDisplay">
            <span>الذخيرة:</span>
            <span id="ammoCount">10 / 50</span>
        </div>
    </div>

    <div id="weapon3DAmmoUI">AMMO: 10</div>

    <div id="chatBox">
        <div id="chatMessages">
            <div><b style="color:#38bdf8;">[النظام]:</b> مرحباً بك! البيوت والأثاث والنوافذ مفردة وعشوائية بشكل كامل.</div>
        </div>
        <input type="text" id="chatInput" placeholder="اكتب للدردشة ثم اضغط Enter..." maxlength="40">
    </div>

    <div id="weaponUI">
        <div id="currentWeaponText">بندقية قنص 🎯</div>
        <div class="weapon-slots">
            <div class="slot" id="slot1" onclick="selectWeapon(1)">1: سكين</div>
            <div class="slot" id="slot2" onclick="selectWeapon(2)">2: مسدس</div>
            <div class="slot active" id="slot3" onclick="selectWeapon(3)">3: قناصة</div>
        </div>
    </div>
</div>

<div class="touch-controls" id="touchUI" style="display: none;">
    <div class="joystick-zone" id="joyZone"><div class="joystick-stick" id="joyStick"></div></div>
    <div class="touch-action-btns">
        <div class="action-btn ads-btn" id="adsBtn">🔍 سكوب</div>
        <div class="action-btn reload-btn" id="reloadBtn">🔄 تعبئة</div>
        <div class="action-btn sprint-btn" id="sprintBtn">⚡ جري</div>
        <div class="action-btn jump-btn" id="jumpBtn">🦘 قفز</div>
        <div class="action-btn fire-btn" id="fireBtn">إطلاق</div>
    </div>
</div>

<script>
    let peer, conn;
    let roomCode = "";

    let scene, camera, renderer;
    let myPos = { x: 2500, y: 35, z: 2500 };
    let playerYaw = 0, playerPitch = 0;
    let selectedDevice = "pc";
    
    const keys = { w: false, a: false, s: false, d: false, shift: false };
    let touchMove = { x: 0, y: 0 };
    let isSprinting = false;

    let isAiming = false;
    let baseEyeHeight = 35;
    let velocityY = 0, isGrounded = true;
    
    const gravity = -0.4;
    const jumpPower = 6.8; 
    let baseMoveSpeed = 3.2;

    let playerHP = 100;

    let fpWeaponGroup, currentKnifeMesh, currentPistolMesh, currentRifleMesh;
    let knifeAnimTime = 0, isKnifeSwinging = false, knifeAttackType = 0;
    let recoilOffset = 0;
    let walkBobble = 0;

    let colliders = [];
    let floorsColliders = [];
    let stairsColliders = [];

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'shoot') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        } else if (type === 'jump') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }
    }

    const WEAPONS = {
        1: { name: "سكين تكتيكي 🗡️", cd: 200, damage: 100, maxAmmo: Infinity, currentAmmo: Infinity, isMelee: true },
        2: { name: "مسدس فاخر 🔫", cd: 180, damage: 40, maxAmmo: 12, currentAmmo: 12, reserveAmmo: 60 },
        3: { name: "بندقية قنص 🎯", cd: 400, damage: 90, maxAmmo: 10, currentAmmo: 10, reserveAmmo: 50 }
    };
    let currentWeaponId = 3;

    function createPrivateRoom() {
        roomCode = Math.random().toString(36).substring(2, 8).toUpperCase();
        peer = new Peer("KRUNK_" + roomCode);
        peer.on('open', () => {
            document.getElementById('roomCodeDisplay').value = roomCode;
            document.getElementById('shareBox').style.display = 'block';
            start3DGame();
        });
    }

    function joinByCode() {
        let code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
        if (!code) return;
        peer = new Peer();
        peer.on('open', () => {
            conn = peer.connect("KRUNK_" + code);
            start3DGame();
        });
    }

    function joinPublicMatch() {
        document.getElementById('joinCodeInput').value = "PUBLIC123";
        joinByCode();
    }

    function copyInviteLink() {
        const link = `${window.location.origin}${window.location.pathname}?room=${roomCode}`;
        navigator.clipboard.writeText(link);
        alert("تم نسخ رابط الدعوة!");
    }

    function start3DGame() {
        selectedDevice = document.getElementById('deviceSelect').value;
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('gameWrapper').style.display = 'block';

        init3D();
        setupChat();
    }

    function setupChat() {
        const input = document.getElementById('chatInput');
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Enter') {
                if (document.activeElement === input) {
                    let msg = input.value.trim();
                    if (msg) {
                        const name = document.getElementById('playerName').value || "مقاتل";
                        addChatMessage(name, msg);
                        input.value = '';
                    }
                    input.blur();
                    if (selectedDevice === 'pc') document.body.requestPointerLock();
                } else {
                    input.focus();
                }
            }
        });
    }

    function addChatMessage(sender, msg) {
        const chatMsgs = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.innerHTML = `<b style="color:#10b981;">${sender}:</b> ${msg}`;
        chatMsgs.appendChild(div);
        chatMsgs.scrollTop = chatMsgs.scrollHeight;
    }

    function init3D() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color('#1e222d');
        scene.fog = new THREE.FogExp2('#1e222d', 0.00025);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 4000);
        camera.rotation.order = 'YXZ';

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('gameWrapper').appendChild(renderer.domElement);

        const ambLight = new THREE.AmbientLight(0xffffff, 0.85);
        scene.add(ambLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(1000, 2000, 1000);
        scene.add(dirLight);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(5000, 5000), new THREE.MeshLambertMaterial({ color: 0x222831 }));
        floor.rotation.x = -Math.PI / 2;
        floor.position.set(2500, 0, 2500);
        scene.add(floor);

        buildRandom3FloorHouses();
        buildAbundantObstacles();

        fpWeaponGroup = new THREE.Group();
        camera.add(fpWeaponGroup);
        scene.add(camera);

        buildAccurateWeapons();

        window.addEventListener('keydown', (e) => {
            if (document.activeElement === document.getElementById('chatInput')) return;
            if (e.code === 'KeyW') keys.w = true;
            if (e.code === 'KeyS') keys.s = true;
            if (e.code === 'KeyA') keys.a = true;
            if (e.code === 'KeyD') keys.d = true;
            if (e.code === 'ShiftLeft') keys.shift = true;
            if (e.code === 'Space' && isGrounded) { 
                velocityY = jumpPower; 
                isGrounded = false; 
                playSound('jump');
            }
            if (e.code === 'KeyR') reloadWeapon();

            if (e.code === 'Digit1') selectWeapon(1);
            if (e.code === 'Digit2') selectWeapon(2);
            if (e.code === 'Digit3') selectWeapon(3);
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW') keys.w = false;
            if (e.code === 'KeyS') keys.s = false;
            if (e.code === 'KeyA') keys.a = false;
            if (e.code === 'KeyD') keys.d = false;
            if (e.code === 'ShiftLeft') keys.shift = false;
        });

        if (selectedDevice === 'phone') {
            document.getElementById('touchUI').style.display = 'flex';
            setupTouch();
        } else {
            window.addEventListener('click', () => {
                if (document.activeElement !== document.getElementById('chatInput')) {
                    document.body.requestPointerLock();
                }
            });
            window.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === document.body) {
                    playerYaw -= e.movementX * 0.0022;
                    playerPitch -= e.movementY * 0.0022;
                    playerPitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, playerPitch));
                }
            });
            window.addEventListener('mousedown', (e) => {
                if (document.pointerLockElement === document.body) {
                    if (e.button === 0) performAttack();
                    if (e.button === 2) toggleADS(true);
                }
            });
            window.addEventListener('mouseup', (e) => {
                if (e.button === 2) toggleADS(false);
            });
            window.addEventListener('contextmenu', e => e.preventDefault());
        }

        selectWeapon(3);
        animate();
    }

    // إنشاء بيوت عشوائية بألوان، سلالم، أثاث ونوافذ عشوائية
    function buildRandom3FloorHouses() {
        const houseColors = [0x3a4750, 0x475569, 0x5c3a21, 0x2d4a3e, 0x3b3345, 0x1f2937, 0x64748b];
        const furnitureMat = new THREE.MeshLambertMaterial({ color: 0x78350f });
        const stairMat = new THREE.MeshLambertMaterial({ color: 0x475569 });

        for (let i = 0; i < 12; i++) {
            let hx = 600 + Math.random() * 3800;
            let hz = 600 + Math.random() * 3800;

            let width = 360, depth = 360;
            let floorHeight = 70;
            let totalHeight = floorHeight * 3;

            let wallMat = new THREE.MeshLambertMaterial({ color: houseColors[Math.floor(Math.random() * houseColors.length)] });

            // الجدران الأساسية
            createWall(hx - width/2, totalHeight/2, hz, 14, totalHeight, depth, wallMat);
            createWall(hx + width/2, totalHeight/2, hz, 14, totalHeight, depth, wallMat);
            createWall(hx, totalHeight/2, hz - depth/2, width, totalHeight, 14, wallMat);

            // الجدار الأمامي مع فتحة الباب في المنتصف
            let sideWallWidth = (width - 120) / 2;
            createWall(hx - width/2 + sideWallWidth/2, totalHeight/2, hz + depth/2, sideWallWidth, totalHeight, 14, wallMat);
            createWall(hx + width/2 - sideWallWidth/2, totalHeight/2, hz + depth/2, sideWallWidth, totalHeight, 14, wallMat);

            let topDoorWall = new THREE.Mesh(new THREE.BoxGeometry(120, 20, 14), wallMat);
            topDoorWall.position.set(hx, 60, hz + depth/2);
            scene.add(topDoorWall);

            // إضافة نوافذ عشوائية الشكل والموقع على الأدوار
            for (let f = 1; f <= 2; f++) {
                if (Math.random() > 0.3) {
                    let winOffset = (Math.random() - 0.5) * 160;
                    let windowMesh = new THREE.Mesh(new THREE.BoxGeometry(60, 35, 18), new THREE.MeshBasicMaterial({ color: 0x38bdf8, transparent: true, opacity: 0.4 }));
                    windowMesh.position.set(hx + winOffset, f * floorHeight + 35, hz + depth/2);
                    scene.add(windowMesh);
                }
            }

            // إضافة أدوار وسلالم داخلية
            for (let f = 1; f <= 2; f++) {
                let fy = f * floorHeight;
                let floorMesh = new THREE.Mesh(new THREE.BoxGeometry(width - 20, 6, depth - 20), new THREE.MeshLambertMaterial({ color: 0x1f2937 }));
                floorMesh.position.set(hx, fy, hz);
                scene.add(floorMesh);

                floorsColliders.push({ x: hx, z: hz, w: width - 20, d: depth - 20, heightY: fy + baseEyeHeight });

                // إنشاء الدرج للصعود للأدوار العلوي
                for (let s = 0; s < 15; s++) {
                    const step = new THREE.Mesh(new THREE.BoxGeometry(60, 5, 20), stairMat);
                    let sx = (f === 1) ? (hx - width/3) : (hx + width/3);
                    let sy = (f - 1) * floorHeight + s * 4.6 + 3;
                    let sz = (hz - depth/3) + s * 11;
                    step.position.set(sx, sy, sz);
                    scene.add(step);

                    stairsColliders.push({ x: sx, z: sz, y: sy + baseEyeHeight, radius: 30 });
                }
            }

            // أثاث عشوائي داخل البيوت
            addFurniture(hx - 50, 15, hz - 50, 50, 30, 70, furnitureMat);
            addFurniture(hx + 60, 70 + 15, hz + 40, 60, 30, 40, furnitureMat);
        }
    }

    function addFurniture(x, y, z, w, h, d, mat) {
        let obj = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
        obj.position.set(x, y, z);
        scene.add(obj);
        colliders.push({ x: x, z: z, w: w, d: d });
    }

    function buildAbundantObstacles() {
        const crateMat = new THREE.MeshLambertMaterial({ color: 0x3f2e21 });
        const concreteMat = new THREE.MeshLambertMaterial({ color: 0x64748b });

        for (let i = 0; i < 60; i++) {
            let cx = 200 + Math.random() * 4600;
            let cz = 200 + Math.random() * 4600;

            if (i % 2 === 0) {
                let crate = new THREE.Mesh(new THREE.BoxGeometry(60, 60, 60), crateMat);
                crate.position.set(cx, 30, cz);
                scene.add(crate);
                colliders.push({ x: cx, z: cz, w: 60, d: 60 });
            } else {
                let barrier = new THREE.Mesh(new THREE.BoxGeometry(120, 55, 30), concreteMat);
                barrier.position.set(cx, 27.5, cz);
                scene.add(barrier);
                colliders.push({ x: cx, z: cz, w: 120, d: 30 });
            }
        }
    }

    function createWall(x, y, z, w, h, d, mat) {
        let wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
        wall.position.set(x, y, z);
        scene.add(wall);
        colliders.push({ x: x, z: z, w: w, d: d });
    }

    function buildAccurateWeapons() {
        const greenMat = new THREE.MeshLambertMaterial({ color: 0x556b2f });
        const darkMetalMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
        const goldMat = new THREE.MeshLambertMaterial({ color: 0xd4af37 });
        const woodGripMat = new THREE.MeshLambertMaterial({ color: 0x5c2c16 });
        const steelBladeMat = new THREE.MeshLambertMaterial({ color: 0xd1d5db });
        const greenKnifeGripMat = new THREE.MeshLambertMaterial({ color: 0x059669 });

        // 1. السكين
        currentKnifeMesh = new THREE.Group();
        let blade = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.25, 1.2), steelBladeMat);
        blade.position.set(0, 0, -0.6);
        let guard = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.35, 0.1), steelBladeMat);
        guard.position.set(0, 0, -0.02);
        let grip = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.6, 12), greenKnifeGripMat);
        grip.rotation.x = Math.PI / 2;
        grip.position.set(0, -0.02, 0.3);

        currentKnifeMesh.add(blade, guard, grip);
        currentKnifeMesh.position.set(0.35, -0.35, -0.8);
        fpWeaponGroup.add(currentKnifeMesh);

        // 2. المسدس
        currentPistolMesh = new THREE.Group();
        let pSlide = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.22, 1.0), goldMat);
        pSlide.position.set(0, 0.1, -0.3);
        let pGrip = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.55, 0.3), woodGripMat);
        pGrip.rotation.x = -0.2;
        pGrip.position.set(0, -0.22, 0.05);
        let pBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.4, 12), darkMetalMat);
        pBarrel.rotation.x = Math.PI / 2;
        pBarrel.position.set(0, 0.12, -0.8);

        currentPistolMesh.add(pSlide, pGrip, pBarrel);
        currentPistolMesh.position.set(0.3, -0.35, -0.7);
        currentPistolMesh.visible = false;
        fpWeaponGroup.add(currentPistolMesh);

        // 3. القناصة
        currentRifleMesh = new THREE.Group();
        let rBody = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.32, 2.2), greenMat);
        rBody.position.set(0, 0, -0.6);
        let rBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1.8, 12), darkMetalMat);
        rBarrel.rotation.x = Math.PI / 2;
        rBarrel.position.set(0, 0.02, -2.0);
        let rScope = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, 0.9, 16), darkMetalMat);
        rScope.rotation.x = Math.PI / 2;
        rScope.position.set(0, 0.28, -0.6);

        currentRifleMesh.add(rBody, rBarrel, rScope);
        currentRifleMesh.position.set(0.2, -0.3, -0.8);
        currentRifleMesh.rotation.set(0.05, -0.05, 0);
        currentRifleMesh.visible = false;
        fpWeaponGroup.add(currentRifleMesh);
    }

    function toggleADS(state) {
        if (currentWeaponId === 1) return;
        isAiming = state;

        document.getElementById('crosshair').style.opacity = isAiming ? '0' : '1';
        document.getElementById('scopeOverlay').style.display = isAiming ? 'block' : 'none';

        fpWeaponGroup.visible = !isAiming;
        camera.fov = isAiming ? 25 : (isSprinting ? 85 : 75);
        camera.updateProjectionMatrix();
    }

    function selectWeapon(id) {
        currentWeaponId = id;
        toggleADS(false);

        document.querySelectorAll('.slot').forEach((s, idx) => s.classList.toggle('active', idx + 1 === id));
        document.getElementById('currentWeaponText').innerText = WEAPONS[id].name;

        currentKnifeMesh.visible = (id === 1);
        currentPistolMesh.visible = (id === 2);
        currentRifleMesh.visible = (id === 3);

        updateAmmoUI();
    }

    function reloadWeapon() {
        const w = WEAPONS[currentWeaponId];
        if (w.isMelee || w.currentAmmo === w.maxAmmo || w.reserveAmmo <= 0) return;

        let needed = w.maxAmmo - w.currentAmmo;
        let reloadAmount = Math.min(needed, w.reserveAmmo);
        w.currentAmmo += reloadAmount;
        w.reserveAmmo -= reloadAmount;

        updateAmmoUI();
    }

    function updateAmmoUI() {
        const w = WEAPONS[currentWeaponId];
        document.getElementById('ammoCount').innerText = w.isMelee ? "∞ / ∞" : `${w.currentAmmo} / ${w.reserveAmmo}`;
        document.getElementById('weapon3DAmmoUI').innerText = w.isMelee ? "KNIFE" : `AMMO: ${w.currentAmmo}`;
    }

    function checkWallCollision(nextX, nextZ) {
        const playerRadius = 14;
        for (let c of colliders) {
            if (nextX + playerRadius > c.x - c.w/2 && nextX - playerRadius < c.x + c.w/2 &&
                nextZ + playerRadius > c.z - c.d/2 && nextZ - playerRadius < c.z + c.d/2) {
                return true;
            }
        }
        return false;
    }

    function animate() {
        requestAnimationFrame(animate);

        let inputX = 0, inputZ = 0;
        if (keys.w) inputZ += 1;
        if (keys.s) inputZ -= 1;
        if (keys.a) inputX -= 1;
        if (keys.d) inputX += 1;

        if (touchMove.x !== 0 || touchMove.y !== 0) {
            inputX = touchMove.x;
            inputZ = -touchMove.y;
        }

        isSprinting = (keys.shift || touchMove.isSprint) && keys.w && !isAiming;
        let speed = isSprinting ? baseMoveSpeed * 1.6 : baseMoveSpeed;

        let isMoving = (inputX !== 0 || inputZ !== 0);

        if (isMoving) {
            let sin = Math.sin(playerYaw);
            let cos = Math.cos(playerYaw);

            let nextX = myPos.x + (inputX * cos - inputZ * sin) * speed;
            let nextZ = myPos.z + (-inputX * sin - inputZ * cos) * speed;

            if (!checkWallCollision(nextX, myPos.z)) myPos.x = nextX;
            if (!checkWallCollision(myPos.x, nextZ)) myPos.z = nextZ;
        }

        myPos.x = Math.max(50, Math.min(4950, myPos.x));
        myPos.z = Math.max(50, Math.min(4950, myPos.z));

        let floorHeight = baseEyeHeight;
        for (let fl of floorsColliders) {
            if (myPos.x > fl.x - fl.w/2 && myPos.x < fl.x + fl.w/2 &&
                myPos.z > fl.z - fl.d/2 && myPos.z < fl.z + fl.d/2) {
                if (myPos.y >= fl.heightY - 20) floorHeight = fl.heightY;
            }
        }

        for (let st of stairsColliders) {
            let dx = myPos.x - st.x;
            let dz = myPos.z - st.z;
            if (Math.sqrt(dx * dx + dz * dz) < st.radius) {
                if (st.y > floorHeight) floorHeight = st.y;
            }
        }

        velocityY += gravity;
        myPos.y += velocityY;

        if (myPos.y <= floorHeight) {
            myPos.y = floorHeight;
            velocityY = 0;
            isGrounded = true;
        }

        if (isMoving && isGrounded && !isAiming) {
            walkBobble += isSprinting ? 0.22 : 0.12;
            fpWeaponGroup.position.y = Math.sin(walkBobble) * (isSprinting ? 0.06 : 0.03);
            fpWeaponGroup.position.x = Math.cos(walkBobble * 0.5) * (isSprinting ? 0.04 : 0.02);
        } else {
            fpWeaponGroup.position.set(0, 0, 0);
        }

        if (recoilOffset > 0) {
            recoilOffset -= 0.05;
            fpWeaponGroup.position.z = recoilOffset;
        }

        if (isKnifeSwinging) {
            knifeAnimTime += 0.22;
            if (knifeAttackType === 0) {
                currentKnifeMesh.position.z = -0.8 - Math.sin(knifeAnimTime) * 0.5;
            } else if (knifeAttackType === 1) {
                currentKnifeMesh.rotation.y = -Math.sin(knifeAnimTime) * 1.2;
                currentKnifeMesh.position.x = 0.35 - Math.sin(knifeAnimTime) * 0.3;
            } else {
                currentKnifeMesh.rotation.x = Math.sin(knifeAnimTime) * 1.0;
                currentKnifeMesh.position.y = -0.35 + Math.sin(knifeAnimTime) * 0.25;
            }

            if (knifeAnimTime >= Math.PI) {
                isKnifeSwinging = false;
                knifeAnimTime = 0;
                currentKnifeMesh.rotation.set(0, 0, 0);
                currentKnifeMesh.position.set(0.35, -0.35, -0.8);
            }
        }

        if (camera) {
            camera.position.set(myPos.x, myPos.y, myPos.z);
            camera.rotation.y = playerYaw;
            camera.rotation.x = playerPitch;
        }

        renderer.render(scene, camera);
    }

    function setupTouch() {
        const joyZone = document.getElementById('joyZone');
        const joyStick = document.getElementById('joyStick');

        joyZone.addEventListener('touchmove', (e) => {
            const rect = joyZone.getBoundingClientRect();
            const touch = e.touches[0];
            let x = touch.clientX - (rect.left + rect.width / 2);
            let y = touch.clientY - (rect.top + rect.height / 2);
            let dist = Math.sqrt(x * x + y * y);
            let maxDist = 35;

            if (dist > maxDist) {
                x = (x / dist) * maxDist;
                y = (y / dist) * maxDist;
            }

            joyStick.style.transform = `translate(${x}px, ${y}px)`;
            touchMove.x = x / maxDist;
            touchMove.y = y / maxDist;
        });

        joyZone.addEventListener('touchend', () => {
            joyStick.style.transform = `translate(0px, 0px)`;
            touchMove.x = 0;
            touchMove.y = 0;
        });

        document.getElementById('fireBtn').addEventListener('touchstart', performAttack);
        document.getElementById('adsBtn').addEventListener('touchstart', () => toggleADS(!isAiming));
        document.getElementById('reloadBtn').addEventListener('touchstart', reloadWeapon);
        document.getElementById('sprintBtn').addEventListener('touchstart', () => {
            touchMove.isSprint = !touchMove.isSprint;
            document.getElementById('sprintBtn').style.backgroundColor = touchMove.isSprint ? '#10b981' : '#f59e0b';
        });
        document.getElementById('jumpBtn').addEventListener('touchstart', () => {
            if (isGrounded) { velocityY = jumpPower; isGrounded = false; playSound('jump'); }
        });
    }

    function performAttack() {
        const weapon = WEAPONS[currentWeaponId];

        if (weapon.isMelee) {
            if (!isKnifeSwinging) {
                isKnifeSwinging = true;
                knifeAnimTime = 0;
                knifeAttackType = (knifeAttackType + 1) % 3;
            }
            return;
        }

        if (weapon.currentAmmo <= 0) {
            reloadWeapon();
            return;
        }

        weapon.currentAmmo--;
        updateAmmoUI();

        playSound('shoot');
        recoilOffset = 0.2;
        playerPitch += 0.01;
    }
</script>
