<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE WAR</title>
    <style>
        body { margin: 0; background: #05020c; overflow: hidden; touch-action: none; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; user-select: none; }
        
        #mainMenu {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1b0933 0%, #06020f 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; color: #fff;
        }
        .menu-card {
            background: rgba(12, 5, 26, 0.85); padding: 45px 35px; border-radius: 24px;
            box-shadow: 0 0 40px rgba(155, 89, 182, 0.3), inset 0 0 20px rgba(52, 152, 219, 0.2); 
            width: 350px; text-align: center; border: 2px solid #8e44ad;
            backdrop-filter: blur(12px);
            animation: pulseGlow 4s infinite alternate;
        }
        @keyframes pulseGlow {
            0% { border-color: #8e44ad; box-shadow: 0 0 30px rgba(155, 89, 182, 0.2); }
            100% { border-color: #3498db; box-shadow: 0 0 50px rgba(52, 152, 219, 0.4); }
        }
        h1 { margin-top: 0; font-size: 46px; color: #3498db; letter-spacing: 3px; text-shadow: 0 0 15px rgba(52,152,219,0.7), 0 0 30px rgba(155,89,182,0.5); font-weight: 900; }
        
        input, button { width: 100%; padding: 15px; margin: 15px 0; border-radius: 12px; border: none; font-size: 16px; box-sizing: border-box; transition: all 0.3s ease; }
        input { background: rgba(15, 8, 30, 0.8); color: #fff; font-weight: bold; text-align: center; border: 2px solid #2c1a4d; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
        input:focus { border-color: #3498db; outline: none; box-shadow: 0 0 12px rgba(52,152,219,0.5); background: rgba(25, 12, 50, 0.9); }
        
        button { background: linear-gradient(90deg, #9b59b6, #3498db); color: #fff; font-weight: 800; cursor: pointer; letter-spacing: 2px; box-shadow: 0 6px 20px rgba(155,89,182,0.4); text-transform: uppercase; }
        button:hover { background: linear-gradient(90deg, #3498db, #9b59b6); transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 25px rgba(52,152,219,0.6); }

        #gameWrapper { display: none; position: relative; width: 100vw; height: 100vh; }
        
        #scoreboard {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(6, 2, 15, 0.9); padding: 12px 35px; border-radius: 50px;
            color: #fff; font-weight: bold; font-size: 16px; display: flex; gap: 25px;
            border: 2px solid #9b59b6; pointer-events: none; z-index: 4; box-shadow: 0 0 20px rgba(155,89,182,0.4);
            align-items: center;
        }
        
        #healthUI {
            position: absolute; top: 20px; left: 20px; background: rgba(6, 2, 15, 0.9);
            padding: 12px 20px; border-radius: 16px; border: 1px solid rgba(52, 152, 219, 0.4);
            color: #fff; font-weight: bold; font-size: 13px; z-index: 4; width: 160px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .hp-bar-container { width: 100%; background: #111; height: 12px; border-radius: 6px; margin-top: 6px; overflow: hidden; border: 1px solid #333; }
        #hpBarFill { width: 100%; background: #3498db; height: 100%; transition: width 0.2s ease-out; box-shadow: 0 0 10px #3498db; }

        #logBox { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.8); color: #3498db; padding: 10px; border-radius: 8px; font-size: 11px; max-width: 190px; pointer-events: none; direction: rtl; z-index: 4; border-right: 4px solid #9b59b6; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        
        #chatContainer {
            position: absolute; bottom: 140px; left: 20px; width: 230px;
            background: rgba(6, 2, 15, 0.75); border-radius: 12px; padding: 10px; display: flex; flex-direction: column; z-index: 4; border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(5px);
        }
        #chatArea { height: 85px; overflow-y: auto; color: #fff; font-size: 11px; margin-bottom: 5px; text-align: right; direction: rtl; }
        #chatInput { padding: 8px; margin: 0; font-size: 11px; width: 100%; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #444; border-radius: 6px; box-sizing: border-box; }

        .nametag { position: absolute; color: #fff; font-weight: 800; font-size: 11px; background: rgba(6, 2, 15, 0.9); padding: 4px 9px; border-radius: 6px; pointer-events: none; z-index: 3; text-align: center; transform: translate(-50%, -100%); border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 4px 10px rgba(0,0,0,0.6); }

        .touch-controls { position: absolute; bottom: 30px; left: 25px; right: 25px; display: flex; justify-content: space-between; pointer-events: none; width: calc(100% - 50px); z-index: 5; }
        .joystick-zone { width: 115px; height: 115px; background: rgba(155, 89, 182, 0.03); border: 2px dashed rgba(52, 152, 219, 0.4); border-radius: 50%; display: flex; justify-content: center; align-items: center; pointer-events: auto; backdrop-filter: blur(2px); }
        .joystick-stick { width: 48px; height: 48px; background: linear-gradient(135deg, #3498db, #9b59b6); border-radius: 50%; box-shadow: 0 0 15px rgba(52,152,219,0.6); }
        .fire-btn { width: 90px; height: 90px; background: linear-gradient(135deg, #e74c3c, #c0392b); border: 3px solid #ff7675; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: 900; font-size: 16px; letter-spacing: 1px; user-select: none; pointer-events: auto; box-shadow: 0 0 20px rgba(231,76,60,0.6); align-self: center; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div id="mainMenu">
    <div class="menu-card">
        <h1>THE WAR</h1>
        <input type="text" id="playerName" placeholder="أدخل اسم المقاتل..." maxlength="12">
        <button id="startBtn">START</button>
    </div>
</div>

<div id="gameWrapper">
    <div id="healthUI">
        <div>صحة المقاتل (HP)</div>
        <div class="hp-bar-container"><div id="hpBarFill"></div></div>
    </div>

    <div id="scoreboard">
        <span style="color: #3498db; text-shadow: 0 0 10px rgba(52,152,219,0.5);">الفريق الأزرق: <span id="blueScore">0</span></span>
        <span>🆚</span>
        <span style="color: #e74c3c; text-shadow: 0 0 10px rgba(231,76,60,0.5);"><span id="redScore">0</span> :الفريق الأحمر</span>
    </div>
    
    <div id="logBox"></div>
    <div id="labelsContainer"></div>
    
    <div id="chatContainer">
        <div id="chatArea"></div>
        <input type="text" id="chatInput" placeholder="اكتب للجروب..." maxlength="40">
    </div>
</div>

<div class="touch-controls" id="touchUI" style="display: none;">
    <div class="joystick-zone" id="joyZone">
        <div class="joystick-stick" id="joyStick"></div>
    </div>
    <div class="fire-btn" id="fireBtn">FIRE</div>
</div>

<script>
    const socket = io();
    let scene, camera, renderer;
    let playerGroups = {}; 
    let bulletMeshes = [];
    let obstacleMeshes = [];
    let myTeam = "blue";
    const movement = { up: false, down: false, left: false, right: false };
    let myPlayerPos = { x: 400, y: 300 };

    function init3D() {
        try {
            const container = document.getElementById('gameWrapper');
            scene = new THREE.Scene();
            scene.background = new THREE.Color('#030107'); 
            scene.fog = new THREE.FogExp2('#030107', 0.0025);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(400, 320, 520);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.3;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.25);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0x3498db, 0.4);
            dirLight.position.set(300, 500, 400);
            scene.add(dirLight);

            const floorGeo = new THREE.PlaneGeometry(1200, 900);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x05020c, roughness: 0.5, metalness: 0.4 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.set(400, 0, 300);
            scene.add(floor);

            const gridHelper = new THREE.GridHelper(1500, 60, 0x9b59b6, 0x140824);
            gridHelper.position.set(400, 0.6, 300);
            scene.add(gridHelper);

            window.addEventListener('resize', onWindowResize);
            animate();
        } catch (error) {}
    }

    function onWindowResize() {
        if (!camera || !renderer) return;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function createStickMan(teamColor) {
        const group = new THREE.Group();
        
        group.userData = {
            baseColor: teamColor,
            normalMaterial: new THREE.MeshStandardMaterial({ color: teamColor, roughness: 0.2, metalness: 0.5 }),
            damageMaterial: new THREE.MeshBasicMaterial({ color: 0xffffff }),
            armorMaterial: new THREE.MeshStandardMaterial({ color: 0x1b1526, roughness: 0.3, metalness: 0.7 }),
            visorMaterial: new THREE.MeshBasicMaterial({ color: teamColor === 0x3498db ? 0x00ffff : 0xff3366 })
        };

        const mat = group.userData.normalMaterial;
        const armorMat = group.userData.armorMaterial;

        const headGeo = new THREE.CylinderGeometry(5.5, 5.5, 9, 16);
        const head = new THREE.Mesh(headGeo, armorMat);
        head.position.y = 35;
        group.add(head);

        const visorGeo = new THREE.BoxGeometry(9.5, 2, 2.5);
        const visor = new THREE.Mesh(visorGeo, group.userData.visorMaterial);
        visor.position.set(0, 36, 4.2);
        group.add(visor);

        const jetpackGeo = new THREE.BoxGeometry(9, 14, 4.5);
        const jetpack = new THREE.Mesh(jetpackGeo, mat);
        jetpack.position.set(0, 23, -4.5);
        group.add(jetpack);

        const bodyGeo = new THREE.CylinderGeometry(3.5, 2.5, 17, 16);
        const body = new THREE.Mesh(bodyGeo, mat);
        body.position.y = 22;
        group.add(body);

        const armorVestGeo = new THREE.CylinderGeometry(4, 3.2, 12, 16);
        const armorVest = new THREE.Mesh(armorVestGeo, armorMat);
        armorVest.position.y = 24;
        group.add(armorVest);

        const legGeo = new THREE.CylinderGeometry(1.6, 1.2, 14, 12);
        
        const leftLeg = new THREE.Mesh(legGeo, armorMat);
        leftLeg.geometry.translate(0, -7, 0); 
        leftLeg.position.set(-3.2, 14, 0);
        group.add(leftLeg);
        group.userData.leftLeg = leftLeg;

        const rightLeg = new THREE.Mesh(legGeo, armorMat);
        rightLeg.geometry.translate(0, -7, 0); 
        rightLeg.position.set(3.2, 14, 0);
        group.add(rightLeg);
        group.userData.rightLeg = rightLeg;

        const armGeo = new THREE.CylinderGeometry(1.2, 1.0, 12, 12);
        const leftArm = new THREE.Mesh(armGeo, mat);
        leftArm.position.set(-6, 24, 2);
        leftArm.rotation.x = Math.PI / 3;
        group.add(leftArm);

        const gunGroup = new THREE.Group();
        const barrel1 = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.9, 24, 12), armorMat);
        barrel1.position.y = 0.8;
        barrel1.rotation.z = Math.PI / 2;
        gunGroup.add(barrel1);

        const barrel2 = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.9, 24, 12), armorMat);
        barrel2.position.y = -0.8;
        barrel2.rotation.z = Math.PI / 2;
        gunGroup.add(barrel2);

        gunGroup.position.set(11, 23, 5);
        group.add(gunGroup);

        return group;
    }

    document.getElementById('startBtn').addEventListener('click', function() {
        const nameInput = document.getElementById('playerName');
        const name = nameInput.value.trim() || "مقاتل_" + Math.floor(Math.random()*100);
        
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('gameWrapper').style.display = 'block';
        
        if(window.innerWidth < 1024 || 'ontouchstart' in window) {
            document.getElementById('touchUI').style.display = 'flex';
        }

        init3D();
        socket.emit('initGame', { name: name });
    });

    socket.on('teamAssignment', (team) => { myTeam = team; });

    socket.on('state', (state) => {
        if (!scene) return;

        if(state.score) {
            document.getElementById('blueScore').innerText = state.score.blue;
            document.getElementById('redScore').innerText = state.score.red;
        }

        if (obstacleMeshes.length === 0 && state.obstacles) {
            state.obstacles.forEach((obs, index) => {
                const obsGroup = new THREE.Group();
                const geo = new THREE.BoxGeometry(obs.w, 38, obs.h);
                const mat = new THREE.MeshStandardMaterial({ color: 0x140d24, roughness: 0.4, metalness: 0.8 }); 
                const box = new THREE.Mesh(geo, mat);
                box.position.y = 19;
                obsGroup.add(box);

                const neonGeo = new THREE.BoxGeometry(obs.w + 1.5, 2.5, obs.h + 1.5);
                const lightColor = index % 2 === 0 ? 0x3498db : 0x9b59b6; 
                const neonMat = new THREE.MeshBasicMaterial({ color: lightColor });
                const neon = new THREE.Mesh(neonGeo, neonMat);
                neon.position.y = 38;
                obsGroup.add(neon);

                const pointLight = new THREE.PointLight(lightColor, 2.5, 220);
                pointLight.position.set(0, 45, 0);
                obsGroup.add(pointLight);

                obsGroup.position.set(obs.x, 0, obs.y);
                scene.add(obsGroup);
                obstacleMeshes.push(obsGroup);
            });
        }

        const labelsContainer = document.getElementById('labelsContainer');
        
        for (let id in playerGroups) {
            if (!state.players[id] || state.players[id].hp <= 0) {
                scene.remove(playerGroups[id]);
                delete playerGroups[id];
                const existingLabel = document.getElementById('label_' + id);
                if (existingLabel) existingLabel.remove();
            }
        }

        for (let id in state.players) {
            let p = state.players[id];
            if (p.hp <= 0) continue;

            if (id === socket.id) {
                myPlayerPos.x = p.x;
                myPlayerPos.y = p.y;
                const fill = document.getElementById('hpBarFill');
                if(fill) fill.style.width = p.hp + '%';
            }

            if (!playerGroups[id]) {
                if (!p.name) continue;
                const tColor = p.team === "blue" ? 0x3498db : 0xe74c3c;
                playerGroups[id] = createStickMan(tColor);
                scene.add(playerGroups[id]);

                const label = document.createElement('div');
                label.id = 'label_' + id;
                label.className = 'nametag';
                label.innerText = p.name;
                if(labelsContainer) labelsContainer.appendChild(label
