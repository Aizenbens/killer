<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>the war of زنادقة </title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        #mainMenu {
            position: absolute; width: 100%; height: 100%;
            background: url('wallpaper.jpg') no-repeat center center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        .menu-card {
            background: rgba(0, 0, 0, 0.75); padding: 30px; border-radius: 15px;
            box-shadow: 0 0 25px rgba(255,255,255,0.1); width: 320px; text-align: center; border: 1px solid rgba(255,255,255,0.2);
        }
        h1 { margin-top: 0; font-size: 28px; letter-spacing: 2px; color: #f3f3f3; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box; }
        input, select { background: rgba(255,255,255,0.9); color: #222; font-weight: bold; }
        button { background: #fff; color: #000; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #ccc; transform: scale(1.02); }

        #gameWrapper { display: none; position: relative; width: 100vw; height: 100vh; }
        
        #scoreboard {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); padding: 10px 25px; border-radius: 30px;
            color: #fff; font-weight: bold; font-size: 18px; display: flex; gap: 20px;
            border: 2px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.5); pointer-events: none; z-index: 4;
        }
        .blue-team-score { color: #3498db; }
        .red-team-score { color: #e74c3c; }

        #logBox { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: #fff; padding: 10px; border-radius: 5px; font-size: 13px; max-width: 220px; pointer-events: none; direction: rtl; z-index: 4; }
        
        #chatContainer {
            position: absolute; bottom: 15px; left: 15px; width: 260px;
            background: rgba(0,0,0,0.6); border-radius: 8px; padding: 10px; display: flex; flex-direction: column; z-index: 4;
        }
        #chatArea { height: 120px; overflow-y: auto; color: #fff; font-size: 13px; margin-bottom: 5px; text-align: right; direction: rtl; }
        #chatInput { padding: 6px; margin: 0; font-size: 13px; width: 100%; background: rgba(255,255,255,0.2); color: #fff; border: 1px solid #777; }

        .touch-controls { position: absolute; bottom: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; pointer-events: none; width: calc(100% - 40px); z-index: 5; }
        .joystick, .fire-btn { width: 80px; height: 80px; background: rgba(255, 255, 255, 0.2); border: 3px solid #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; user-select: none; pointer-events: auto; }
        .fire-btn { background: rgba(255, 0, 0, 0.4); border-color: #ff4444; }
        @media (min-width: 768px) { .touch-controls { display: none; } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<audio id="starMusic" src="mario_star.mp3" loop></audio>
<audio id="deathSound" src="mario_death.mp3"></audio>

<div id="mainMenu">
    <div class="menu-card">
        <h1>المواجهة الكبرى 3D</h1>
        <input type="text" id="playerName" placeholder="أدخل اسم البطل..." maxlength="12">
        <select id="gameMode">
            <option value="single">لعب فردي (ضد 3 بوتات)</option>
            <option value="multi">لعب جماعي (أونلاين)</option>
        </select>
        <button onclick="startGame()">ابدأ المعركة 🔥</button>
    </div>
</div>

<div id="gameWrapper">
    <div id="scoreboard">
        <span class="blue-team-score">الفريق الأزرق: <span id="blueScore">0</span></span>
        <span>🆚</span>
        <span class="red-team-score"><span id="redScore">0</span> :الفريق الأحمر</span>
    </div>
    <div id="logBox"></div>
    <div id="chatContainer">
        <div id="chatArea"></div>
        <input type="text" id="chatInput" placeholder="اكتب رسالة واضغط Enter..." maxlength="40">
    </div>
</div>

<div class="touch-controls" id="touchUI" style="display: none;">
    <div class="joystick" id="movePad">حرك</div>
    <div class="fire-btn" id="fireBtn">إطلاق</div>
</div>

<script>
    const socket = io();
    let scene, camera, renderer;
    let playerMeshes = {};
    let bulletMeshes = [];
    let myId = null;
    let myTeam = "blue";
    const movement = { up: false, down: false, left: false, right: false };

    // إعداد بيئة 3D الأساسية عند فتح اللعبة
    function init3D() {
        const container = document.getElementById('gameWrapper');
        scene = new THREE.Scene();
        scene.background = new THREE.Color('#050505');

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        // ضبط زاوية الكاميرا العلوية المائلة لتعطي رؤية استراتيجية ممتازة للاعب
        camera.position.set(400, 500, 750);
        camera.lookAt(400, 0, 300);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // إضافة إضاءة المحيط والضوء الساطع للمجسمات ثلاثية الأبعاد
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(400, 600, 400);
        scene.add(dirLight);

        // إنشاء أرضية المعركة ثلاثية الأبعاد
        const floorGeo = new THREE.PlaneGeometry(800, 600);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x161616, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.set(400, 0, 300);
        scene.add(floor);

        window.addEventListener('resize', onWindowResize);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function startGame() {
        const name = document.getElementById('playerName').value.trim() || "بطل_" + Math.floor(Math.random()*100);
        const mode = document.getElementById('gameMode').value;

        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('gameWrapper').style.display = 'block';
        if(window.innerWidth < 768) document.getElementById('touchUI').style.display = 'flex';

        init3D();

        const starMusic = document.getElementById('starMusic');
        starMusic.volume = 0.25;
        starMusic.play().catch(e => console.log(e));

        socket.emit('initGame', { name, mode, team: myTeam });
    }

    socket.on('connect', () => { myId = socket.id; });
    socket.on('teamAssignment', (team) => { myTeam = team; });

    socket.on('playerDied', () => {
        const deathSound = document.getElementById('deathSound');
        deathSound.volume = 0.6;
        deathSound.play();
    });

    // تحديث كافة الكائنات والمجسمات القادمة من السيرفر في كل إطار 3D
    socket.on('state', (state) => {
        if (!scene) return;

        if(state.score) {
            document.getElementById('blueScore').innerText = state.score.blue;
            document.getElementById('redScore').innerText = state.score.red;
        }

        // تحديث وإدارة مجسمات اللاعبين والبوتات
        for (let id in playerMeshes) {
            if (!state.players[id] || state.players[id].hp <= 0) {
                scene.remove(playerMeshes[id]);
                delete playerMeshes[id];
            }
        }

        for (let id in state.players) {
            let p = state.players[id];
            if (p.hp <= 0) continue;

            if (!playerMeshes[id]) {
                // إنشاء مجسم كروي ثلاثي الأبعاد لكل مقاتل
                const geometry = new THREE.SphereGeometry(15, 32, 32);
                const color = p.team === "blue" ? 0x3498db : 0xe74c3c;
                const material = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.2 });
                const mesh = new THREE.Mesh(geometry, material);
                scene.add(mesh);
                playerMeshes[id] = mesh;
            }
            // ربط الإحداثيات الثنائية بمحاور الـ 3D (X و Z يمثلان الأرض، و Y الارتفاع)
            playerMeshes[id].position.set(p.x, 15, p.y);
            
            // جعل الكاميرا تتبع مكان لاعبك الحقيقي بسلاسة من الأعلى
            if (id === socket.id) {
                camera.position.set(p.x, 450, p.y + 400);
                camera.lookAt(p.x, 0, p.y);
            }
        }

        // تحديث وإدارة مجسمات الرصاص المتوهج
        bulletMeshes.forEach(mesh => scene.remove(mesh));
        bulletMeshes = [];

        state.bullets.forEach(b => {
            const geometry = new THREE.SphereGeometry(5, 16, 16);
            const color = b.team === "blue" ? 0x85c1e9 : 0xf1948a;
            const material = new THREE.MeshBasicMaterial({ color: color });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(b.x, 15, b.y);
            scene.add(mesh);
            bulletMeshes.push(mesh);
        });

        // تحديث لوحة السجلات والرسائل
        const logBox = document.getElementById('logBox');
        logBox.innerHTML = '';
        state.logs.forEach(log => {
            const div = document.createElement('div');
            div.innerText = log.text;
            logBox.appendChild(div);
        });
    });

    // إدارة نظام الدردشة والتحكم
    const chatInput = document.getElementById('chatInput');
    const chatArea = document.getElementById('chatArea');

    chatInput.addEventListener('keydown', (e) => {
        if(e.key === 'Enter' && chatInput.value.trim() !== "") {
            socket.emit('chatMessage', chatInput.value.trim());
            chatInput.value = '';
        }
    });

    socket.on('chatUpdate', (data) => {
        const div = document.createElement('div');
        let tColor = data.team === "blue" ? "#3498db" : "#e74c3c";
        div.innerHTML = `<strong style="color: ${tColor}">${data.name}:</strong> ${data.text}`;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    });

    document.addEventListener('keydown', (e) => {
        if(document.activeElement === chatInput) return;
        if (['w', 'ArrowUp'].includes(e.key)) movement.up = true;
        if (['s', 'ArrowDown'].includes(e.key)) movement.down = true;
        if (['a', 'ArrowLeft'].includes(e.key)) movement.left = true;
        if (['d', 'ArrowRight'].includes(e.key)) movement.right = true;
        socket.emit('movement', movement);
    });

    document.addEventListener('keyup', (e) => {
        if (['w', 'ArrowUp'].includes(e.key)) movement.up = false;
        if (['s', 'ArrowDown'].includes(e.key)) movement.down = false;
        if (['a', 'ArrowLeft'].includes(e.key)) movement.left = false;
        if (['d', 'ArrowRight'].includes(e.key)) movement.right = false;
        socket.emit('movement', movement);
    });

    // آلية التصويب ثلاثي الأبعاد بالنقر على الأرضية من خلال الماوس
    window.addEventListener('click', (e) => {
        if (!scene || e.target.tagName === 'INPUT') return;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        
        const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
        const targetPoint = new THREE.Vector3();
        if (raycaster.ray.intersectPlane(plane, targetPoint)) {
            socket.emit('shoot', { targetX: targetPoint.x, targetY: targetPoint.z });
        }
    });

    // حلقة الأنيميشن المستمرة لمحرك الرندرة ثلاثي الأبعاد
    function animate() {
        requestAnimationFrame(animate);
        if (renderer && scene && camera) {
            renderer.render(scene, camera);
        }
    }
    animate();
</script>
</body>
</html>
