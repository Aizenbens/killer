<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE WAR</title>
    <style>
        body { margin: 0; background: #020705; overflow: hidden; touch-action: none; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; user-select: none; }
        
        /* تصميم واجهة بروفايل مذهلة ونيون */
        #mainMenu {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(135deg, #051c12 0%, #020906 50%, #0c2b1d 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; color: #fff;
        }
        .menu-card {
            background: rgba(4, 15, 10, 0.85); padding: 45px 35px; border-radius: 24px;
            box-shadow: 0 0 40px rgba(46, 204, 113, 0.25), inset 0 0 20px rgba(46, 204, 113, 0.1); 
            width: 350px; text-align: center; border: 2px solid #2ecc71;
            backdrop-filter: blur(10px);
        }
        h1 { margin-top: 0; font-size: 42px; color: #2ecc71; letter-spacing: 3px; text-shadow: 0 0 15px rgba(46,204,113,0.6), 0 0 30px rgba(46,204,113,0.2); font-weight: 900; }
        
        input, button { width: 100%; padding: 15px; margin: 15px 0; border-radius: 12px; border: none; font-size: 16px; box-sizing: border-box; transition: all 0.3s ease; }
        input { background: rgba(5, 25, 17, 0.8); color: #fff; font-weight: bold; text-align: center; border: 2px solid #1b4d3e; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
        input:focus { border-color: #2ecc71; outline: none; box-shadow: 0 0 12px rgba(46,204,113,0.4); background: rgba(10, 35, 25, 0.9); }
        
        button { background: linear-gradient(90deg, #2ecc71, #27ae60); color: #020705; font-weight: 800; cursor: pointer; letter-spacing: 2px; box-shadow: 0 6px 20px rgba(46,204,113,0.4); text-transform: uppercase; }
        button:hover { background: linear-gradient(90deg, #27ae60, #2ecc71); transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 25px rgba(46,204,113,0.6); color: #fff; }
        button:active { transform: translateY(1px); }

        #gameWrapper { display: none; position: relative; width: 100vw; height: 100vh; }
        
        /* تجميل النتيجة والـ UI داخل اللعبة */
        #scoreboard {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(2, 7, 5, 0.9); padding: 12px 35px; border-radius: 50px;
            color: #fff; font-weight: bold; font-size: 16px; display: flex; gap: 25px;
            border: 2px solid #2ecc71; pointer-events: none; z-index: 4; box-shadow: 0 0 20px rgba(46,204,113,0.3);
            align-items: center;
        }
        
        #healthUI {
            position: absolute; top: 20px; left: 20px; background: rgba(2, 7, 5, 0.9);
            padding: 12px 20px; border-radius: 16px; border: 1px solid rgba(46, 204, 113, 0.4);
            color: #fff; font-weight: bold; font-size: 13px; z-index: 4; width: 160px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .hp-bar-container { width: 100%; background: #111; height: 12px; border-radius: 6px; margin-top: 6px; overflow: hidden; border: 1px solid #333; }
        #hpBarFill { width: 100%; background: #2ecc71; height: 100%; transition: width 0.2s ease-out; box-shadow: 0 0 10px #2ecc71; }

        #logBox { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.8); color: #2ecc71; padding: 10px; border-radius: 8px; font-size: 11px; max-width: 190px; pointer-events: none; direction: rtl; z-index: 4; border-right: 4px solid #2ecc71; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        
        #chatContainer {
            position: absolute; bottom: 140px; left: 20px; width: 230px;
            background: rgba(2, 7, 5, 0.75); border-radius: 12px; padding: 10px; display: flex; flex-direction: column; z-index: 4; border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(5px);
        }
        #chatArea { height: 85px; overflow-y: auto; color: #fff; font-size: 11px; margin-bottom: 5px; text-align: right; direction: rtl; }
        #chatInput { padding: 8px; margin: 0; font-size: 11px; width: 100%; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #444; border-radius: 6px; box-sizing: border-box; }

        .nametag { position: absolute; color: #fff; font-weight: 800; font-size: 11px; background: rgba(2, 7, 5, 0.9); padding: 4px 9px; border-radius: 6px; pointer-events: none; z-index: 3; text-align: center; transform: translate(-50%, -100%); border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 4px 10px rgba(0,0,0,0.6); letter-spacing: 0.5px; }

        /* أزرار الهواتف المتطورة */
        .touch-controls { position: absolute; bottom: 30px; left: 25px; right: 25px; display: flex; justify-content: space-between; pointer-events: none; width: calc(100% - 50px); z-index: 5; }
        .joystick-zone { width: 115px; height: 115px; background: rgba(46, 204, 113, 0.03); border: 2px dashed rgba(46, 204, 113, 0.35); border-radius: 50%; display: flex; justify-content: center; align-items: center; pointer-events: auto; backdrop-filter: blur(2px); }
        .joystick-stick { width: 48px; height: 48px; background: linear-gradient(135deg, #2ecc71, #27ae60); border-radius: 50%; box-shadow: 0 0 15px rgba(46,204,113,0.6); }
        .fire-btn { width: 90px; height: 90px; background: linear-gradient(135deg, #e74c3c, #c0392b); border: 3px solid #ff7675; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: 900; font-size: 16px; letter-spacing: 1px; user-select: none; pointer-events: auto; box-shadow: 0 0 20px rgba(231,76,60,0.6); align-self: center; }
        .fire-btn:active { transform: scale(0.95); background: #c0392b; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div id="mainMenu">
    <div class="menu-card">
        <h1>THE WAR</h1>
        <input type="text" id="playerName" placeholder="أدخل اسم المقاتل..." maxlength="12">
        <button id="startBtn">START</button>
    </div>
</div>

<div id="gameWrapper">
    <div id="healthUI">
        <div>صحة المقاتل (HP)</div>
        <div class="hp-bar-container"><div id="hpBarFill"></div></div>
    </div>

    <div id="scoreboard">
        <span style="color: #3498db; text-shadow: 0 0 10px rgba(52,152,219,0.5);">الفريق الأزرق: <span id="blueScore">0</span></span>
        <span>🆚</span>
        <span style="color: #e74c3c; text-shadow: 0 0 10px rgba(231,76,60,0.5);"><span id="redScore">0</span> :الفريق الأحمر</span>
    </div>
    
    <div id="logBox"></div>
    <div id="labelsContainer"></div>
    
    <div id="chatContainer">
        <div id="chatArea"></div>
        <input type="text" id="chatInput" placeholder="اكتب للجروب..." maxlength="40">
    </div>
</div>

<div class="touch-controls" id="touchUI" style="display: none;">
    <div class="joystick-zone" id="joyZone">
        <div class="joystick-stick" id="joyStick"></div>
    </div>
    <div class="fire-btn" id="fireBtn">FIRE</div>
</div>

<script>
    const socket = io();
    let scene, camera, renderer;
    let playerGroups = {}; 
    let bulletMeshes = [];
    let obstacleMeshes = [];
    let myTeam = "blue";
    const movement = { up: false, down: false, left: false, right: false };
    let myPlayerPos = { x: 400, y: 300 };

    function init3D() {
        try {
            const container = document.getElementById('gameWrapper');
            scene = new THREE.Scene();
            scene.background = new THREE.Color('#010806'); 
            scene.fog = new THREE.FogExp2('#010806', 0.0018);

            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 3000);
            camera.position.set(400, 530, 760);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.65);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
            dirLight.position.set(300, 650, 450);
            scene.add(dirLight);

            // أرضية المعركة الإلكترونية المتوهجة والفاخرة
            const floorGeo = new THREE.PlaneGeometry(1200, 900);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x05120e, roughness: 0.6, metalness: 0.3 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.set(400, 0, 300);
            scene.add(floor);

            const gridHelper = new THREE.GridHelper(1500, 50, 0x2ecc71, 0x072418);
            gridHelper.position.set(400, 0.6, 300);
            scene.add(gridHelper);

            window.addEventListener('resize', onWindowResize);
            animate();
        } catch (error) {}
    }

    function onWindowResize() {
        if (!camera || !renderer) return;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // تصميم الخوذة، الأسلحة، والحقيبة النفاثة (Jetpack) الفاخرة للشخصيات
    function createStickMan(teamColor) {
        const group = new THREE.Group();
        
        group.userData = {
            baseColor: teamColor,
            normalMaterial: new THREE.MeshStandardMaterial({ color: teamColor, roughness: 0.25, metalness: 0.4 }),
            damageMaterial: new THREE.MeshBasicMaterial({ color: 0xffffff }),
            armorMaterial: new THREE.MeshStandardMaterial({ color: 0x1c2421, roughness: 0.4, metalness: 0.8 }),
            visorMaterial: new THREE.MeshBasicMaterial({ color: teamColor === 0x3498db ? 0x00ffff : 0xff2222 })
        };

        const mat = group.userData.normalMaterial;
        const armorMat = group.userData.armorMaterial;

        // رأس تكتيكي مع خوذة مستقبلية ونظارة مضيئة
        const headGeo = new THREE.BoxGeometry(10, 10, 10);
        const head = new THREE.Mesh(headGeo, mat);
        head.position.y = 35;
        group.add(head);

        const visorGeo = new THREE.BoxGeometry(10.6, 2.5, 3);
        const visor = new THREE.Mesh(visorGeo, group.userData.visorMaterial);
        visor.position.set(0, 36, 4.5);
        group.add(visor);

        // حقيبة نفاثة Jetpack على الظهر لإعطاء مظهر خارق
        const jetpackGeo = new THREE.BoxGeometry(8, 12, 5);
        const jetpack = new THREE.Mesh(jetpackGeo, armorMat);
        jetpack.position.set(0, 24, -4.5);
        group.add(jetpack);

        // الجسد الرئيسي والدرع التكتيكي المطور
        const bodyGeo = new THREE.CylinderGeometry(2.5, 2.5, 16, 14);
        const body = new THREE.Mesh(bodyGeo, mat);
        body.position.y = 22;
        group.add(body);

        const armorVestGeo = new THREE.CylinderGeometry(3.2, 3.2, 11, 14);
        const armorVest = new THREE.Mesh(armorVestGeo, armorMat);
        armorVest.position.y = 24;
        group.add(armorVest);

        // الأرجل القوية للمقاتل
        const legGeo = new THREE.CylinderGeometry(1.4, 1.0, 14, 12);
        
        const leftLeg = new THREE.Mesh(legGeo, mat);
        leftLeg.geometry.translate(0, -7, 0); 
        leftLeg.position.set(-3.5, 14, 0);
        group.add(leftLeg);
        group.userData.leftLeg = leftLeg;

        const rightLeg = new THREE.Mesh(legGeo, mat);
        rightLeg.geometry.translate(0, -7, 0); 
        rightLeg.position.set(3.5, 14, 0);
        group.add(rightLeg);
        group.userData.rightLeg = rightLeg;

        // اليدين وبندقية ليزر هجومية مزدوجة الفوهة
        const armGeo = new THREE.CylinderGeometry(1.0, 0.9, 12, 12);
        const leftArm = new THREE.Mesh(armGeo, mat);
        leftArm.position.set(-6, 24, 2);
        leftArm.rotation.x = Math.PI / 3;
        group.add(leftArm);

        // تصميم البندقية المتطورة
        const gunGroup = new THREE.Group();
        const barrel1 = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 22, 12), armorMat);
        barrel1.position.y = 0.8;
        barrel1.rotation.z = Math.PI / 2;
        gunGroup.add(barrel1);

        const barrel2 = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 22, 12), armorMat);
        barrel2.position.y = -0.8;
        barrel2.rotation.z = Math.PI / 2;
        gunGroup.add(barrel2);

        const scope = new THREE.Mesh(new THREE.BoxGeometry(5, 1.5, 1.5), armorMat);
        scope.position.set(-2, 2.2, 0);
        gunGroup.add(scope);

        gunGroup.position.set(11, 23, 5);
        group.add(gunGroup);

        return group;
    }

    // تصليح كود زر البدء لمنع التعليق والانهيار
    document.getElementById('startBtn').addEventListener('click', function() {
        const nameInput = document.getElementById('playerName');
        const name = nameInput.value.trim() || "مقاتل_" + Math.floor(Math.random()*100);
        
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('gameWrapper').style.display = 'block';
        
        if(window.innerWidth < 1024 || 'ontouchstart' in window) {
            document.getElementById('touchUI').style.display = 'flex';
        }

        init3D();
        socket.emit('initGame', { name: name });
    });

    socket.on('teamAssignment', (team) => { myTeam = team; });

    socket.on('state', (state) => {
        if (!scene) return;

        if(state.score) {
            document.getElementById('blueScore').innerText = state.score.blue;
            document.getElementById('redScore').innerText = state.score.red;
        }

        // بناء حواجز دفاعية ذات إضاءة نيون فاخرة
        if (obstacleMeshes.length === 0 && state.obstacles) {
            state.obstacles.forEach(obs => {
                const obsGroup = new THREE.Group();
                
                const geo = new THREE.BoxGeometry(obs.w, 38, obs.h);
                const mat = new THREE.MeshStandardMaterial({ color: 0x11221a, roughness: 0.4, metalness: 0.7 }); 
                const box = new THREE.Mesh(geo, mat);
                box.position.y = 19;
                obsGroup.add(box);

                const neonGeo = new THREE.BoxGeometry(obs.w + 1.5, 2.5, obs.h + 1.5);
                const neonMat = new THREE.MeshBasicMaterial({ color: 0x2ecc71 });
                const neon = new THREE.Mesh(neonGeo, neonMat);
                neon.position.y = 38;
                obsGroup.add(neon);

                obsGroup.position.set(obs.x, 0, obs.y);
                scene.add(obsGroup);
                obstacleMeshes.push(obsGroup);
            });
        }

        const labelsContainer = document.getElementById('labelsContainer');
        
        for (let id in playerGroups) {
            if (!state.players[id] || state.players[id].hp <= 0) {
                scene.remove(playerGroups[id]);
                delete playerGroups[id];
                const existingLabel = document.getElementById('label_' + id);
                if (existingLabel) existingLabel.remove();
            }
        }

        for (let id in state.players) {
            let p = state.players[id];
            if (p.hp <= 0) continue;

            if (id === socket.id) {
                myPlayerPos.x = p.x;
                myPlayerPos.y = p.y;
                const fill = document.getElementById('hpBarFill');
                if(fill) {
                    fill.style.width = p.hp + '%';
                    if (p.hp < 40) fill.style.background = '#e74c3c';
                    else fill.style.background = '#2ecc71';
                }
            }

            if (!playerGroups[id]) {
                if (!p.name) continue;

                const tColor = p.team === "blue" ? 0x3498db : 0xe74c3c;
                playerGroups[id] = createStickMan(tColor);
                scene.add(playerGroups[id]);

                const label = document.createElement('div');
                label.id = 'label_' + id;
                label.className = 'nametag';
                label.innerText = p.name;
                if(labelsContainer) labelsContainer.appendChild(label);
            } else {
                const label = document.getElementById('label_' + id);
                if (label && label.innerText !== p.name && p.name) {
                    label.innerText = p.name;
                }
            }

            let pg = playerGroups[id];
            pg.position.set(p.x, 0, p.y);
            pg.rotation.y = -p.angle;

            if (p.damaged) {
                pg.traverse((child) => {
                    if (child instanceof THREE.Mesh && child.material !== pg.userData.damageMaterial) {
                        child.material = pg.userData.damageMaterial;
                    }
                });
            } else {
                pg.traverse((child) => {
                    if (child instanceof THREE.Mesh && child.material !== pg.userData.normalMaterial && child.material !== pg.userData.armorMaterial && child.material !== pg.userData.visorMaterial) {
                        child.material = pg.userData.normalMaterial;
                    }
                });
            }

            if (p.isMoving) {
                let time = Date.now() * 0.015;
                pg.userData.leftLeg.rotation.x = Math.sin(time) * 0.7;
                pg.userData.rightLeg.rotation.x = -Math.sin(time) * 0.7;
            } else {
                pg.userData.leftLeg.rotation.x = 0;
                pg.userData.rightLeg.rotation.x = 0;
            }

            const label = document.getElementById('label_' + id);
            if (label && camera) {
                const wp = new THREE.Vector3(p.x, 48, p.y);
                wp.project(camera);
                const screenX = (wp.x * .5 + .5) * window.innerWidth;
                const screenY = (-(wp.y * .5) + .5) * window.innerHeight;
                label.style.left = screenX + 'px';
                label.style.top = screenY + 'px';
            }

            if (id === socket.id && camera) {
                camera.position.set(p.x, 530, p.y + 390);
                camera.lookAt(p.x, 0, p.y);
            }
        }

        bulletMeshes.forEach(mesh => scene.remove(mesh));
        bulletMeshes = [];

        // كرات طاقة الليزر المضيئة المتوهجة
        state.bullets.forEach(b => {
            const geometry = new THREE.SphereGeometry(3.8, 16, 16);
            const color = b.team === "blue" ? 0x00ffff : 0xff3838;
            const material = new THREE.MeshBasicMaterial({ color: color });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(b.x, 23, b.y); 
            scene.add(mesh);
            bulletMeshes.push(mesh);
        });

        const logBox = document.getElementById('logBox');
        if(logBox) {
            logBox.innerHTML = '';
            state.logs.forEach(log => {
                const div = document.createElement('div');
                div.innerText = log.text;
                logBox.appendChild(div);
            });
        }
    });

    const chatInput = document.getElementById('chatInput');
    const chatArea = document.getElementById('chatArea');

    if(chatInput) {
        chatInput.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && chatInput.value.trim() !== "") {
                socket.emit('chatMessage', chatInput.value.trim());
                chatInput.value = '';
            }
        });
    }

    socket.on('chatUpdate', (data) => {
        if(!chatArea) return;
        const div = document.createElement('div');
        let tColor = data.team === "blue" ? "#3498db" : "#e74c3c";
        div.innerHTML = `<strong style="color: ${tColor}">${data.name}:</strong> ${data.text}`;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    });

    const joyZone = document.getElementById('joyZone');
    const joyStick = document.getElementById('joyStick');
    let joyActive = false;

    joyZone.addEventListener('touchstart', (e) => { joyActive = true; }, false);
    window.addEventListener('touchmove', handleJoyMove, { passive: false });
    window.addEventListener('touchend', (e) => {
        joyActive = false;
        joyStick.style.transform = 'translate(0px, 0px)';
        movement.up = false; movement.down = false; movement.left = false; movement.right = false;
        socket.emit('movement', movement);
    }, false);

    function handleJoyMove(e) {
        if (!joyActive) return;
        e.preventDefault();
        let touch = e.touches[0];
        let rect = joyZone.getBoundingClientRect();
        let centerX = rect.left + rect.width / 2;
        let centerY = rect.top + rect.height / 2;
        let deltaX = touch.clientX - centerX;
        let deltaY = touch.clientY - centerY;
        let distance = Math.min(Math.sqrt(deltaX*deltaX + deltaY*deltaY), 35);
        let angle = Math.atan2(deltaY, deltaX);

        joyStick.style.transform = `translate(${Math.cos(angle)*distance}px, ${Math.sin(angle)*distance}px)`;

        movement.up = deltaY < -12;
        movement.down = deltaY > 12;
        movement.left = deltaX < -12;
        movement.right = deltaX > 12;
        socket.emit('movement', movement);
    }

    // تصليح أمان دالة الإطلاق باللمس لمنع توقف اللعبة
    document.getElementById('fireBtn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (!socket.id || !playerGroups[socket.id]) return; 
        let angle = playerGroups[socket.id].rotation.y;
        let targetX = myPlayerPos.x + Math.sin(angle) * 120;
        let targetY = myPlayerPos.y - Math.cos(angle) * 120;
        socket.emit('shoot', { targetX: targetX, targetY: targetY });
    });

    document.addEventListener('keydown', (e) => {
        if (['w', 'ArrowUp', 'KeyW'].includes(e.code) || ['w', 'ArrowUp'].includes(e.key)) movement.up = true;
        if (['s', 'ArrowDown', 'KeyS'].includes(e.code) || ['s', 'ArrowDown'].includes(e.key)) movement.down = true;
        if (['a', 'ArrowLeft', 'KeyA'].includes(e.code) || ['a', 'ArrowLeft'].includes(e.key)) movement.left = true;
        if (['d', 'ArrowRight', 'KeyD'].includes(e.code) || ['d', 'ArrowRight'].includes(e.key)) movement.right = true;
        socket.emit('movement', movement);
    });

    document.addEventListener('keyup', (e) => {
        if (['w', 'ArrowUp', 'KeyW'].includes(e.code) || ['w', 'ArrowUp'].includes(e.key)) movement.up = false;
        if (['s', 'ArrowDown', 'KeyS'].includes(e.code) || ['s', 'ArrowDown'].includes(e.key)) movement.down = false;
        if (['a', 'ArrowLeft', 'KeyA'].includes(e.code) || ['a', 'ArrowLeft'].includes(e.key)) movement.left = false;
        if (['d', 'ArrowRight', 'KeyD'].includes(e.code) || ['d', 'ArrowRight'].includes(e.key)) movement.right = false;
        socket.emit('movement', movement);
    });

    window.addEventListener('click', (e) => {
        if (!scene || !camera || e.target.tagName === 'INPUT' || e.target.closest('.touch-controls')) return;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        
        const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
        const targetPoint = new THREE.Vector3();
        if (raycaster.ray.intersectPlane(plane, targetPoint)) {
            socket.emit('shoot', { targetX: targetPoint.x, targetY: targetPoint.z });
        }
