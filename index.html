<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE WAR - Online Multiplayer FPS</title>
    <style>
        body { margin: 0; background: #05020c; overflow: hidden; touch-action: none; font-family: 'Segoe UI', Roboto, sans-serif; user-select: none; }
        
        #mainMenu {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1b0933 0%, #06020f 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; color: #fff;
        }
        .menu-card {
            background: rgba(12, 5, 26, 0.85); padding: 40px 30px; border-radius: 24px;
            box-shadow: 0 0 40px rgba(155, 89, 182, 0.3); width: 340px; text-align: center; border: 2px solid #8e44ad;
            backdrop-filter: blur(12px);
        }
        h1 { margin: 0 0 20px 0; font-size: 42px; color: #3498db; font-weight: 900; }
        input, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: none; font-size: 15px; box-sizing: border-box; }
        input { background: rgba(15, 8, 30, 0.8); color: #fff; text-align: center; border: 2px solid #2c1a4d; }
        button { background: linear-gradient(90deg, #9b59b6, #3498db); color: #fff; font-weight: 800; cursor: pointer; }

        #gameWrapper { display: none; position: relative; width: 100vw; height: 100vh; }
        
        /* إشعارات الانضمام والمغادرة */
        #notificationContainer {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 8; display: flex; flex-direction: column; gap: 8px; pointer-events: none;
        }
        .notif-toast {
            background: rgba(15, 8, 30, 0.9); border: 1px solid #00ffff; color: #fff;
            padding: 8px 18px; border-radius: 30px; font-size: 13px; font-weight: bold;
            box-shadow: 0 0 15px rgba(0,255,255,0.3); animation: fadeInOut 4s forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(-10px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }

        #healthUI {
            position: absolute; top: 20px; left: 20px; background: rgba(6, 2, 15, 0.9);
            padding: 12px 20px; border-radius: 16px; border: 1px solid rgba(52, 152, 219, 0.4);
            color: #fff; font-weight: bold; font-size: 13px; z-index: 4; width: 150px;
        }
        .hp-bar-container { width: 100%; background: #111; height: 10px; border-radius: 6px; margin-top: 6px; overflow: hidden; }
        #hpBarFill { width: 100%; background: #3498db; height: 100%; transition: width 0.2s; }

        #weaponUI {
            position: absolute; bottom: 25px; right: 25px;
            background: rgba(6, 2, 15, 0.9); padding: 12px 18px; border-radius: 16px;
            border: 2px solid #00ffff; color: #fff; font-weight: 900; font-size: 14px;
            z-index: 4; text-align: center;
        }
        .weapon-slots { display: flex; gap: 6px; margin-top: 6px; }
        .slot { padding: 6px 10px; background: #1b0933; border: 1px solid #555; border-radius: 8px; font-size: 11px; cursor: pointer; color: #fff; }
        .slot.active { border-color: #00ffff; background: #3498db; color: #000; }

        /* زر وقائمة الإحصائيات TAB Leaderboard */
        #tabBtn {
            position: absolute; top: 20px; right: 180px; z-index: 5;
            background: rgba(6, 2, 15, 0.9); border: 1px solid #9b59b6; color: #fff;
            padding: 8px 16px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 12px;
        }
        #leaderboardModal {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 500px; background: rgba(10, 5, 22, 0.95); border: 2px solid #9b59b6;
            border-radius: 20px; padding: 20px; z-index: 9; color: #fff; backdrop-filter: blur(10px);
        }
        #leaderboardModal h2 { margin-top: 0; text-align: center; color: #00ffff; }
        .stats-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .stats-table th, .stats-table td { padding: 10px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .stats-table th { color: #3498db; font-size: 14px; }

        #minimapCanvas {
            position: absolute; top: 20px; right: 20px;
            width: 130px; height: 130px; border-radius: 50%;
            border: 2px solid #00ffff; background: rgba(10, 5, 20, 0.85); z-index: 4;
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 6;
        }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #00ffff; }
        #crosshair::before { top: 4px; left: -8px; width: 26px; height: 2px; }
        #crosshair::after { top: -8px; left: 4px; width: 2px; height: 26px; }

        .touch-controls { position: absolute; bottom: 30px; left: 20px; right: 20px; display: flex; justify-content: space-between; pointer-events: none; z-index: 5; }
        .joystick-zone { width: 110px; height: 110px; border: 2px dashed rgba(52, 152, 219, 0.4); border-radius: 50%; display: flex; justify-content: center; align-items: center; pointer-events: auto; }
        .joystick-stick { width: 45px; height: 45px; background: linear-gradient(135deg, #3498db, #9b59b6); border-radius: 50%; }
        .fire-btn { width: 80px; height: 80px; background: linear-gradient(135deg, #e74c3c, #c0392b); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: 900; pointer-events: auto; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div id="mainMenu">
    <div class="menu-card">
        <h1>THE WAR</h1>
        <input type="text" id="playerName" placeholder="أدخل اسمك المقاتل..." maxlength="12">
        <button id="startBtn">دخول المعركة</button>
    </div>
</div>

<div id="gameWrapper">
    <div id="notificationContainer"></div>

    <div id="crosshair"></div>
    <canvas id="minimapCanvas" width="130" height="130"></canvas>

    <div id="healthUI">
        <div>الصحة (HP)</div>
        <div class="hp-bar-container"><div id="hpBarFill"></div></div>
    </div>

    <button id="tabBtn" onclick="toggleLeaderboard()">📊 القائمة (TAB)</button>

    <div id="weaponUI">
        <div id="currentWeaponText">السلاح: سكين 🗡️</div>
        <div class="weapon-slots">
            <div class="slot active" id="slot1" onclick="selectWeapon(1)">1: سكين</div>
            <div class="slot" id="slot2" onclick="selectWeapon(2)">2: مسدس</div>
            <div class="slot" id="slot3" onclick="selectWeapon(3)">3: بندقية</div>
        </div>
    </div>

    <div id="leaderboardModal">
        <h2>🏆 جدول القتلات والوفيات</h2>
        <table class="stats-table">
            <thead>
                <tr>
                    <th>المقاتل</th>
                    <th>القتلات (K)</th>
                    <th>الوفيات (D)</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody">
                </tbody>
        </table>
    </div>
</div>

<div class="touch-controls" id="touchUI" style="display: none;">
    <div class="joystick-zone" id="joyZone">
        <div class="joystick-stick" id="joyStick"></div>
    </div>
    <div class="fire-btn" id="fireBtn">هجوم</div>
</div>

<script>
    let socket;
    try { socket = io(); } catch(e) { socket = null; }

    let scene, camera, renderer;
    let obstacleBoxes = [];
    let otherPlayers = {}; // تخزين لاعبي الأونلاين والمجسمات
    let fpWeaponGroup;
    let currentKnifeMesh, currentPistolMesh, currentRifleMesh;

    let myPlayerName = "مقاتل";
    const movement = { up: false, down: false, left: false, right: false };
    let myPlayerPos = { x: 750, y: 750 };
    let playerYaw = 0;
    let myKills = 0, myDeaths = 0;

    const WEAPONS = {
        1: { name: "سكين 🗡️", cd: 400 },
        2: { name: "مسدس 🔫", cd: 300 },
        3: { name: "بندقية 🎯", cd: 150 }
    };
    let currentWeaponId = 1;
    let lastAttackTime = 0;

    function init3D() {
        const container = document.getElementById('gameWrapper');
        scene = new THREE.Scene();
        scene.background = new THREE.Color('#070314'); 
        scene.fog = new THREE.FogExp2('#070314', 0.0005);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 4000);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const dirLight = new THREE.DirectionalLight(0xa29bfe, 0.9);
        dirLight.position.set(1000, 1500, 1000);
        scene.add(dirLight);

        // خريطة الأرضية
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(3000, 3000),
            new THREE.MeshStandardMaterial({ color: 0x0a0518, roughness: 0.4 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.set(750, 0, 750);
        scene.add(floor);

        const gridHelper = new THREE.GridHelper(3000, 80, 0x00ffff, 0x8e44ad);
        gridHelper.position.set(750, 0.6, 750);
        scene.add(gridHelper);

        fpWeaponGroup = new THREE.Group();
        camera.add(fpWeaponGroup);
        scene.add(camera);

        buildDetailedWeapons();
        buildExpandedMap();
        setupSocketListeners();

        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body || e.buttons === 1) {
                playerYaw -= e.movementX * 0.003;
                broadcastMovement();
            }
        });

        window.addEventListener('resize', onWindowResize);
        setupTouchEvents();
        animate();
    }

    // بناء شكل لاعبي الأونلاين (3D Player Character)
    function createPlayerModel(name) {
        const group = new THREE.Group();

        // الجذع/الجسم
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x3498db, metalness: 0.5 });
        const body = new THREE.Mesh(new THREE.BoxGeometry(10, 22, 6), bodyMat);
        body.position.y = 11;
        group.add(body);

        // الرأس والخوذة
        const headMat = new THREE.MeshStandardMaterial({ color: 0x222233 });
        const head = new THREE.Mesh(new THREE.BoxGeometry(7, 7, 7), headMat);
        head.position.y = 26;
        group.add(head);

        // قناع النيون
        const visor = new THREE.Mesh(new THREE.BoxGeometry(5.5, 2, 1), new THREE.MeshBasicMaterial({ color: 0x00ffff }));
        visor.position.set(0, 26.5, -3.6);
        group.add(visor);

        // الأذرع
        const armMat = new THREE.MeshStandardMaterial({ color: 0x1f1938 });
        const leftArm = new THREE.Mesh(new THREE.BoxGeometry(3, 16, 3), armMat);
        leftArm.position.set(-7, 13, 0);
        group.add(leftArm);

        const rightArm = new THREE.Mesh(new THREE.BoxGeometry(3, 16, 3), armMat);
        rightArm.position.set(7, 13, 0);
        group.add(rightArm);

        return group;
    }

    function buildDetailedWeapons() {
        const darkMat = new THREE.MeshStandardMaterial({ color: 0x1a1a24, metalness: 0.8 });
        const metalMat = new THREE.MeshStandardMaterial({ color: 0x888899, metalness: 0.9 });
        const neonMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });

        currentKnifeMesh = new THREE.Group();
        const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 4, 12), darkMat);
        handle.rotation.x = Math.PI / 2;
        currentKnifeMesh.add(handle);
        const blade = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.2, 6), metalMat);
        blade.position.set(0, 0.3, -4);
        currentKnifeMesh.add(blade);
        currentKnifeMesh.position.set(1.5, -1.8, -3);
        fpWeaponGroup.add(currentKnifeMesh);

        currentPistolMesh = new THREE.Group();
        const pGrip = new THREE.Mesh(new THREE.BoxGeometry(0.8, 3, 1.2), darkMat);
        pGrip.rotation.x = -0.2;
        currentPistolMesh.add(pGrip);
        const pBody = new THREE.Mesh(new THREE.BoxGeometry(1, 1.2, 5), darkMat);
        pBody.position.set(0, 1.3, -1.8);
        currentPistolMesh.add(pBody);
        currentPistolMesh.position.set(1.8, -1.8, -3.5);
        currentPistolMesh.visible = false;
        fpWeaponGroup.add(currentPistolMesh);

        currentRifleMesh = new THREE.Group();
        const rBody = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.6, 9), darkMat);
        rBody.position.set(0, 0, -2);
        currentRifleMesh.add(rBody);
        const rBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 10, 12), metalMat);
        rBarrel.rotation.x = Math.PI / 2;
        rBarrel.position.set(0, 0.4, -9);
        currentRifleMesh.add(rBarrel);
        currentRifleMesh.position.set(2, -2, -4);
        currentRifleMesh.visible = false;
        fpWeaponGroup.add(currentRifleMesh);
    }

    function selectWeapon(id) {
        currentWeaponId = id;
        document.querySelectorAll('.slot').forEach((s, idx) => {
            s.classList.toggle('active', idx + 1 === id);
        });
        document.getElementById('currentWeaponText').innerText = "السلاح: " + WEAPONS[id].name;

        currentKnifeMesh.visible = (id === 1);
        currentPistolMesh.visible = (id === 2);
        currentRifleMesh.visible = (id === 3);
    }

    function buildExpandedMap() {
        const towerMat = new THREE.MeshStandardMaterial({ color: 0x2c1a4d, metalness: 0.8 });
        const tower = new THREE.Mesh(new THREE.CylinderGeometry(40, 60, 300, 16), towerMat);
        tower.position.set(750, 150, 750);
        scene.add(tower);
        addObstacleBox(750, 750, 100, 100);

        for (let i = 0; i < 30; i++) {
            let rx = Math.random() * 2400 - 450;
            let rz = Math.random() * 2400 - 450;
            let w = Math.random() * 120 + 60;
            let h = Math.random() * 120 + 60;

            const box = new THREE.Mesh(new THREE.BoxGeometry(w, 60, h), towerMat);
            box.position.set(rx, 30, rz);
            scene.add(box);
            addObstacleBox(rx, rz, w, h);
        }
    }

    function addObstacleBox(x, z, w, h) {
        obstacleBoxes.push({ minX: x - w/2 - 12, maxX: x + w/2 + 12, minZ: z - h/2 - 12, maxZ: z + h/2 + 12 });
    }

    function checkCollision(newX, newZ) {
        for (let b of obstacleBoxes) {
            if (newX > b.minX && newX < b.maxX && newZ > b.minZ && newZ < b.maxZ) return true;
        }
        return false;
    }

    // أونلاين: إدارات الأحداث المتبادلة
    function setupSocketListeners() {
        if (!socket) return;

        socket.on('playerJoined', (data) => {
            showNotification(`🎮 انضم ${data.name} إلى المعركة!`);
            let pModel = createPlayerModel(data.name);
            pModel.position.set(data.x, 0, data.y);
            scene.add(pModel);
            otherPlayers[data.id] = { mesh: pModel, name: data.name, kills: 0, deaths: 0 };
            updateLeaderboardUI();
        });

        socket.on('playerLeft', (id) => {
            if (otherPlayers[id]) {
                showNotification(`🚪 غادر ${otherPlayers[id].name} اللعبة`);
                scene.remove(otherPlayers[id].mesh);
                delete otherPlayers[id];
                updateLeaderboardUI();
            }
        });

        socket.on('playerMoved', (data) => {
            if (otherPlayers[data.id]) {
                otherPlayers[data.id].mesh.position.set(data.x, 0, data.y);
                otherPlayers[data.id].mesh.rotation.y = data.yaw;
            }
        });
    }

    function broadcastMovement() {
        if (socket) socket.emit('move', { x: myPlayerPos.x, y: myPlayerPos.y, yaw: playerYaw });
    }

    function showNotification(msg) {
        const container = document.getElementById('notificationContainer');
        const toast = document.createElement('div');
        toast.className = 'notif-toast';
        toast.innerText = msg;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }

    function toggleLeaderboard() {
        const modal = document.getElementById('leaderboardModal');
        modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        updateLeaderboardUI();
    }

    function updateLeaderboardUI() {
        const tbody = document.getElementById('leaderboardBody');
        tbody.innerHTML = '';

        // اضافة اسمي أولاً
        let myRow = `<tr><td>${myPlayerName} (أنت)</td><td>${myKills}</td><td>${myDeaths}</td></tr>`;
        tbody.innerHTML += myRow;

        // إضافة باقي لاعبي الأونلاين
        for (let id in otherPlayers) {
            let p = otherPlayers[id];
            let row = `<tr><td>${p.name}</td><td>${p.kills}</td><td>${p.deaths}</td></tr>`;
            tbody.innerHTML += row;
        }
    }

    function setupTouchEvents() {
        const joyZone = document.getElementById('joyZone');
        const joyStick = document.getElementById('joyStick');
        let touchId = null;

        joyZone.addEventListener('touchstart', (e) => {
            touchId = e.changedTouches[0].identifier;
        });

        joyZone.addEventListener('touchmove', (e) => {
            for (let t of e.changedTouches) {
                if (t.identifier === touchId) {
                    let rect = joyZone.getBoundingClientRect();
                    let dx = t.clientX - (rect.left + rect.width / 2);
                    let dy = t.clientY - (rect.top + rect.height / 2);
                    
                    movement.up = dy < -10;
                    movement.down = dy > 10;
                    movement.left = dx < -10;
                    movement.right = dx > 10;

                    joyStick.style.transform = `translate(${dx*0.4}px, ${dy*0.4}px)`;
                }
            }
        });

        const resetJoy = () => {
            movement.up = movement.down = movement.left = movement.right = false;
            joyStick.style.transform = `translate(0px, 0px)`;
        };

        joyZone.addEventListener('touchend', resetJoy);
        document.getElementById('fireBtn').addEventListener('touchstart', performAttack);
    }

    function handleFPSMovement() {
        let speed = 4.5;
        let dx = 0, dz = 0;

        if (movement.up) { dx += Math.sin(playerYaw); dz -= Math.cos(playerYaw); }
        if (movement.down) { dx -= Math.sin(playerYaw); dz += Math.cos(playerYaw); }
        if (movement.left) { dx -= Math.cos(playerYaw); dz -= Math.sin(playerYaw); }
        if (movement.right) { dx += Math.cos(playerYaw); dz += Math.sin(playerYaw); }

        if (dx !== 0 || dz !== 0) {
            let nextX = myPlayerPos.x + dx * speed;
            let nextZ = myPlayerPos.y + dz * speed;

            if (!checkCollision(nextX, myPlayerPos.y)) myPlayerPos.x = nextX;
            if (!checkCollision(myPlayerPos.x, nextZ)) myPlayerPos.y = nextZ;

            broadcastMovement();
        }

        camera.position.set(myPlayerPos.x, 34, myPlayerPos.y);
        camera.rotation.y = playerYaw;
    }

    function performAttack() {
        const now = Date.now();
        const weapon = WEAPONS[currentWeaponId];
        if (now - lastAttackTime < weapon.cd) return;
        lastAttackTime = now;

        if (fpWeaponGroup) {
            fpWeaponGroup.position.z -= 1.0;
            setTimeout(() => { fpWeaponGroup.position.z = 0; }, 80);
        }
    }

    function drawMinimap() {
        const canvas = document.getElementById('minimapCanvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const scale = 0.05;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#8e44ad';
        obstacleBoxes.forEach(b => {
            let relX = ((b.minX + b.maxX)/2 - myPlayerPos.x) * scale;
            let relZ = ((b.minZ + b.maxZ)/2 - myPlayerPos.y) * scale;
            ctx.fillRect(cx + relX - 3, cy + relZ - 3, 6, 6);
        });

        // رسم لاعبي الأونلاين بنقاط حمراء
        ctx.fillStyle = '#e74c3c';
        for (let id in otherPlayers) {
            let pos = otherPlayers[id].mesh.position;
            let relX = (pos.x - myPlayerPos.x) * scale;
            let relZ = (pos.z - myPlayerPos.y) * scale;
            ctx.beginPath();
            ctx.arc(cx + relX, cy + relZ, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        // موقعك
        ctx.fillStyle = '#00ffff';
        ctx.beginPath();
        ctx.arc(cx, cy, 4, 0, Math.PI * 2);
        ctx.fill();
    }

    function onWindowResize() {
        if (!camera || !renderer) return;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    document.getElementById('startBtn').addEventListener('click', function() {
        const nameInput = document.getElementById('playerName');
        myPlayerName = nameInput.value.trim() || "مقاتل";

        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('gameWrapper').style.display = 'block';

        if(window.innerWidth < 1024 || 'ontouchstart' in window) {
            document.getElementById('touchUI').style.display = 'flex';
        } else {
            document.body.requestPointerLock = document.body.requestPointerLock || document.body.mozRequestPointerLock;
            document.body.requestPointerLock();
        }

        init3D();
        showNotification(`🔥 أهلاً بك ${myPlayerName} في الساحة!`);
    });

    document.addEventListener('keydown', (e) => {
        if (['KeyW', 'ArrowUp'].includes(e.code) || e.key === 'w' || e.key === 'W') movement.up = true;
        if (['KeyS', 'ArrowDown'].includes(e.code) || e.key === 's' || e.key === 'S') movement.down = true;
        if (['KeyA', 'ArrowLeft'].includes(e.code) || e.key === 'a' || e.key === 'A') movement.left = true;
        if (['KeyD', 'ArrowRight'].includes(e.code) || e.key === 'd' || e.key === 'D') movement.right = true;

        if (e.code === 'Tab') {
            e.preventDefault();
            toggleLeaderboard();
        }
        if (e.code === 'Digit1') selectWeapon(1);
        if (e.code === 'Digit2') selectWeapon(2);
        if (e.code === 'Digit3') selectWeapon(3);
    });

    document.addEventListener('keyup', (e) => {
        if (['KeyW', 'ArrowUp'].includes(e.code) || e.key === 'w' || e.key === 'W') movement.up = false;
        if (['KeyS', 'ArrowDown'].includes(e.code) || e.key === 's' || e.key === 'S') movement.down = false;
        if (['KeyA', 'ArrowLeft'].includes(e.code) || e.key === 'a' || e.key === 'A') movement.left = false;
        if (['KeyD', 'ArrowRight'].includes(e.code) || e.key === 'd' || e.key === 'D') movement.right = false;
    });

    window.addEventListener('click', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.closest('#weaponUI') || e.target.closest('#tabBtn')) return;
        performAttack();
    });

    function animate() {
        requestAnimationFrame(animate);
        handleFPSMovement();
        drawMinimap();
        if (renderer && scene && camera) renderer.render(scene, camera);
    }
</script>
