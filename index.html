<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE WAR 3D - Advanced Tactical Arena</title>
    <style>
        body { margin: 0; background: #05020c; overflow: hidden; touch-action: none; font-family: 'Segoe UI', Roboto, sans-serif; user-select: none; }
        
        #mainMenu {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1b0933 0%, #06020f 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; color: #fff;
        }
        .menu-card {
            background: rgba(12, 5, 26, 0.85); padding: 35px 30px; border-radius: 24px;
            box-shadow: 0 0 40px rgba(155, 89, 182, 0.3); width: 340px; text-align: center; border: 2px solid #8e44ad;
            backdrop-filter: blur(12px);
        }
        h1 { margin: 0 0 15px 0; font-size: 38px; color: #00ffff; font-weight: 900; text-shadow: 0 0 10px #00ffff; }
        input, button, select { width: 100%; padding: 13px; margin: 8px 0; border-radius: 12px; border: none; font-size: 14px; box-sizing: border-box; }
        input, select { background: rgba(15, 8, 30, 0.8); color: #fff; text-align: center; border: 2px solid #2c1a4d; }
        select { text-align-last: center; cursor: pointer; }
        button { background: linear-gradient(90deg, #9b59b6, #00ffff); color: #000; font-weight: 900; cursor: pointer; }

        .insta-link {
            display: inline-block; margin-top: 15px; color: #e1306c;
            text-decoration: none; font-weight: bold; font-size: 13px; transition: transform 0.2s, color 0.2s;
        }
        .insta-link:hover { color: #ff6097; transform: scale(1.05); }

        #gameWrapper { display: none; position: relative; width: 100vw; height: 100vh; }
        
        #healthUI {
            position: absolute; top: 15px; left: 15px; background: rgba(6, 2, 15, 0.9);
            padding: 10px 15px; border-radius: 12px; border: 1px solid #00ffff;
            color: #fff; font-weight: bold; font-size: 12px; z-index: 4; width: 140px;
        }
        .hp-bar-container { width: 100%; background: #111; height: 8px; border-radius: 4px; margin-top: 5px; overflow: hidden; }
        #hpBarFill { width: 100%; background: #00ffff; height: 100%; transition: width 0.2s; }

        #ammoDisplay { margin-top: 8px; font-size: 13px; color: #ffcc00; display: flex; justify-content: space-between; }

        #weaponUI {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(6, 2, 15, 0.9); padding: 10px 14px; border-radius: 14px;
            border: 2px solid #00ffff; color: #fff; font-weight: 900; font-size: 12px;
            z-index: 4; text-align: center; box-shadow: 0 0 15px rgba(0,255,255,0.2);
        }
        .weapon-slots { display: flex; gap: 5px; margin-top: 5px; }
        .slot { padding: 5px 10px; background: #1b0933; border: 1px solid #555; border-radius: 6px; font-size: 10px; cursor: pointer; color: #fff; }
        .slot.active { border-color: #00ffff; background: #00ffff; color: #000; font-weight: bold; }

        #tabBtn {
            position: absolute; top: 15px; right: 145px; z-index: 5;
            background: rgba(6, 2, 15, 0.85); border: 1px solid #9b59b6; color: #fff;
            padding: 5px 10px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 11px;
        }
        #leaderboardModal {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 420px; background: rgba(10, 5, 22, 0.95); border: 2px solid #00ffff;
            border-radius: 16px; padding: 15px; z-index: 9; color: #fff; backdrop-filter: blur(10px);
        }
        #leaderboardModal h3 { margin-top: 0; text-align: center; color: #00ffff; font-size: 16px; }
        .stats-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .stats-table th, .stats-table td { padding: 6px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 12px; }

        #chatContainer {
            position: absolute; bottom: 20px; left: 20px; width: 220px;
            background: rgba(6, 2, 15, 0.85); border-radius: 10px; padding: 8px;
            display: flex; flex-direction: column; z-index: 5; border: 1px solid rgba(0,255,255,0.3);
        }
        #chatArea { height: 90px; overflow-y: auto; color: #fff; font-size: 11px; margin-bottom: 5px; text-align: right; direction: rtl; }
        .chat-msg { margin: 2px 0; }
        .chat-sys { color: #00ffff; font-weight: bold; }
        #chatInput { padding: 6px; font-size: 11px; width: 100%; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #444; border-radius: 5px; box-sizing: border-box; }

        #minimapCanvas {
            position: absolute; top: 15px; right: 15px;
            width: 110px; height: 110px; border-radius: 50%;
            border: 2px solid #00ffff; background: rgba(10, 5, 20, 0.85); z-index: 4;
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 8px; height: 8px;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 6;
        }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #00ffff; }
        #crosshair::before { top: 3px; left: -6px; width: 20px; height: 2px; }
        #crosshair::after { top: -6px; left: 3px; width: 2px; height: 20px; }

        /* الأشرطة العائمة فوق رؤوس اللاعبين */
        .nameplate {
            position: absolute; transform: translate(-50%, -100%);
            display: flex; flex-direction: column; align-items: center; pointer-events: none;
            z-index: 3; transition: opacity 0.1s;
        }
        .nameplate-title { color: #fff; font-size: 11px; font-weight: bold; text-shadow: 0 0 4px #000; margin-bottom: 2px; white-space: nowrap; }
        .nameplate-bar-bg { width: 50px; height: 5px; background: rgba(0,0,0,0.7); border-radius: 3px; border: 1px solid #fff; overflow: hidden; }
        .nameplate-bar-fill { height: 100%; background: #00ff66; width: 100%; }

        .touch-controls { position: absolute; bottom: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: flex-end; pointer-events: none; z-index: 5; }
        .joystick-zone { width: 100px; height: 100px; border: 2px dashed rgba(0, 255, 255, 0.5); border-radius: 50%; display: flex; justify-content: center; align-items: center; pointer-events: auto; }
        .joystick-stick { width: 40px; height: 40px; background: linear-gradient(135deg, #00ffff, #9b59b6); border-radius: 50%; }
        .touch-action-btns { display: flex; gap: 8px; pointer-events: auto; }
        .action-btn { width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: 900; font-size: 11px; border: 1px solid rgba(255,255,255,0.4); }
        .fire-btn { background: linear-gradient(135deg, #e74c3c, #c0392b); width: 65px; height: 65px; font-size: 12px; }
        .reload-btn { background: linear-gradient(135deg, #f39c12, #d35400); }
        .jump-btn { background: linear-gradient(135deg, #2ecc71, #27ae60); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div id="mainMenu">
    <div class="menu-card">
        <h1>THE WAR 3D</h1>
        <input type="text" id="playerName" placeholder="أدخل اسم المقاتل..." maxlength="12">
        <select id="gameModeSelect">
            <option value="bots">🤖 ضد البوتات (أوفلاين)</option>
            <option value="online">🌐 لعب أونلاين</option>
        </select>
        <button id="startBtn">دخول الساحة 3D</button>
        <a href="https://www.instagram.com/algerian_aizen/" target="_blank" class="insta-link">
            📸 تابعني على إنستغرام: @algerian_aizen
        </a>
    </div>
</div>

<div id="gameWrapper">
    <div id="crosshair"></div>
    <canvas id="minimapCanvas" width="110" height="110"></canvas>

    <div id="healthUI">
        <div>الصحة (HP)</div>
        <div class="hp-bar-container"><div id="hpBarFill"></div></div>
        <div id="ammoDisplay">
            <span>الذخيرة:</span>
            <span id="ammoCount">∞ / ∞</span>
        </div>
    </div>

    <button id="tabBtn" onclick="toggleLeaderboard()">📊 TAB</button>

    <div id="chatContainer">
        <div id="chatArea"></div>
        <input type="text" id="chatInput" placeholder="اكتب رسالة..." maxlength="50">
    </div>

    <div id="weaponUI">
        <div id="currentWeaponText">السلاح: سكين 🗡️</div>
        <div class="weapon-slots">
            <div class="slot active" id="slot1" onclick="selectWeapon(1)">1: سكين</div>
            <div class="slot" id="slot2" onclick="selectWeapon(2)">2: مسدس</div>
            <div class="slot" id="slot3" onclick="selectWeapon(3)">3: بندقية</div>
        </div>
    </div>

    <div id="leaderboardModal">
        <h3>🏆 قائمة الإحصائيات</h3>
        <table class="stats-table">
            <thead>
                <tr>
                    <th>المقاتل</th>
                    <th>القتلات</th>
                    <th>الوفيات</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
    </div>

    <div id="nameplatesContainer"></div>
</div>

<div class="touch-controls" id="touchUI" style="display: none;">
    <div class="joystick-zone" id="joyZone">
        <div class="joystick-stick" id="joyStick"></div>
    </div>
    <div class="touch-action-btns">
        <div class="action-btn reload-btn" id="reloadBtn">🔄 تعبئة</div>
        <div class="action-btn jump-btn" id="jumpBtn">🦘 قفز</div>
        <div class="action-btn fire-btn" id="fireBtn">إطلاق</div>
    </div>
</div>

<script>
    let socket;
    try { socket = io(); } catch(e) { socket = null; }

    let scene, camera, renderer;
    let obstacleBoxes = [];
    let otherPlayers = {};
    let bots = [];
    let fpWeaponGroup;
    let currentKnifeMesh, currentPistolMesh, currentRifleMesh;

    let gameMode = "bots";
    let myPlayerName = "مقاتل";
    let myHealth = 100;
    const movement = { up: false, down: false, left: false, right: false };
    let myPlayerPos = { x: 1250, y: 1250 };
    
    // دعم زاوية النظر للأعلى وللأسفل (Pitch)
    let playerYaw = 0;
    let playerPitch = 0;

    let myKills = 0, myDeaths = 0;

    let playerY = 34;
    let velocityY = 0;
    let isGrounded = true;
    const gravity = -0.55;
    const jumpPower = 10.5;

    let audioCtx;

    // أسلحة معدلة مع الذخيرة والواقعية
    const WEAPONS = {
        1: { name: "خنجر العاصفة 🗡️", cd: 350, range: 50, damage: 40, maxAmmo: Infinity, currentAmmo: Infinity, isMelee: true },
        2: { name: "مسدس تكتيكي 9mm 🔫", cd: 250, range: 750, damage: 22, maxAmmo: 12, currentAmmo: 12, reserveAmmo: 60, reloadTime: 1200 },
        3: { name: "بندقية AK-Cyber 🎯", cd: 120, range: 1300, damage: 18, maxAmmo: 30, currentAmmo: 30, reserveAmmo: 120, reloadTime: 1800 }
    };
    let currentWeaponId = 1;
    let lastAttackTime = 0;
    let isReloading = false;

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'shoot') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(500, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
            osc.start(); osc.stop(audioCtx.currentTime + 0.12);
        } else if (type === 'reload') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(600, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        } else if (type === 'knife') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(900, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
            osc.start(); osc.stop(audioCtx.currentTime + 0.08);
        } else if (type === 'jump') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(180, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(450, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }
    }

    function getRandomSpawnPos() {
        let x, z, collision;
        let attempts = 0;
        do {
            x = 300 + Math.random() * 1900;
            z = 300 + Math.random() * 1900;
            collision = checkCollision(x, z);
            attempts++;
        } while (collision && attempts < 100);
        return { x, z };
    }

    function init3D() {
        const container = document.getElementById('gameWrapper');
        scene = new THREE.Scene();
        scene.background = new THREE.Color('#080414'); 
        scene.fog = new THREE.FogExp2('#080414', 0.0003);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.rotation.order = 'YXZ'; // لضمان سلاسة حركة الرأس Pitch/Yaw

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const ambLight = new THREE.AmbientLight(0xffffff, 1.8);
        scene.add(ambLight);
        const dirLight = new THREE.DirectionalLight(0x00ffff, 1.5);
        dirLight.position.set(1000, 2000, 1000);
        scene.add(dirLight);

        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(5000, 5000),
            new THREE.MeshStandardMaterial({ color: 0x120c24, roughness: 0.3, metalness: 0.2 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.set(1250, 0, 1250);
        scene.add(floor);

        const gridHelper = new THREE.GridHelper(5000, 100, 0x00ffff, 0x551a8b);
        gridHelper.position.set(1250, 0.8, 1250);
        scene.add(gridHelper);

        fpWeaponGroup = new THREE.Group();
        camera.add(fpWeaponGroup);
        scene.add(camera);

        // ترسبن اللاعب في مكان عشوائي آمن
        let startPos = getRandomSpawnPos();
        myPlayerPos = { x: startPos.x, y: startPos.z };

        buildRealisticWeapons();
        buildSmartObstacleMap();

        if (gameMode === "online" && socket) {
            setupSocketListeners();
            socket.emit('initGame', { name: myPlayerName });
        } else {
            spawnBots(6);
        }

        // تحكم الرأس التام (يمين، يسار، فوق، تحت)
        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body || e.buttons === 1) {
                playerYaw -= e.movementX * 0.0022;
                playerPitch -= e.movementY * 0.0022;
                
                // تقييد النظر للأعلى وللأسفل بـ 85 درجة
                playerPitch = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, playerPitch));
            }
        });

        let lastTouchX = null, lastTouchY = null;
        window.addEventListener('touchmove', (e) => {
            for (let t of e.changedTouches) {
                if (t.clientX > window.innerWidth / 2) {
                    if (lastTouchX !== null) {
                        let deltaX = t.clientX - lastTouchX;
                        let deltaY = t.clientY - lastTouchY;
                        playerYaw -= deltaX * 0.0035;
                        playerPitch -= deltaY * 0.0035;
                        playerPitch = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, playerPitch));
                    }
                    lastTouchX = t.clientX;
                    lastTouchY = t.clientY;
                }
            }
        });
        window.addEventListener('touchend', () => { lastTouchX = null; lastTouchY = null; });

        window.addEventListener('resize', onWindowResize);
        setupTouchEvents();
        setupChatInput();
        updateAmmoUI();

        animate();
    }

    // بناء مجسم لاعب/بوت محسّن وواقعي يمسك بسلاح
    function createHumanoidPlayerMesh(colorHex = 0x00ffff) {
        const group = new THREE.Group();
        const armorMat = new THREE.MeshStandardMaterial({ color: 0x1f2438, metalness: 0.7, roughness: 0.3 });
        const accentMat = new THREE.MeshStandardMaterial({ color: colorHex, metalness: 0.5, roughness: 0.5 });
        const visorMat = new THREE.MeshBasicMaterial({ color: colorHex });

        // الجسم والتكتيك
        const torso = new THREE.Mesh(new THREE.BoxGeometry(10, 18, 6), armorMat);
        torso.position.y = 19;
        group.add(torso);

        const vest = new THREE.Mesh(new THREE.BoxGeometry(10.8, 12, 6.8), accentMat);
        vest.position.y = 19;
        group.add(vest);

        // الرأس والخوذة
        const head = new THREE.Mesh(new THREE.SphereGeometry(3.8, 16, 16), armorMat);
        head.position.y = 31;
        group.add(head);

        const visor = new THREE.Mesh(new THREE.BoxGeometry(5, 1.8, 2), visorMat);
        visor.position.set(0, 31.5, -2.5);
        group.add(visor);

        // الأذرع في وضعية إمساك السلاح
        const armGeo = new THREE.CylinderGeometry(1.5, 1.2, 14, 8);
        const leftArm = new THREE.Mesh(armGeo, armorMat);
        leftArm.position.set(-6.5, 20, -2);
        leftArm.rotation.x = -Math.PI / 4;
        group.add(leftArm);

        const rightArm = new THREE.Mesh(armGeo, armorMat);
        rightArm.position.set(6.5, 20, -2);
        rightArm.rotation.x = -Math.PI / 3;
        group.add(rightArm);

        // مجسم السلاح الممسوك في اليد
        const gunBody = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2, 8), new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9 }));
        gunBody.position.set(3, 18, -6);
        group.add(gunBody);

        // الأرجل
        const legGeo = new THREE.CylinderGeometry(1.8, 1.4, 16, 8);
        const leftLeg = new THREE.Mesh(legGeo, armorMat);
        leftLeg.position.set(-2.8, 8, 0);
        group.add(leftLeg);

        const rightLeg = new THREE.Mesh(legGeo, armorMat);
        rightLeg.position.set(2.8, 8, 0);
        group.add(rightLeg);

        return group;
    }

    // تصميم أسلحة أكثر واقعية وتفصيلاً للـ FPS
    function buildRealisticWeapons() {
        const gunMetalMat = new THREE.MeshStandardMaterial({ color: 0x18191c, metalness: 0.9, roughness: 0.2 });
        const darkWoodMat = new THREE.MeshStandardMaterial({ color: 0x2d1a0e, roughness: 0.8 });
        const goldAccent = new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 0.8, roughness: 0.3 });
        const cyanNeon = new THREE.MeshBasicMaterial({ color: 0x00ffff });

        // 1. الخنجر
        currentKnifeMesh = new THREE.Group();
        const kHandle = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.6, 4, 12), darkWoodMat);
        kHandle.rotation.x = Math.PI / 2;
        currentKnifeMesh.add(kHandle);
        const kGuard = new THREE.Mesh(new THREE.BoxGeometry(2, 0.4, 0.6), goldAccent);
        kGuard.position.set(0, 0, -2);
        currentKnifeMesh.add(kGuard);
        const kBlade = new THREE.Mesh(new THREE.BoxGeometry(0.12, 1.6, 7), gunMetalMat);
        kBlade.position.set(0, 0.3, -5.5);
        currentKnifeMesh.add(kBlade);
        currentKnifeMesh.position.set(1.5, -1.8, -3);
        fpWeaponGroup.add(currentKnifeMesh);

        // 2. المسدس التكتيكي
        currentPistolMesh = new THREE.Group();
        const pGrip = new THREE.Mesh(new THREE.BoxGeometry(0.8, 3.2, 1.4), darkWoodMat);
        pGrip.rotation.x = -0.25;
        currentPistolMesh.add(pGrip);
        const pSlide = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.3, 5.5), gunMetalMat);
        pSlide.position.set(0, 1.4, -1.8);
        currentPistolMesh.add(pSlide);
        const pBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 5.6, 12), goldAccent);
        pBarrel.rotation.x = Math.PI / 2;
        pBarrel.position.set(0, 1.4, -2.2);
        currentPistolMesh.add(pBarrel);
        currentPistolMesh.position.set(1.8, -1.8, -3.5);
        currentPistolMesh.visible = false;
        fpWeaponGroup.add(currentPistolMesh);

        // 3. البندقية AK-Cyber
        currentRifleMesh = new THREE.Group();
        const rBody = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.6, 7), gunMetalMat);
        rBody.position.set(0, 0, -1);
        currentRifleMesh.add(rBody);
        const rStock = new THREE.Mesh(new THREE.BoxGeometry(1.0, 2.2, 4.5), darkWoodMat);
        rStock.position.set(0, -0.3, 3.8);
        currentRifleMesh.add(rStock);
        const rBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 10, 12), gunMetalMat);
        rBarrel.rotation.x = Math.PI / 2;
        rBarrel.position.set(0, 0.4, -8.5);
        currentRifleMesh.add(rBarrel);
        const rMag = new THREE.Mesh(new THREE.BoxGeometry(0.8, 4, 1.8), goldAccent);
        rMag.position.set(0, -2.2, -2);
        rMag.rotation.x = 0.3;
        currentRifleMesh.add(rMag);
        const rSight = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.6, 2.5), cyanNeon);
        rSight.position.set(0, 1.2, -2);
        currentRifleMesh.add(rSight);
        currentRifleMesh.position.set(2, -2, -4);
        currentRifleMesh.visible = false;
        fpWeaponGroup.add(currentRifleMesh);
    }

    function selectWeapon(id) {
        if (isReloading) return;
        currentWeaponId = id;
        document.querySelectorAll('.slot').forEach((s, idx) => {
            s.classList.toggle('active', idx + 1 === id);
        });
        document.getElementById('currentWeaponText').innerText = "السلاح: " + WEAPONS[id].name;

        currentKnifeMesh.visible = (id === 1);
        currentPistolMesh.visible = (id === 2);
        currentRifleMesh.visible = (id === 3);

        updateAmmoUI();
    }

    function reloadWeapon() {
        const w = WEAPONS[currentWeaponId];
        if (w.isMelee || isReloading || w.currentAmmo === w.maxAmmo || w.reserveAmmo <= 0) return;

        isReloading = true;
        playSound('reload');

        // إمالة السلاح أثناء إعادة التعبئة
        if (fpWeaponGroup) fpWeaponGroup.rotation.z = -0.5;

        setTimeout(() => {
            let needed = w.maxAmmo - w.currentAmmo;
            let amountToReload = Math.min(needed, w.reserveAmmo);
            w.currentAmmo += amountToReload;
            w.reserveAmmo -= amountToReload;

            isReloading = false;
            if (fpWeaponGroup) fpWeaponGroup.rotation.z = 0;
            updateAmmoUI();
        }, w.reloadTime);
    }

    function updateAmmoUI() {
        const w = WEAPONS[currentWeaponId];
        const ammoEl = document.getElementById('ammoCount');
        if (w.isMelee) {
            ammoEl.innerText = "∞ / ∞";
        } else {
            ammoEl.innerText = `${w.currentAmmo} / ${w.reserveAmmo}`;
        }
    }

    // خريطة ذكية مليئة بالمخابئ، الأعمدة، الصناديق والممرات
    function buildSmartObstacleMap() {
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x1a122e, roughness: 0.4 });
        const boxMat = new THREE.MeshStandardMaterial({ color: 0x2e1c4d, metalness: 0.3 });

        // سور خارجي يحكم الخريطة
        const mapBounds = [
            { x: 1250, z: -50, w: 2600, h: 40 },
            { x: 1250, z: 2550, w: 2600, h: 40 },
            { x: -50, z: 1250, w: 40, h: 2600 },
            { x: 2550, z: 1250, w: 40, h: 2600 }
        ];
        mapBounds.forEach(b => {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(b.w, 80, b.h), wallMat);
            wall.position.set(b.x, 40, b.z);
            scene.add(wall);
            addObstacleBox(b.x, b.z, b.w, b.h);
        });

        // توزيع ذكي للمخابئ
        for (let x = 200; x < 2400; x += 220) {
            for (let z = 200; z < 2400; z += 220) {
                let rand = Math.random();
                if (rand > 0.65) {
                    let w = Math.random() * 50 + 30;
                    let h = Math.random() * 50 + 30;
                    let height = Math.random() * 40 + 30;

                    const block = new THREE.Mesh(new THREE.BoxGeometry(w, height, h), boxMat);
                    block.position.set(x, height / 2, z);
                    scene.add(block);
                    addObstacleBox(x, z, w, h);
                }
            }
        }
    }

    function addObstacleBox(x, z, w, h) {
        obstacleBoxes.push({ minX: x - w/2 - 12, maxX: x + w/2 + 12, minZ: z - h/2 - 12, maxZ: z + h/2 + 12 });
    }

    function checkCollision(newX, newZ) {
        for (let b of obstacleBoxes) {
            if (newX > b.minX && newX < b.maxX && newZ > b.minZ && newZ < b.maxZ) return true;
        }
        return false;
    }

    function spawnBots(count) {
        const botNames = ["القااتل_01 🤖", "فانتوم ⚡", "سبيكتر 🎯", "السايبورغ ⚔️", "الظل 🚀", "المفترس 💥"];
        const colors = [0xe74c3c, 0xe67e22, 0xf1c40f, 0x9b59b6, 0x1abc9c, 0xff0055];

        for (let i = 0; i < count; i++) {
            let pos = getRandomSpawnPos();
            let pModel = createHumanoidPlayerMesh(colors[i % colors.length]);
            pModel.position.set(pos.x, 0, pos.z);
            scene.add(pModel);

            let nameplate = createNameplateUI(botNames[i]);

            bots.push({
                id: 'bot_' + i,
                name: botNames[i],
                mesh: pModel,
                nameplate: nameplate,
                x: pos.x, z: pos.z,
                health: 100,
                kills: 0, deaths: 0,
                lastAttack: 0,
                strafeDir: Math.random() > 0.5 ? 1 : -1
            });

            addChatMessage(`🤖 انضم البوت ${botNames[i]} إلى المباراة!`, true);
        }
        updateLeaderboardUI();
    }

    function createNameplateUI(name) {
        const container = document.getElementById('nameplatesContainer');
        const div = document.createElement('div');
        div.className = 'nameplate';
        div.innerHTML = `
            <div class="nameplate-title">${name}</div>
            <div class="nameplate-bar-bg"><div class="nameplate-bar-fill"></div></div>
        `;
        container.appendChild(div);
        return div;
    }

    function updateNameplatePosition(obj3D, nameplateEl, health) {
        if (!nameplateEl) return;
        if (health <= 0) { nameplateEl.style.display = 'none'; return; }

        let headPos = new THREE.Vector3(obj3D.position.x, 38, obj3D.position.z);
        headPos.project(camera);

        if (headPos.z > 1) {
            nameplateEl.style.display = 'none';
            return;
        }

        let x = (headPos.x * .5 + .5) * window.innerWidth;
        let y = (-(headPos.y * .5) + .5) * window.innerHeight;

        nameplateEl.style.display = 'flex';
        nameplateEl.style.left = `${x}px`;
        nameplateEl.style.top = `${y}px`;

        const fill = nameplateEl.querySelector('.nameplate-bar-fill');
        if (fill) fill.style.width = `${health}%`;
    }

    // ذكاء اصطناعي متطور للبوتات (تكتيكي)
    function updateBotsAI() {
        const now = Date.now();

        bots.forEach(bot => {
            if (bot.health <= 0) {
                if (bot.nameplate) bot.nameplate.style.display = 'none';
                return;
            }

            updateNameplatePosition(bot.mesh, bot.nameplate, bot.health);

            let closestDist = 9999;
            let targetPos = null;
            let targetObj = null;

            let distToPlayer = Math.hypot(myPlayerPos.x - bot.x, myPlayerPos.y - bot.z);
            if (distToPlayer < closestDist) {
                closestDist = distToPlayer;
                targetPos = { x: myPlayerPos.x, z: myPlayerPos.y };
                targetObj = "player";
            }

            bots.forEach(otherBot => {
                if (otherBot.id !== bot.id && otherBot.health > 0) {
                    let d = Math.hypot(otherBot.x - bot.x, otherBot.z - bot.z);
                    if (d < closestDist) {
                        closestDist = d;
                        targetPos = { x: otherBot.x, z: otherBot.z };
                        targetObj = otherBot;
                    }
                }
            });

            if (targetPos && closestDist < 900) {
                let dx = targetPos.x - bot.x;
                let dz = targetPos.z - bot.z;
                let angle = Math.atan2(dx, dz);

                // تفادي الالتصاق والتحرك الجانبي للتكتيك
                let speed = 3.2;
                if (closestDist < 120) speed = -2; // الابتعاد عند الاقتراب الزائد

                let strafeAngle = angle + (Math.PI / 2) * bot.strafeDir;
                let nx = bot.x + Math.sin(angle) * speed + Math.sin(strafeAngle) * 0.8;
                let nz = bot.z + Math.cos(angle) * speed + Math.cos(strafeAngle) * 0.8;

                if (!checkCollision(nx, bot.z)) bot.x = nx;
                if (!checkCollision(bot.x, nz)) bot.z = nz;

                bot.mesh.position.set(bot.x, 0, bot.z);
                bot.mesh.rotation.y = angle;

                if (Math.random() < 0.02) bot.strafeDir *= -1; // تغيير اتجاه المناورة عشوائياً

                // إطلاق النار مع انحراف بسيط
                if (closestDist < 600 && now - bot.lastAttack > 380) {
                    bot.lastAttack = now;
                    let origin = new THREE.Vector3(bot.x, 22, bot.z);
                    let targetVec = new THREE.Vector3(
                        targetPos.x + (Math.random() * 20 - 10),
                        20,
                        targetPos.z + (Math.random() * 20 - 10)
                    );
                    
                    createBulletTracer(origin, targetVec, 0xff0055);
                    playSound('shoot');

                    if (targetObj === "player" && closestDist < 500) {
                        takeDamage(10, bot.name);
                    } else if (targetObj && targetObj.health) {
                        targetObj.health -= 12;
                        if (targetObj.health <= 0) {
                            bot.kills++;
                            targetObj.deaths++;
                            addChatMessage(`☠️ قضى ${bot.name} على ${targetObj.name}`, true);
                            setTimeout(() => {
                                let respawnPos = getRandomSpawnPos();
                                targetObj.health = 100;
                                targetObj.x = respawnPos.x;
                                targetObj.z = respawnPos.z;
                            }, 3500);
                            updateLeaderboardUI();
                        }
                    }
                }
            }
        });
    }

    function createBulletTracer(startPos, endPos, colorHex = 0x00ffff) {
        const distance = startPos.distanceTo(endPos);
        const cylinderGeo = new THREE.CylinderGeometry(0.2, 0.2, distance, 6);
        const cylinderMat = new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 0.9 });
        const tracer = new THREE.Mesh(cylinderGeo, cylinderMat);

        tracer.position.copy(startPos).clone().lerp(endPos, 0.5);
        tracer.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), endPos.clone().sub(startPos).normalize());

        scene.add(tracer);
        setTimeout(() => scene.remove(tracer), 70);
    }

    function takeDamage(amount, attackerName) {
        myHealth -= amount;
        if (myHealth < 0) myHealth = 0;
        document.getElementById('hpBarFill').style.width = myHealth + "%";

        if (myHealth <= 0) {
            myDeaths++;
            addChatMessage(`☠️ تم القضاء عليك بواسطة ${attackerName}!`, true);
            setTimeout(() => {
                myHealth = 100;
                document.getElementById('hpBarFill').style.width = "100%";
                let respawn = getRandomSpawnPos();
                myPlayerPos = { x: respawn.x, y: respawn.z };
            }, 3000);
            updateLeaderboardUI();
        }
    }

    function setupSocketListeners() {
        if (!socket) return;

        socket.on('state', (state) => {
            if (state.players) {
                for (let id in state.players) {
                    if (id !== socket.id) {
                        let pData = state.players[id];
                        if (!otherPlayers[id]) {
                            let pModel = createHumanoidPlayerMesh(pData.team === 'blue' ? 0x00ffff : 0xff0055);
                            let np = createNameplateUI(pData.name || 'مقاتل');
                            scene.add(pModel);
                            otherPlayers[id] = { mesh: pModel, nameplate: np, name: pData.name || 'مقاتل', kills: 0, deaths: 0, hp: 100 };
                        }
                        otherPlayers[id].mesh.position.set(pData.x, 0, pData.y);
                        otherPlayers[id].mesh.rotation.y = pData.angle || 0;
                        updateNameplatePosition(otherPlayers[id].mesh, otherPlayers[id].nameplate, pData.hp || 100);
                    }
                }

                for (let id in otherPlayers) {
                    if (!state.players[id]) {
                        if (otherPlayers[id].nameplate) otherPlayers[id].nameplate.remove();
                        scene.remove(otherPlayers[id].mesh);
                        delete otherPlayers[id];
                    }
                }
            }
        });

        socket.on('playerDied', () => { takeDamage(100, "الخصم"); });
        socket.on('chatMessage', (data) => { addChatMessage(`${data.name}: ${data.msg}`, false); });
    }

    function setupChatInput() {
        const input = document.getElementById('chatInput');
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && input.value.trim() !== '') {
                const msg = input.value.trim();
                addChatMessage(`${myPlayerName}: ${msg}`, false);
                if (socket && gameMode === "online") socket.emit('chatMessage', { name: myPlayerName, msg: msg });
                input.value = '';
                input.blur();
            }
        });
    }

    function addChatMessage(msg, isSys) {
        const area = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = 'chat-msg' + (isSys ? ' chat-sys' : '');
        div.innerText = msg;
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
    }

    function performJump() {
        if (isGrounded) {
            velocityY = jumpPower;
            isGrounded = false;
            playSound('jump');
        }
    }

    function toggleLeaderboard() {
        const modal = document.getElementById('leaderboardModal');
        modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        updateLeaderboardUI();
    }

    function updateLeaderboardUI() {
        const tbody = document.getElementById('leaderboardBody');
        tbody.innerHTML = `<tr><td>${myPlayerName} (أنت)</td><td>${myKills}</td><td>${myDeaths}</td></tr>`;
        
        bots.forEach(b => {
            tbody.innerHTML += `<tr><td>${b.name}</td><td>${b.kills}</td><td>${b.deaths}</td></tr>`;
        });

        for (let id in otherPlayers) {
            let p = otherPlayers[id];
            tbody.innerHTML += `<tr><td>${p.name}</td><td>${p.kills}</td><td>${p.deaths}</td></tr>`;
        }
    }

    function setupTouchEvents() {
        const joyZone = document.getElementById('joyZone');
        const joyStick = document.getElementById('joyStick');
        let touchId = null;

        joyZone.addEventListener('touchstart', (e) => { touchId = e.changedTouches[0].identifier; });
        joyZone.addEventListener('touchmove', (e) => {
            for (let t of e.changedTouches) {
                if (t.identifier === touchId) {
                    let rect = joyZone.getBoundingClientRect();
                    let dx = t.clientX - (rect.left + rect.width / 2);
                    let dy = t.clientY - (rect.top + rect.height / 2);
                    
                    movement.up = dy < -8;
                    movement.down = dy > 8;
                    movement.left = dx < -8;
                    movement.right = dx > 8;

                    joyStick.style.transform = `translate(${dx*0.3}px, ${dy*0.3}px)`;
                }
            }
        });

        const resetJoy = () => {
            movement.up = movement.down = movement.left = movement.right = false;
            joyStick.style.transform = `translate(0px, 0px)`;
        };

        joyZone.addEventListener('touchend', resetJoy);
        document.getElementById('fireBtn').addEventListener('touchstart', performAttack);
        document.getElementById('reloadBtn').addEventListener('touchstart', reloadWeapon);
        document.getElementById('jumpBtn').addEventListener('touchstart', performJump);
    }

    function handleFPSMovement() {
        let speed = 5.2;
        let moveX = 0;
        let moveZ = 0;

        let forwardX = -Math.sin(playerYaw);
        let forwardZ = -Math.cos(playerYaw);
        let rightX = Math.sin(playerYaw + Math.PI / 2);
        let rightZ = Math.cos(playerYaw + Math.PI / 2);

        if (movement.up) { moveX += forwardX; moveZ += forwardZ; }
        if (movement.down) { moveX -= forwardX; moveZ -= forwardZ; }
        if (movement.left) { moveX -= rightX; moveZ -= rightZ; }
        if (movement.right) { moveX += rightX; moveZ += rightZ; }

        let nextX = myPlayerPos.x + moveX * speed;
        let nextZ = myPlayerPos.y + moveZ * speed;

        if (!checkCollision(nextX, myPlayerPos.y)) myPlayerPos.x = nextX;
        if (!checkCollision(myPlayerPos.x, nextZ)) myPlayerPos.y = nextZ;

        velocityY += gravity;
        playerY += velocityY;
        if (playerY <= 34) {
            playerY = 34;
            velocityY = 0;
            isGrounded = true;
        }

        camera.position.set(myPlayerPos.x, playerY, myPlayerPos.y);
        
        // استخدام Pitch + Yaw معاً لسلاسة الـ Aim
        camera.rotation.y = playerYaw;
        camera.rotation.x = playerPitch;

        if (socket && gameMode === "online") {
            socket.emit('playerMove', { 
                movement: movement,
                angle: playerYaw
            });
        }
    }

    function performAttack() {
        if (isReloading) return;
        const now = Date.now();
        const weapon = WEAPONS[currentWeaponId];
        if (now - lastAttackTime < weapon.cd) return;

        // التأكد من وجود رصاص
        if (!weapon.isMelee && weapon.currentAmmo <= 0) {
            reloadWeapon();
            return;
        }

        lastAttackTime = now;

        if (!weapon.isMelee) {
            weapon.currentAmmo--;
            updateAmmoUI();
        }

        if (currentWeaponId === 1) {
            playSound('knife');
        } else {
            playSound('shoot');

            let weaponPos = new THREE.Vector3();
            camera.getWorldPosition(weaponPos);

            let dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            let targetPoint = weaponPos.clone().add(dir.multiplyScalar(weapon.range));

            createBulletTracer(weaponPos, targetPoint, 0x00ffff);

            if (socket && gameMode === "online") {
                socket.emit('shoot', { angle: playerYaw });
            }

            bots.forEach(bot => {
                if (bot.health <= 0) return;
                let bDist = Math.hypot(bot.x - myPlayerPos.x, bot.z - myPlayerPos.y);
                if (bDist < weapon.range) {
                    let angleToBot = Math.atan2(bot.x - myPlayerPos.x, bot.z - myPlayerPos.y);
                    let diff = Math.abs(angleToBot - playerYaw);
                    if (diff < 0.35) {
                        bot.health -= weapon.damage;
                        if (bot.health <= 0) {
                            myKills++;
                            bot.deaths++;
                            addChatMessage(`🎯 قمت بالقضاء على ${bot.name}!`, true);
                            setTimeout(() => {
                                let respawnPos = getRandomSpawnPos();
                                bot.health = 100;
                                bot.x = respawnPos.x;
                                bot.z = respawnPos.z;
                            }, 3500);
                            updateLeaderboardUI();
                        }
                    }
                }
            });
        }

        // حركة ارتداد السلاح (Recoil Kickback)
        if (fpWeaponGroup) {
            fpWeaponGroup.position.z += 0.4;
            setTimeout(() => { fpWeaponGroup.position.z = 0; }, 60);
        }
    }

    function drawMinimap() {
        const canvas = document.getElementById('minimapCanvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const scale = 0.025;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#8e44ad';
        obstacleBoxes.forEach(b => {
            let relX = ((b.minX + b.maxX)/2 - myPlayerPos.x) * scale;
            let relZ = ((b.minZ + b.maxZ)/2 - myPlayerPos.y) * scale;
            ctx.fillRect(cx + relX - 2, cy + relZ - 2, 4, 4);
        });

        ctx.fillStyle = '#ff0055';
        bots.forEach(b => {
            if (b.health > 0) {
                let relX = (b.x - myPlayerPos.x) * scale;
                let relZ = (b.z - myPlayerPos.y) * scale;
                ctx.beginPath();
                ctx.arc(cx + relX, cy + relZ, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        });

        ctx.fillStyle = '#00ffff';
        ctx.beginPath();
        ctx.arc(cx, cy, 3.5, 0, Math.PI * 2);
        ctx.fill();
    }

    function onWindowResize() {
        if (!camera || !renderer) return;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    document.getElementById('startBtn').addEventListener('click', function() {
        initAudio();
        const nameInput = document.getElementById('playerName');
        myPlayerName = nameInput.value.trim() || "مقاتل";
        gameMode = document.getElementById('gameModeSelect').value;

        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('gameWrapper').style.display = 'block';

        if(window.innerWidth < 1024 || 'ontouchstart' in window) {
            document.getElementById('touchUI').style.display = 'flex';
        } else {
            document.body.requestPointerLock = document.body.requestPointerLock || document.body.mozRequestPointerLock;
            document.body.requestPointerLock();
        }

        init3D();
        addChatMessage(`🔥 مرحباً بك ${myPlayerName} في الساحة!`, true);
    });

    document.addEventListener('keydown', (e) => {
        if (document.activeElement.id === 'chatInput') return;

        if (['KeyW', 'ArrowUp'].includes(e.code) || e.key === 'w' || e.key === 'W') movement.up = true;
        if (['KeyS', 'ArrowDown'].includes(e.code) || e.key === 's' || e.key === 'S') movement.down = true;
        if (['KeyA', 'ArrowLeft'].includes(e.code) || e.key === 'a' || e.key === 'A') movement.left = true;
        if (['KeyD', 'ArrowRight'].includes(e.code) || e.key === 'd' || e.key === 'D') movement.right = true;

        if (e.code === 'KeyR' || e.key === 'r' || e.key === 'R') reloadWeapon();
        if (e.code === 'Space') performJump();
        if (e.code === 'Tab') { e.preventDefault(); toggleLeaderboard(); }
        if (e.code === 'Digit1') selectWeapon(1);
        if (e.code === 'Digit2') selectWeapon(2);
        if (e.code === 'Digit3') selectWeapon(3);
    });

    document.addEventListener('keyup', (e) => {
        if (['KeyW', 'ArrowUp'].includes(e.code) || e.key === 'w' || e.key === 'W') movement.up = false;
        if (['KeyS', 'ArrowDown'].includes(e.code) || e.key === 's' || e.key === 'S') movement.down = false;
        if (['KeyA', 'ArrowLeft'].includes(e.code) || e.key === 'a' || e.key === 'A') movement.left = false;
        if (['KeyD', 'ArrowRight'].includes(e.code) || e.key === 'd' || e.key === 'D') movement.right = false;
    });

    window.addEventListener('click', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.closest('#weaponUI') || e.target.closest('#tabBtn') || e.target.closest('#chatContainer') || e.target.classList.contains('insta-link')) return;
        performAttack();
    });

    function animate() {
        requestAnimationFrame(animate);
        handleFPSMovement();
        if (gameMode === "bots") updateBotsAI();
        drawMinimap();
        if (renderer && scene && camera) renderer.render(scene, camera);
    }
</script>
