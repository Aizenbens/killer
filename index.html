<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KRUNK-WAR 3D - Fixed Edition</title>
    <style>
        * { box-sizing: border-box; touch-action: none; -webkit-touch-callout: none; user-select: none; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        #mainMenu {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(135deg, #111425 0%, #050608 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; color: #fff;
        }
        .menu-card {
            background: rgba(20, 24, 38, 0.95); padding: 22px; border-radius: 14px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.85); width: 90%; max-width: 380px; text-align: center; border: 2px solid #f39c12;
        }
        h1 { margin: 0 0 10px 0; font-size: 28px; color: #f1c40f; font-weight: 900; text-shadow: 2px 2px 4px #000; }
        label { font-size: 11px; color: #f39c12; display: block; text-align: right; margin-top: 8px; font-weight: bold; }
        input, button, select { width: 100%; padding: 10px; margin: 4px 0; border-radius: 6px; border: none; font-size: 13px; font-weight: bold; }
        input, select { background: #1c2733; color: #fff; text-align: center; border: 2px solid #2c3e50; }
        
        .btn-main { background: #f39c12; color: #000; cursor: pointer; border-bottom: 4px solid #d35400; margin-top: 10px; }
        .btn-sec { background: #3498db; color: #fff; cursor: pointer; border-bottom: 4px solid #2980b9; }
        .btn-join { background: #2ecc71; color: #000; cursor: pointer; border-bottom: 4px solid #27ae60; }
        button:active { border-bottom: 0px; transform: translateY(4px); }

        .insta-link { display: inline-block; margin-top: 10px; color: #e1306c; text-decoration: none; font-weight: bold; font-size: 12px; }
        #shareBox { display: none; margin-top: 10px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; border: 1px dashed #f1c40f; }
        #shareBox input { font-size: 11px; background: #111; color: #2ecc71; }

        #gameWrapper { display: none; position: relative; width: 100vw; height: 100vh; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; transform: translate(-50%, -50%); pointer-events: none; z-index: 6; background: #2ecc71; border-radius: 50%; border: 1px solid #000; }
        
        #scopeOverlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9; display: none;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.95) 35%, #000 100%);
        }
        #scopeOverlay::before, #scopeOverlay::after { content: ''; position: absolute; background: rgba(255, 0, 0, 0.7); }
        #scopeOverlay::before { top: 50%; left: 0; right: 0; height: 1px; }
        #scopeOverlay::after { left: 50%; top: 0; bottom: 0; width: 1px; }

        #hitmarker { position: absolute; top: 50%; left: 50%; width: 18px; height: 18px; transform: translate(-50%, -50%); pointer-events: none; z-index: 7; opacity: 0; }
        #hitmarker::before, #hitmarker::after { content: ''; position: absolute; background: #f1c40f; }
        #hitmarker::before { top: 8px; left: 0; width: 18px; height: 2px; transform: rotate(45deg); }
        #hitmarker::after { top: 8px; left: 0; width: 18px; height: 2px; transform: rotate(-45deg); }

        #healthUI { position: absolute; top: 12px; left: 12px; background: rgba(0, 0, 0, 0.85); padding: 8px 12px; border-radius: 8px; border: 2px solid #f1c40f; color: #fff; font-size: 11px; z-index: 4; width: 160px; }
        .hp-bar-container { width: 100%; background: #333; height: 10px; border-radius: 5px; margin-top: 4px; overflow: hidden; }
        #hpBarFill { width: 100%; background: #2ecc71; height: 100%; transition: width 0.2s, background-color 0.2s; }
        #ammoDisplay { margin-top: 4px; font-size: 11px; color: #f1c40f; display: flex; justify-content: space-between; }
        #reloadNotice { color: #e74c3c; font-weight: bold; display: none; font-size: 10px; text-align: center; }

        #weaponUI { position: absolute; bottom: 12px; right: 12px; background: rgba(0, 0, 0, 0.85); padding: 6px 10px; border-radius: 8px; border: 2px solid #f39c12; color: #fff; font-size: 11px; z-index: 4; text-align: center; }
        .weapon-slots { display: flex; gap: 4px; margin-top: 4px; }
        .slot { padding: 4px 8px; background: #1c2733; border: 2px solid #2c3e50; border-radius: 4px; font-size: 10px; color: #fff; cursor: pointer; font-weight: bold; }
        .slot.active { border-color: #f1c40f; background: #f39c12; color: #000; }

        .touch-controls { position: absolute; bottom: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; align-items: flex-end; pointer-events: none; z-index: 5; }
        .joystick-zone { width: 90px; height: 90px; border: 2px dashed rgba(241, 196, 15, 0.6); border-radius: 50%; display: flex; justify-content: center; align-items: center; pointer-events: auto; background: rgba(0,0,0,0.3); position: relative; }
        .joystick-stick { width: 35px; height: 35px; background: #f39c12; border-radius: 50%; position: absolute; }
        .touch-action-btns { display: flex; gap: 6px; pointer-events: auto; flex-wrap: wrap; max-width: 180px; justify-content: flex-end; }
        .action-btn { width: 44px; height: 44px; border-radius: 8px; display: flex; justify-content: center; align-items: center; color: white; font-weight: 900; font-size: 10px; border: 2px solid #000; }
        .fire-btn { background: #e74c3c; width: 52px; height: 52px; font-size: 11px; }
        .ads-btn { background: #8e44ad; }
        .jump-btn { background: #2ecc71; }
        .reload-btn { background: #3498db; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

<div id="mainMenu">
    <div class="menu-card">
        <h1>KRUNK-WAR 3D</h1>
        
        <label>اسمك في اللعبة:</label>
        <input type="text" id="playerName" placeholder="ادخل اسمك" maxlength="10" value="مقاتل">

        <label>الجهاز:</label>
        <select id="deviceSelect">
            <option value="pc">💻 كمبيوتر (ماوس + كيبورد)</option>
            <option value="phone">📱 هاتف (أزرار لمس)</option>
        </select>

        <button class="btn-main" onclick="joinPublicMatch()">دخول جولة عامة 🌐</button>
        <button class="btn-sec" onclick="createPrivateRoom()">إنشاء غرفة خاصة 🔒</button>

        <div style="margin-top: 10px; border-top: 1px solid #333; padding-top: 8px;">
            <label>أو ادخل كود الغرفة مباشرة:</label>
            <input type="text" id="joinCodeInput" placeholder="مثال: A1B2C3" style="text-transform: uppercase;">
            <button class="btn-join" onclick="joinByCode()">انضمام بالكود 🚀</button>
        </div>

        <div id="shareBox">
            <label style="text-align:center;">كود الغرفة الخاص بك:</label>
            <input type="text" id="roomCodeDisplay" readonly>
            <button onclick="copyInviteLink()" style="font-size:10px; padding:5px; background:#f1c40f; color:#000; font-weight:bold;">نسخ رابط الدعوة المباشر 📋</button>
        </div>

        <a href="https://www.instagram.com/algerian_aizen/" target="_blank" class="insta-link">📸 @algerian_aizen</a>
    </div>
</div>

<div id="gameWrapper">
    <div id="crosshair"></div>
    <div id="hitmarker"></div>
    <div id="scopeOverlay"></div>

    <div id="healthUI">
        <div>الصحة (HP): <span id="hpValue">100</span></div>
        <div class="hp-bar-container"><div id="hpBarFill"></div></div>
        <div id="ammoDisplay">
            <span>الذخيرة:</span>
            <span id="ammoCount">30 / 150</span>
        </div>
        <div id="reloadNotice">اضغط R للتعبئة!</div>
    </div>

    <div id="weaponUI">
        <div id="currentWeaponText">بندقية تكتيكية 🎯</div>
        <div class="weapon-slots">
            <div class="slot" id="slot1" onclick="selectWeapon(1)">1: خنجر</div>
            <div class="slot" id="slot2" onclick="selectWeapon(2)">2: مسدس</div>
            <div class="slot active" id="slot3" onclick="selectWeapon(3)">3: بندقية</div>
        </div>
    </div>
</div>

<div class="touch-controls" id="touchUI" style="display: none;">
    <div class="joystick-zone" id="joyZone"><div class="joystick-stick" id="joyStick"></div></div>
    <div class="touch-action-btns">
        <div class="action-btn ads-btn" id="adsBtn">🔍 سكوب</div>
        <div class="action-btn reload-btn" id="reloadBtn">🔄 تعبئة</div>
        <div class="action-btn jump-btn" id="jumpBtn">🦘 قفز</div>
        <div class="action-btn fire-btn" id="fireBtn">إطلاق</div>
    </div>
</div>

<script>
    let peer, conn;
    let roomCode = "";

    let scene, camera, renderer;
    let myPos = { x: 2500, y: 35, z: 2500 };
    let playerYaw = 0, playerPitch = 0;
    let selectedDevice = "pc";
    
    const keys = { w: false, a: false, s: false, d: false };
    let touchMove = { x: 0, y: 0 };

    let isAiming = false;
    let baseEyeHeight = 35;
    let velocityY = 0, isGrounded = true;
    let highestY = 35;
    
    // تعديل الفيزياء لسرعة أبطأ وقفزة أستقرارية
    const gravity = -0.4;
    const jumpPower = 6.8; 
    const moveSpeed = 3.2;

    let playerHP = 100;
    let lastDamageTime = 0;
    const HEAL_DELAY = 5000;

    let fpWeaponGroup, currentKnifeMesh, currentPistolMesh, currentRifleMesh, muzzleFlashMesh;
    let knifeAnimTime = 0, isKnifeSwinging = false;
    let walkBobble = 0;

    let stairsColliders = []; // مصفوفة لحساب التصادم مع السلالم

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'shoot') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
            gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.12);
        } else if (type === 'fall') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(90, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.18);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.18);
        }
    }

    const WEAPONS = {
        1: { name: "خنجر تكتيكي 🗡️", cd: 200, damage: 100, maxAmmo: Infinity, currentAmmo: Infinity, isMelee: true },
        2: { name: "مسدس تكتيكي 🔫", cd: 150, damage: 35, maxAmmo: 12, currentAmmo: 12, reserveAmmo: 60 },
        3: { name: "بندقية تكتيكية 🎯", cd: 100, damage: 45, maxAmmo: 30, currentAmmo: 30, reserveAmmo: 150 }
    };
    let currentWeaponId = 3;

    function createPrivateRoom() {
        roomCode = Math.random().toString(36).substring(2, 8).toUpperCase();
        peer = new Peer("KRUNK_" + roomCode);
        peer.on('open', () => {
            document.getElementById('roomCodeDisplay').value = roomCode;
            document.getElementById('shareBox').style.display = 'block';
            start3DGame();
        });
    }

    function joinByCode() {
        let code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
        if (!code) return;
        peer = new Peer();
        peer.on('open', () => {
            conn = peer.connect("KRUNK_" + code);
            start3DGame();
        });
    }

    function joinPublicMatch() {
        document.getElementById('joinCodeInput').value = "PUBLIC123";
        joinByCode();
    }

    function copyInviteLink() {
        const link = `${window.location.origin}${window.location.pathname}?room=${roomCode}`;
        navigator.clipboard.writeText(link);
        alert("تم نسخ رابط الدعوة!");
    }

    function start3DGame() {
        selectedDevice = document.getElementById('deviceSelect').value;
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('gameWrapper').style.display = 'block';

        init3D();
    }

    function init3D() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color('#1e293b');
        scene.fog = new THREE.FogExp2('#1e293b', 0.0002);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 4000);
        camera.rotation.order = 'YXZ';

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('gameWrapper').appendChild(renderer.domElement);

        const ambLight = new THREE.AmbientLight(0xffffff, 0.85);
        scene.add(ambLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(1000, 2000, 1000);
        scene.add(dirLight);

        // أرضية الخريطة
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(5000, 5000), new THREE.MeshLambertMaterial({ color: 0x334155 }));
        floor.rotation.x = -Math.PI / 2;
        floor.position.set(2500, 0, 2500);
        scene.add(floor);

        buildMapAndBigHouses();
        buildObstacles();

        fpWeaponGroup = new THREE.Group();
        camera.add(fpWeaponGroup);
        scene.add(camera);

        buildDetailedWeapons();

        const flashMat = new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0 });
        muzzleFlashMesh = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), flashMat);
        muzzleFlashMesh.position.set(0.5, -0.4, -2.5);
        fpWeaponGroup.add(muzzleFlashMesh);

        // ضبط مفاتيح التحكم
        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyW') keys.w = true;
            if (e.code === 'KeyS') keys.s = true;
            if (e.code === 'KeyA') keys.a = true;
            if (e.code === 'KeyD') keys.d = true;
            if (e.code === 'Space' && isGrounded) { velocityY = jumpPower; isGrounded = false; }
            if (e.code === 'KeyR') reloadWeapon();

            if (e.code === 'Digit1') selectWeapon(1);
            if (e.code === 'Digit2') selectWeapon(2);
            if (e.code === 'Digit3') selectWeapon(3);
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW') keys.w = false;
            if (e.code === 'KeyS') keys.s = false;
            if (e.code === 'KeyA') keys.a = false;
            if (e.code === 'KeyD') keys.d = false;
        });

        if (selectedDevice === 'phone') {
            document.getElementById('touchUI').style.display = 'flex';
            setupTouch();
        } else {
            window.addEventListener('click', () => { document.body.requestPointerLock(); });
            window.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === document.body) {
                    playerYaw -= e.movementX * 0.0022;
                    playerPitch -= e.movementY * 0.0022;
                    playerPitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, playerPitch));
                }
            });
            window.addEventListener('mousedown', (e) => {
                if (e.button === 0) performAttack();
                if (e.button === 2) toggleADS(true);
            });
            window.addEventListener('mouseup', (e) => {
                if (e.button === 2) toggleADS(false);
            });
            window.addEventListener('contextmenu', e => e.preventDefault());
        }

        selectWeapon(3);
        animate();
    }

    // بناء بيوت ضخمة بفيزياء وسلالام ممتازة
    function buildMapAndBigHouses() {
        const wallMat = new THREE.MeshLambertMaterial({ color: 0x475569 });
        const floor2Mat = new THREE.MeshLambertMaterial({ color: 0x64748b });
        const stairMat = new THREE.MeshLambertMaterial({ color: 0xd97706 });

        for (let i = 0; i < 9; i++) {
            let hx = 800 + (i % 3) * 1400;
            let hz = 800 + Math.floor(i / 3) * 1400;

            // أبعاد كبيرة للمنازل
            let width = 280, height = 140, depth = 280;

            // الجدران الجانبية
            const wLeft = new THREE.Mesh(new THREE.BoxGeometry(12, height, depth), wallMat);
            wLeft.position.set(hx - width/2, height/2, hz);

            const wRight = new THREE.Mesh(new THREE.BoxGeometry(12, height, depth), wallMat);
            wRight.position.set(hx + width/2, height/2, hz);

            const wBack = new THREE.Mesh(new THREE.BoxGeometry(width, height, 12), wallMat);
            wBack.position.set(hx, height/2, hz - depth/2);

            // أرضية الدور الثاني
            const floor2 = new THREE.Mesh(new THREE.BoxGeometry(width - 20, 8, depth - 20), floor2Mat);
            floor2.position.set(hx, 70, hz);

            scene.add(wLeft, wRight, wBack, floor2);

            // السلالم للصعود المريح
            let stepsCount = 18;
            for (let s = 0; s < stepsCount; s++) {
                const step = new THREE.Mesh(new THREE.BoxGeometry(60, 6, 20), stairMat);
                let sx = hx - width/3;
                let sy = s * 4 + 3;
                let sz = (hz - depth/3) + s * 12;
                step.position.set(sx, sy, sz);
                scene.add(step);

                stairsColliders.push({ x: sx, z: sz, y: sy + baseEyeHeight, radius: 35 });
            }
        }
    }

    // بناء عوائق خارجية وصناديق
    function buildObstacles() {
        const crateMat = new THREE.MeshLambertMaterial({ color: 0xb45309 });
        const barrierMat = new THREE.MeshLambertMaterial({ color: 0x94a3b8 });

        for (let i = 0; i < 35; i++) {
            let cx = 300 + Math.random() * 4400;
            let cz = 300 + Math.random() * 4400;

            let crate = new THREE.Mesh(new THREE.BoxGeometry(35, 35, 35), crateMat);
            crate.position.set(cx, 17.5, cz);
            scene.add(crate);

            let barrier = new THREE.Mesh(new THREE.BoxGeometry(80, 25, 20), barrierMat);
            barrier.position.set(cx + 40, 12.5, cz + 40);
            scene.add(barrier);
        }
    }

    function buildDetailedWeapons() {
        const darkMat = new THREE.MeshLambertMaterial({ color: 0x0f172a });
        const metalMat = new THREE.MeshLambertMaterial({ color: 0x94a3b8 });

        currentKnifeMesh = new THREE.Group();
        currentKnifeMesh.add(new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.7, 2.2), metalMat));
        currentKnifeMesh.position.set(0.5, -0.5, -1.2);
        fpWeaponGroup.add(currentKnifeMesh);

        currentPistolMesh = new THREE.Group();
        currentPistolMesh.add(new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.5, 1.8), darkMat));
        currentPistolMesh.position.set(0.5, -0.5, -1.2);
        currentPistolMesh.visible = false;
        fpWeaponGroup.add(currentPistolMesh);

        currentRifleMesh = new THREE.Group();
        currentRifleMesh.add(new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.6, 3.0), darkMat));
        currentRifleMesh.position.set(0.5, -0.5, -1.2);
        currentRifleMesh.visible = false;
        fpWeaponGroup.add(currentRifleMesh);
    }

    function toggleADS(state) {
        if (currentWeaponId === 1) return;
        isAiming = state;

        document.getElementById('crosshair').style.opacity = isAiming ? '0' : '1';
        document.getElementById('scopeOverlay').style.display = isAiming ? 'block' : 'none';

        fpWeaponGroup.visible = !isAiming;

        camera.fov = isAiming ? 32 : 75;
        camera.updateProjectionMatrix();
    }

    function selectWeapon(id) {
        currentWeaponId = id;
        toggleADS(false);

        document.querySelectorAll('.slot').forEach((s, idx) => s.classList.toggle('active', idx + 1 === id));
        document.getElementById('currentWeaponText').innerText = WEAPONS[id].name;

        currentKnifeMesh.visible = (id === 1);
        currentPistolMesh.visible = (id === 2);
        currentRifleMesh.visible = (id === 3);

        updateAmmoUI();
    }

    function reloadWeapon() {
        const w = WEAPONS[currentWeaponId];
        if (w.isMelee || w.currentAmmo === w.maxAmmo || w.reserveAmmo <= 0) return;

        let needed = w.maxAmmo - w.currentAmmo;
        let reloadAmount = Math.min(needed, w.reserveAmmo);

        w.currentAmmo += reloadAmount;
        w.reserveAmmo -= reloadAmount;

        document.getElementById('reloadNotice').style.display = 'none';
        updateAmmoUI();
    }

    function updateAmmoUI() {
        const w = WEAPONS[currentWeaponId];
        document.getElementById('ammoCount').innerText = w.isMelee ? "∞ / ∞" : `${w.currentAmmo} / ${w.reserveAmmo}`;
        if (!w.isMelee && w.currentAmmo === 0) {
            document.getElementById('reloadNotice').style.display = 'block';
        }
    }

    function applyDamage(amount) {
        playerHP = Math.max(0, playerHP - amount);
        lastDamageTime = Date.now();
        playSound('fall');
        updateHealthUI();
    }

    function updateHealthUI() {
        document.getElementById('hpValue').innerText = Math.round(playerHP);
        const fill = document.getElementById('hpBarFill');
        fill.style.width = playerHP + '%';
        fill.style.backgroundColor = playerHP < 35 ? '#e74c3c' : '#2ecc71';
    }

    function animate() {
        requestAnimationFrame(animate);

        // التهييل التلقائي
        if (playerHP < 100 && Date.now() - lastDamageTime >= HEAL_DELAY) {
            playerHP = Math.min(100, playerHP + 0.4);
            updateHealthUI();
        }

        // إصلاح الحركة المعكوسة تماماً
        let inputX = 0, inputZ = 0;
        if (keys.w) inputZ += 1;  // W للأمام
        if (keys.s) inputZ -= 1;  // S للخلف
        if (keys.a) inputX -= 1;  // A لليسار
        if (keys.d) inputX += 1;  // D لليمين

        if (touchMove.x !== 0 || touchMove.y !== 0) {
            inputX = touchMove.x;
            inputZ = -touchMove.y;
        }

        let isMoving = (inputX !== 0 || inputZ !== 0);

        if (isMoving) {
            let sin = Math.sin(playerYaw);
            let cos = Math.cos(playerYaw);

            // تحريك صحيح باتجاه نظرة الكاميرا
            myPos.x += (inputX * cos - inputZ * sin) * moveSpeed;
            myPos.z += (-inputX * sin - inputZ * cos) * moveSpeed;
        }

        myPos.x = Math.max(50, Math.min(4950, myPos.x));
        myPos.z = Math.max(50, Math.min(4950, myPos.z));

        // حساب صعود السلالم والارتفاع
        let floorHeight = baseEyeHeight;
        for (let st of stairsColliders) {
            let dx = myPos.x - st.x;
            let dz = myPos.z - st.z;
            if (Math.sqrt(dx * dx + dz * dz) < st.radius) {
                if (st.y > floorHeight) floorHeight = st.y;
            }
        }

        velocityY += gravity;
        myPos.y += velocityY;

        if (!isGrounded && myPos.y > highestY) {
            highestY = myPos.y;
        }

        if (myPos.y <= floorHeight) {
            if (!isGrounded && highestY - floorHeight > 45) {
                applyDamage(10);
            }
            myPos.y = floorHeight;
            velocityY = 0;
            isGrounded = true;
            highestY = floorHeight;
        }

        // اهتزاز السلاح أثناء المشي
        if (isMoving && isGrounded && !isAiming) {
            walkBobble += 0.12;
            fpWeaponGroup.position.y = Math.sin(walkBobble) * 0.04;
            fpWeaponGroup.position.x = Math.cos(walkBobble * 0.5) * 0.02;
        } else {
            fpWeaponGroup.position.set(0, 0, 0);
        }

        if (isKnifeSwinging) {
            knifeAnimTime += 0.2;
            currentKnifeMesh.rotation.x = -Math.sin(knifeAnimTime) * 1.4;
            currentKnifeMesh.position.z = -1.2 - Math.sin(knifeAnimTime) * 0.5;
            if (knifeAnimTime >= Math.PI) {
                isKnifeSwinging = false;
                knifeAnimTime = 0;
                currentKnifeMesh.rotation.set(0, 0, 0);
                currentKnifeMesh.position.set(0.5, -0.5, -1.2);
            }
        }

        if (camera) {
            camera.position.set(myPos.x, myPos.y, myPos.z);
            camera.rotation.y = playerYaw;
            camera.rotation.x = playerPitch;
        }

        renderer.render(scene, camera);
    }

    function setupTouch() {
        const joyZone = document.getElementById('joyZone');
        const joyStick = document.getElementById('joyStick');

        joyZone.addEventListener('touchmove', (e) => {
            const rect = joyZone.getBoundingClientRect();
            const touch = e.touches[0];
            let x = touch.clientX - (rect.left + rect.width / 2);
            let y = touch.clientY - (rect.top + rect.height / 2);

            let dist = Math.sqrt(x * x + y * y);
            let maxDist = 35;

            if (dist > maxDist) {
                x = (x / dist) * maxDist;
                y = (y / dist) * maxDist;
            }

            joyStick.style.transform = `translate(${x}px, ${y}px)`;
            touchMove.x = x / maxDist;
            touchMove.y = y / maxDist;
        });

        joyZone.addEventListener('touchend', () => {
            joyStick.style.transform = `translate(0px, 0px)`;
            touchMove.x = 0;
            touchMove.y = 0;
        });

        document.getElementById('fireBtn').addEventListener('touchstart', performAttack);
        document.getElementById('adsBtn').addEventListener('touchstart', () => toggleADS(!isAiming));
        document.getElementById('reloadBtn').addEventListener('touchstart', reloadWeapon);
        document.getElementById('jumpBtn').addEventListener('touchstart', () => {
            if (isGrounded) { velocityY = jumpPower; isGrounded = false; }
        });
    }

    function performAttack() {
        const weapon = WEAPONS[currentWeaponId];
        if (weapon.isMelee) {
            isKnifeSwinging = true;
            knifeAnimTime = 0;
            return;
        }

        if (weapon.currentAmmo <= 0) {
            reloadWeapon();
            return;
        }

        weapon.currentAmmo--;
        updateAmmoUI();

        playSound('shoot');
        playerPitch += 0.008;

        if (muzzleFlashMesh) {
            muzzleFlashMesh.material.opacity = 1;
            setTimeout(() => muzzleFlashMesh.material.opacity = 0, 40);
        }

        const hm = document.getElementById('hitmarker');
        hm.style.opacity = '1';
        setTimeout(() => hm.style.opacity = '0', 80);
    }
</script>
